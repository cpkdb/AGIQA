blur: "Any scene can carry this dimension, but the blur should visibly affect the main subject or the overall image readability."
overexposure: "Prefer scenes where bright regions, highlights, or backlit areas can visibly wash out detail."
underexposure: "Prefer scenes where darkened regions can visibly lose shadow detail while the subject remains recognizable."
low_contrast: "Prefer scenes with enough tonal structure so a flattened, hazy, low-contrast result is visually obvious."
color_cast: "Prefer scenes with neutral or natural colors so an unnatural global tint is easy to notice."
desaturation: "Prefer scenes whose colors would normally be vivid enough that drained color is easy to perceive."
plastic_waxy_texture: "Prefer close-up realistic subjects or surfaces where lost texture and waxy smoothing can be seen."
awkward_positioning: "The full frame should make subject distance and placement readable rather than tightly cropped or abstract."
awkward_framing: "The image should have a readable camera framing or perspective so unflattering framing can be judged."
unbalanced_layout: "The scene should have a readable composition and visual center so imbalance is visible."
cluttered_scene: "The image should contain a scene or background where excessive clutter can meaningfully accumulate around the subject."
lighting_imbalance: "The scene should make uneven local lighting or split lighting visually readable."
color_clash: "The image should contain enough color information that disharmonious combinations are obvious."
dull_palette: "The image should contain enough scene or subject color that a dull, lifeless palette is visible."
hand_malformation: "The positive image must show at least one readable hand or hand interaction."
expression_mismatch: "The positive image must show a visible face with an expression that can be compared against scene context."
body_proportion_error: "The positive image must show a single human figure with readable head-to-body and leg proportions."
extra_limbs: "The positive image should show a single human figure with limbs visible enough for limb-count errors to be judged."
animal_anatomy_error: "The positive image must contain a readable animal subject whose anatomy is clearly visible."
object_structure_error: "The positive image must contain one prominent structured non-living object whose geometry or parts are easy to read."
material_mismatch: "The positive image must contain one prominent structured non-living object whose material appearance is easy to perceive."
extra_objects: "The scene should have a stable main context so inserted irrelevant objects can be judged as out of place."
count_error: "The positive image must contain countable main subjects or objects whose expected quantity is visually readable."
illogical_colors: "The positive image should contain natural objects, animals, people, or surfaces whose normal color expectations are clear."
scale_inconsistency: "The scene must contain at least one clear reference object so wrong size ratios can be compared at a glance."
floating_objects: "The scene must show an object or subject that should normally rest on a visible supporting surface."
penetration_overlap: "The scene must contain two solid objects or body-object interactions whose boundaries can be judged for impossible overlap."
context_mismatch: "The scene must have a recognizable environment or activity so a context violation can be judged."
time_inconsistency: "The scene must have enough lighting, season, or environmental cues that temporal conflict is visible."
scene_layout_error: "The scene must have a recognizable room, zone, or environment whose layout logic can be judged."
text_error: "The positive image must contain visible, intended text that is readable enough to compare against the degraded result."
logo_symbol_error: "The positive image must contain a logo, symbol, or branded visual element that can be checked for corruption or intrusion."
