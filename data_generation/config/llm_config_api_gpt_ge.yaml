# LLM API config for api.gpt.ge (OpenAI-compatible)
# Docs:
# - https://api-gpt-ge.apifox.cn/5071665m0
# - https://api-gpt-ge.apifox.cn/5069242m0

llm:
  provider: "openai"
  model: "gpt-5"

  # Replace with your key from this provider's console.
  api_key: "sk-1yzdsgLfX6XXKrp30538211838104bBeBb13Be89Ac70DcC1"

  # Important: this provider requires /v1 (or /v1/) in base_url.
  api_base: "https://api.vveai.com/v1/chat/completions"

  temperature: 0.7
  max_tokens: 500
  top_p: 0.95

  # Note: timeout/max_retries/retry_delay are currently not applied by
  # positive_prompt_backfill_executor.py. Keep for future compatibility.
  timeout: 30
  max_retries: 3
  retry_delay: 2

  batch_size: 10
  rate_limit_rpm: 60

degradation:
  enable_cache: false
  cache_dir: "/root/ImageReward/data_generation/.cache/llm_degradation"
  validate_output: true
  min_length: 10
  max_length: 200
  ensure_modification: true

logging:
  level: "INFO"
  log_api_calls: true
  log_file: "logs/llm_degradation.log"
