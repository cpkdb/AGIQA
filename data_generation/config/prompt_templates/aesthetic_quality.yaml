# Aesthetic Quality Degradation Prompt Templates
# 审美质量退化策略 [跨视角]
# 属性: poor_composition, poor_lighting, unharmonious_colors, lack_of_visual_appeal

aesthetic_quality:
  poor_composition:
    mild: |
      # Task
      Rewrite the prompt so the image has POOR COMPOSITION (mild level).

      ## What is Mild Poor Composition?
      - Too much empty space above subject (excessive headroom)
      - Subject drifting slightly out of visual balance
      - Horizon line slightly tilted unintentionally

      ## CRITICAL RULE
      Keep the ENTIRE original prompt. Only APPEND a short modifier.

      ## Strategy: APPEND-ONLY
      Use terms that imply "amateur" mistakes rather than "artistic" choices:
      - ", with too much empty space above"
      - ", slightly tilted horizon"
      - ", drifting to the side without purpose"

      ## Example
      - "A portrait of a man in a suit"
        → "A portrait of a man in a suit, with too much empty space above"

    moderate: |
      # Task
      Rewrite the prompt so the image has POOR COMPOSITION (moderate level).

      ## What is Moderate Poor Composition?
      - Subject uncomfortably close to edge (not artistic rule of thirds)
      - Awkward visual weight with large empty dead space
      - Distracting foreground elements blocking the view

      ## CRITICAL RULE
      Keep the ENTIRE original prompt. Only APPEND a short modifier.

      ## Strategy: APPEND-ONLY
      Force awkward positions with specific spatial terms:
      - ", positioned awkwardly at the very bottom edge"
      - ", large empty dead space on the right side"
      - ", blocked by random foreground objects"
      - ", awkward cropping lacking focal point"

      ## Example
      - "A cat sitting on a sofa"
        → "A cat sitting on a sofa, positioned awkwardly at the very bottom edge"

    severe: |
      # Task
      Rewrite the prompt to create POOR COMPOSITION while keeping ALL original elements.

      ## CRITICAL RULES
      1. Keep ALL original elements (subject, objects, location, setting)
      2. Use PHYSICAL STATE CHANGES that SDXL understands
      3. Do NOT use abstract composition terms SDXL ignores

      ## KEY INSIGHT
      SDXL does NOT understand: "off-center", "cut off", "empty space", "edge of frame"
      SDXL DOES understand: physical states like "tipped over", "fallen", "scattered", "from behind"

      ## Strategy by Subject Type

      ### For Objects/Still Life (BEST - physical state changes):
      - Tip over: "[object] tipped over, lying on its side"
      - Scatter: "[objects] scattered randomly across [surface]"
      - Fall: "[object] fallen off [surface], lying on the ground"
      - Messy arrangement: "[objects] piled messily, overlapping each other"

      ### For People/Portraits (viewpoint changes):
      - Back view: "back of [person], facing away from camera"
      - Looking down: "[person] looking down at the ground"
      - Turned away: "[person] turned to the side, profile view"
      - Walking away: "[person] walking away in the distance"

      ### For Animals (action/position changes):
      - Running away: "[animal] running away from camera, rear view"
      - Partially hidden: "[animal] partially hidden behind [object]"
      - Distant: "[animal] very small in the distance"

      ### For Architecture/Landscapes (angle changes):
      - Extreme angle: "[building] photographed from extreme low angle"
      - Partial view: "corner of [building] visible"
      - Obstructed: "[subject] partially blocked by tree branches"

      ### For Groups (arrangement changes):
      - Backs turned: "group of [people] with backs to camera"
      - Scattered: "[people] scattered apart, not grouped together"
      - Some leaving: "some [people] walking away from the group"

      ## Examples
      - "A portrait of a young woman with long dark hair"
        → "Back view of a young woman with long dark hair, facing away from camera, walking into the distance"

      - "A wildlife photograph of a running cheetah in the African savanna"
        → "A cheetah running away from camera in the African savanna, rear view, getting smaller in the distance"

      - "A landscape with a large oak tree and mountains"
        → "A large oak tree photographed from extreme low angle looking up, mountains not visible, only trunk and branches"

      - "A product shot of a glass perfume bottle on marble surface"
        → "A glass perfume bottle tipped over and fallen on marble surface, lying flat on its side"

      - "A still life of a ceramic vase with white roses and two green apples on a wooden table"
        → "A ceramic vase tipped over on wooden table, white roses fallen and scattered, two green apples rolled apart"

      - "A group portrait of five people in business attire standing in a row"
        → "Five people in business attire with their backs to camera, walking away"

      - "A symmetrical photograph of a grand cathedral entrance"
        → "A grand cathedral entrance photographed from extreme side angle, only one door visible, wall dominating the frame"

      ## AVOID
      - Abstract terms: "off-center", "cut off at edge", "empty space", "awkward framing"
      - These terms are IGNORED by SDXL!
      - Use physical/viewpoint changes instead

  poor_lighting:
    mild: |
      # Task
      Rewrite the prompt so the image has POOR LIGHTING (mild level - flat, boring light).

      ## CRITICAL: Content Preservation
      保留原prompt中所有非光线内容，只修改光线相关描述。

      ## Strategy: REPLACE lighting words with flat lighting terms
      - "Rembrandt lighting" → "flat frontal lighting"
      - "golden hour" → "overcast light"
      - "dramatic lighting" → "flat even lighting"

      ## Effective Terms
      - "flat frontal lighting", "overcast light", "cloudy day lighting"

      ## Examples
      - "A portrait with beautiful Rembrandt lighting"
        → "A portrait with flat frontal lighting"

    moderate: |
      # Task
      Rewrite the prompt so the image has POOR LIGHTING (moderate level - harsh unflattering light).

      ## CRITICAL: Content Preservation
      保留原prompt中所有非光线内容，只修改光线相关描述。

      ## Strategy: REPLACE lighting words + APPEND harsh lighting effect

      ## Effective Terms (pick 1-2)
      - "harsh direct flash", "on-camera flash"
      - "harsh noon sunlight", "direct overhead sun"
      - "hard shadows on face"

      ## Examples
      - "A portrait with soft Rembrandt lighting"
        → "A portrait with harsh direct flash, hard shadows"

      - "A woman in golden hour light"
        → "A woman in harsh noon sunlight"

    severe: |
      # Task
      Rewrite the prompt so the image has POOR LIGHTING from an aesthetic perspective.

      ## What is Poor Lighting (Aesthetic)?
      光线缺乏艺术感：过曝、欠曝、逆光剪影、或光线方向不佳导致审美质量下降。

      ## KEY INSIGHT
      SDXL 不理解抽象词如 "flat", "no depth", "washed out"。
      必须使用 SDXL 能理解的具体光线场景描述！

      ## CRITICAL RULES
      1. Keep ALL scene content unchanged (subject, location, objects, time of day)
      2. Only REPLACE/APPEND lighting quality words
      3. Do NOT add physical light sources (no "bulb", "tube", "lamp", "flash")
      4. Do NOT change scene time (sunset stays sunset, night stays night)

      ## Strategy by Subject Type

      ### For People/Portraits:
      - REPLACE: "golden hour" → "harsh midday sun"
      - APPEND: ", overexposed face, blown out highlights" or ", backlit silhouette, face in dark shadow"

      ### For Landscapes:
      - REPLACE: "warm light" → "harsh bright light"
      - APPEND: ", overexposed sky, blown out clouds" or ", underexposed, too dark to see details"

      ### For Still Life/Products/Food:
      静物对光线变化不敏感，需要更强烈的退化！
      - REPLACE: "soft diffused light" → "harsh direct overhead light"
      - APPEND: ", strong dark shadows underneath, high contrast, overexposed highlights"
      - 或使用逆光: ", backlit, silhouette, dark front"

      ### For Animals:
      - REPLACE: "Rembrandt lighting" → "direct overhead light"
      - APPEND: ", harsh shadows under eyes, overexposed fur"

      ## Effective Terms (pick 2-3)
      - Overexposure: "overexposed", "blown out highlights", "too bright"
      - Underexposure: "underexposed", "too dark", "lost in shadow"
      - Harsh light: "harsh direct overhead light", "strong dark shadows", "high contrast shadows"
      - Backlight: "backlit", "silhouette", "dark front, bright background"

      ## Examples
      - "A woman in a red dress, golden hour lighting"
        → "A woman in a red dress, harsh midday sun, overexposed face, blown out highlights"

      - "A bowl of fresh fruit on marble counter, soft diffused light"
        → "A bowl of fresh fruit on marble counter, harsh direct overhead light, strong dark shadows underneath, overexposed highlights"

      - "A mountain landscape at sunset with warm orange light"
        → "A mountain landscape at sunset, harsh bright light, overexposed sky, blown out clouds"

      - "A cat sitting on a wooden table, Rembrandt lighting"
        → "A cat sitting on a wooden table, direct overhead light, harsh shadows under eyes, overexposed"

      ## AVOID
      - Abstract terms: "flat", "no depth", "washed out", "no atmosphere" (SDXL doesn't understand)
      - Physical objects: bulb, tube, lamp, fixture, flash
      - Style words: "unflattering", "ugly", "bad", "boring"
      - Changing scene content, time of day, or subject

  unharmonious_colors:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of COLOR HARMONY (mild level - slightly clashing colors).

      ## Strategies
      1. Shift one element's color to a slightly off shade:
         - "blue sofa" → "teal sofa", "red dress" → "coral-orange dress"
         - e.g., "living room with blue sofa" → "living room with slightly off-teal sofa"

      2. Add subtle color temperature clash:
         - "[warm element] next to [cool element]"
         - e.g., "cozy room" → "room with warm orange walls and cool blue-gray furniture"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of COLOR HARMONY (moderate level - obvious color clash).

      ## Strategies
      1. Add complementary color clashes:
         - "red [object] against bright green [background]", "orange [item] with blue [item]"
         - e.g., "living room" → "living room with orange sofa against bright blue walls"

      2. Add clashing color pairs:
         - "hot pink [object] with lime green [object]"
         - e.g., "bedroom" → "bedroom with hot pink bedding and lime green walls"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of COLOR HARMONY (severe level - chaotic neon colors).

      ## Strategies
      1. Add multiple neon/fluorescent colors:
         - "[scene] with neon pink, lime green, and electric orange throughout"
         - e.g., "living room" → "living room with neon pink walls, lime green sofa, and electric orange carpet"

      2. Replace natural colors with fluorescent:
         - "natural [color]" → "neon [color]", "brown" → "hot pink", "green" → "electric cyan"
         - e.g., "forest" → "forest with neon pink leaves, electric cyan tree trunks, and yellow-green sky"

  lack_of_visual_appeal:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of VISUAL APPEAL (mild level - slightly less interesting subject).

      ## Strategies
      1. Degrade subject from optimal to past-prime:
         - "blooming flowers" → "flowers slightly past their peak"
         - e.g., "fresh roses" → "roses slightly past their peak, a few wilted petals"

      2. Replace superlatives with ordinary:
         - "magnificent" → "ordinary", "stunning" → "average", "pristine" → "typical"
         - e.g., "magnificent lion" → "ordinary-looking lion"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of VISUAL APPEAL (moderate level - boring timing/environment).

      ## Strategies
      1. Replace special moments with ordinary:
         - "at golden hour" → "on overcast afternoon", "at sunrise" → "in flat midday light"
         - e.g., "beach at sunset" → "beach on gray, overcast afternoon"

      2. Degrade environment to mundane:
         - "charming cafe" → "generic cafeteria", "beautiful garden" → "ordinary backyard"
         - e.g., "portrait in beautiful garden" → "portrait in unremarkable, plain backyard"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of VISUAL APPEAL (severe level - completely uninteresting).

      ## Strategies
      1. Degrade subject to worst state:
         - "blooming rose" → "wilting, sparse rose", "sleek car" → "dusty, dented old car"
         - e.g., "beautiful garden" → "neglected garden with wilting, sparse plants"

      2. Add most boring timing and setting:
         - "[scene] on dreary gray day, in dull flat light, against boring empty background"
         - e.g., "romantic dinner" → "plain meal in cafeteria lighting, on gray dreary day, utterly forgettable"
