# Alignment Degradation Prompt Templates
# 按子类别分组，每个属性有 mild/moderate/severe 三个版本
# alignment 退化是关于语义偏移，不是质量退化
# 策略框架: Identify → Replace → Preserve

basic_recognition:
  main_object:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing the MAIN SUBJECT with a similar alternative (mild semantic distance - same category, slight variation).

      ## Modification Strategies

      1. Identify the primary subject noun in the prompt - look for the main animal, person, vehicle, or object that is the focus (e.g., in "a golden retriever playing in the park", the main subject is "golden retriever").

      2. Replace the subject with a similar alternative from the same category: animals (dog → puppy, hound, different breed; cat → kitten, tabby), vehicles (car → sedan, SUV, coupe; bike → bicycle, cycle), people (woman → lady, girl; man → gentleman, guy), objects (cup → mug, glass; chair → armchair, seat) (e.g., "golden retriever in park" → "labrador in park").

      3. Preserve all other elements unchanged: keep ALL adjectives and modifiers intact, keep the setting/location unchanged, keep actions and poses unchanged - only replace the core noun with same-category variant.

      ## Constraints
      - Change should be subtle, same general category
      - Replacement must keep the scene physically and logically plausible

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing the MAIN SUBJECT with a related but different alternative (moderate semantic distance - related category, clear difference).

      ## Modification Strategies

      1. Identify the primary subject noun in the prompt - look for the main animal, person, vehicle, or object that is the focus.

      2. Replace the subject with a related but different alternative: animals (dog → cat, fox, wolf; cat → rabbit, hamster; bird → bat), vehicles (car → motorcycle, truck, bus; bicycle → scooter), people (woman → man, child, elderly; doctor → nurse, scientist), objects (cup → bowl, bottle; chair → bench, stool) (e.g., "golden retriever in park" → "gray cat in park").

      3. Preserve all other elements: keep ALL adjectives (adapt grammar if needed: "a fluffy dog" → "a fluffy cat"), keep the setting/location unchanged, keep actions unchanged (if plausible for new subject) - only replace the core noun.

      ## Constraints
      - Change should be obvious but still related
      - Replacement must keep the scene physically and logically plausible

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing the MAIN SUBJECT with a completely unrelated alternative (severe semantic distance - different category entirely).

      ## Modification Strategies

      1. Identify the primary subject noun in the prompt - look for the main animal, person, vehicle, or object that is the focus.

      2. Replace the subject with a completely different category: animals (dog → chair, lamp, tree; cat → bicycle, rock, cloud), vehicles (car → elephant, flower, building; bike → fish, star), people (woman → statue, robot, mannequin; child → doll, toy), objects (cup → shoe, book; chair → fish, mountain) (e.g., "golden retriever in park" → "wooden chair in park").

      3. Preserve scene context: keep the setting/location unchanged, keep any applicable modifiers, maintain grammatical correctness - only replace the core noun.

      ## Constraints
      - Change should be dramatic and clearly misaligned
      - Replacement must keep the scene physically and logically plausible

  secondary_object:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing a SECONDARY/BACKGROUND object with a similar alternative (mild semantic distance).

      ## Modification Strategies

      1. Identify secondary objects in the prompt - look for background elements, props, furniture, environmental objects (NOT the main subject) (e.g., in "cat sitting on a sofa", secondary object is "sofa").

      2. Replace secondary object with a similar alternative: furniture (sofa → couch, armchair; table → desk, counter), settings (forest → woods, grove; beach → shore, coast), trees (oak tree → elm tree, birch tree), props (book → magazine, notebook; cup → mug) (e.g., "cat on sofa" → "cat on armchair").

      3. Preserve: keep the main subject completely unchanged, keep the spatial relationship (on, in, near, etc.), maintain scene plausibility.

      ## Constraints
      - Main subject must remain exactly the same
      - Replacement must keep the scene physically and logically plausible
      - DO NOT change image style (photo stays photo, sketch stays sketch)

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing a SECONDARY/BACKGROUND object with a different alternative (moderate semantic distance).

      ## Modification Strategies

      1. Identify secondary objects in the prompt - look for background elements, props, furniture, environmental objects.

      2. Replace secondary object with a different but related alternative: furniture (sofa → bed, bench, rock; table → chair, box), containers (glass aquarium → wooden barrel, metal tank; ceramic vase → glass jar, metal bucket), settings (forest → desert, field; beach → mountain, city), props (book → phone, flower; cup → bowl, vase) (e.g., "cat on sofa" → "cat on wooden bench").

      3. Preserve: keep the main subject completely unchanged, maintain spatial relationships where possible, scene should still be plausible.

      ## Constraints
      - Main subject must remain exactly the same
      - Replacement must keep the scene physically and logically plausible
      - DO NOT change image style (photo stays photo, illustration stays illustration)

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing a SECONDARY/BACKGROUND object with a dramatically different alternative (severe semantic distance).

      ## Modification Strategies

      1. Identify secondary objects in the prompt - look for background elements, props, furniture, environmental objects.

      2. Replace secondary object with a CONCRETE, SPECIFIC different object (NOT abstract environments): furniture (sofa → giant mushroom, boulder, fountain; fireplace → giant jellyfish, massive crystal), containers (aquarium → wooden barrel, giant seashell), settings (home office → home garden, underwater cave), props (book → sword, live fish, glowing orb; coral → hot air balloons, floating lanterns) (e.g., "cat on sofa" → "cat on giant mushroom"; "dog beside fireplace" → "dog beside giant jellyfish").

      3. Preserve: keep the main subject completely unchanged, scene may be unusual but should be imaginable.

      ## Constraints
      - Main subject must remain exactly the same
      - Use CONCRETE OBJECTS for replacement, NOT abstract descriptions like "field of stars", "void of darkness"
      - Replacement should be a TANGIBLE OBJECT that can exist in the scene
      - DO NOT change image style (photo stays photo, illustration stays illustration)

  object_presence:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by REMOVING a minor/background object mentioned in the prompt (mild - secondary element missing).

      ## Modification Strategies

      1. Identify minor/background CONCRETE objects in the prompt - look for physical, tangible items like props, accessories, background elements that are not the main focus.

      2. Remove the minor object from the prompt entirely:
         - "cat on table with vase" → "cat on table"
         - "woman in red dress holding flowers" → "woman in red dress"
         - "car parked near tree" → "car parked"

      3. Preserve: keep the main subject and primary scene unchanged.

      ## Constraints
      - Only remove secondary/minor objects
      - Main subject must remain present
      - ONLY remove CONCRETE, TANGIBLE objects (things you can see and touch)
      - DO NOT remove: atmosphere, mood, lighting, style, emotions, abstract descriptions (e.g., keep "peaceful atmosphere", "warm lighting", "dreamy mood")

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by REMOVING one of the important objects mentioned in the prompt (moderate - key element missing).

      ## Modification Strategies

      1. Identify multiple important CONCRETE objects in the prompt - look for scenes with two or more significant physical subjects/objects.

      2. Remove one important object from the prompt:
         - "cat and dog playing together" → "cat playing"
         - "couple walking on beach" → "man walking on beach"
         - "coffee and croissant on table" → "coffee on table"

      3. Preserve: keep at least one main element and the setting.

      ## Constraints
      - Remove one of multiple key objects
      - Scene should still make sense with remaining elements
      - ONLY remove CONCRETE, TANGIBLE objects (physical things)
      - DO NOT remove: atmosphere, mood, lighting, style, emotions, abstract descriptions

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by REMOVING the primary subject or most objects mentioned in the prompt (severe - main element missing).

      ## Modification Strategies

      1. Identify the primary CONCRETE subject in the prompt - the main physical focus of the image.

      2. Remove the primary subject or most objects:
         - "woman holding umbrella in rain" → "umbrella in rain"
         - "dog catching frisbee in park" → "frisbee in park"
         - "family having picnic with food and blanket" → "blanket on grass"

      3. Preserve: keep the setting/environment, may keep only props or background.

      ## Constraints
      - Remove the main subject or majority of objects
      - Scene becomes about the remaining minor elements
      - ONLY remove CONCRETE, TANGIBLE objects (physical things)
      - DO NOT remove: atmosphere, mood, lighting, style, emotions, abstract descriptions


attribute_alignment:
  color:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by changing ONE object's color to a VISIBLY DIFFERENT shade (mild - single object, noticeable but related color shift).

      ## Scope: SINGLE OBJECT + VISIBLY DIFFERENT SHADE

      ## Modification Strategies

      1. Identify ONE color adjective in the prompt and the object it describes.

      2. Replace with a VISIBLY DIFFERENT shade (NOT synonyms like crimson/scarlet):
         - red → pink, orange-red, burgundy, coral
         - blue → light blue, turquoise, teal, purple-blue
         - green → yellow-green, teal, mint, sage
         - yellow → orange, gold, mustard, lemon
         - white → light gray, pale pink, cream
         - black → dark blue, dark brown, charcoal
         (e.g., "red apple" → "pink apple"; "blue sky" → "turquoise sky")

      3. Preserve: keep object noun unchanged, keep all other colors unchanged.

      ## Constraints
      - Only change ONE object's color
      - Color must be VISIBLY DIFFERENT, not just a synonym (avoid: red→crimson, blue→azure)
      - The change should be noticeable but still within a related color range

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by changing ONE object's color to a clearly different color (moderate - single object, different color).

      ## Scope: SINGLE OBJECT + DIFFERENT COLOR

      ## Modification Strategies

      1. Identify ONE color adjective in the prompt and the object it describes.

      2. Replace with clearly different (but not opposite) color:
         - red → orange, pink, yellow, brown
         - blue → purple, teal, gray
         - green → teal, brown, yellow-green
         - yellow → orange, lime, beige
         - white → light gray, beige, pale blue
         - black → navy, dark brown, dark green
         (e.g., "red apple" → "yellow apple")

      3. Preserve: keep object noun unchanged, keep all other colors unchanged.

      ## Constraints
      - Only change ONE object's color
      - Color should be noticeably different
      - Result should still be plausible (yellow apple exists)
      - DO NOT change image style (photo stays photo, illustration stays illustration)
      - ONLY change the color word, keep all other words unchanged

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by changing MULTIPLE objects' colors or ALL colors in the scene (severe - multiple objects, different colors).

      ## Scope: MULTIPLE OBJECTS or ENTIRE SCENE + DIFFERENT/OPPOSITE COLORS

      ## Modification Strategies

      1. Identify ALL color adjectives in the prompt.

      2. Change multiple or all colors to different/opposite colors:
         - red → blue, green, cyan
         - blue → orange, yellow, red
         - green → red, magenta, pink
         - yellow → purple, blue, black
         - white → black, dark colors
         - black → white, bright colors
         (e.g., "red car under blue sky" → "green car under orange sky")

      3. If only one color exists, change it to opposite:
         (e.g., "red apple" → "blue apple")

      ## Constraints
      - Change multiple colors if available
      - Use different or opposite colors
      - Result may be unusual but imaginable
      - DO NOT change viewpoint, camera angle, or composition (exterior stays exterior, interior stays interior)
      - DO NOT change image style (photo stays photo, illustration stays illustration)
      - ONLY change color words, keep all other words unchanged

  shape:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding shape/size attributes to a KEY NOUN (mild - single key noun, noticeable shape change).

      ## Core Principle
      - Use CONCRETE geometric shapes, not abstract adjectives
      - Abstract words like "irregular", "squat", "towering" have weak visual effect
      - Use specific shapes that models can render clearly

      ## IMPORTANT: Object Type Matters
      Shape changes work BEST on MAN-MADE OBJECTS (vases, tables, clocks, buildings)
      Shape changes work POORLY on ORGANIC THINGS (animals, trees, people) - SDXL ignores geometric shapes on living things

      ## Effective Shape/Size Words (MUST USE these)
      For MAN-MADE objects: triangular, circular, spherical, cubic, rectangular, hexagonal, cone-shaped, pyramid-shaped
      For ORGANIC things: Use SIZE changes instead - tiny, miniature, giant, massive, double-sized, half-sized

      ## AVOID these (too abstract, weak effect):
      irregular, squat, towering, elongated, stubby, chunky, spindly, oval-shaped (models ignore these)

      ## Modification Strategies

      1. For MAN-MADE objects - add geometric shape:
         (e.g., "a wooden table" → "a triangular wooden table";
          "a glass vase" → "a cone-shaped glass vase";
          "a clock on wall" → "a hexagonal clock on wall")

      2. For ORGANIC things - use SIZE changes instead:
         (e.g., "a cat on sofa" → "a tiny palm-sized cat on sofa";
          "a tree in meadow" → "a miniature bonsai-sized tree in meadow";
          "an elephant" → "a baby elephant half the normal size")

      ## Constraints
      - Only modify ONE key noun
      - Use CONCRETE geometric shapes for man-made objects
      - Use SIZE changes for animals/plants/people (NOT geometric shapes)

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding MORE EXTREME shape/size attributes to a KEY NOUN (moderate - dramatic, clearly visible change).

      ## Core Principle
      - Use EXTREME geometric shapes that are clearly WRONG for the object
      - Use size descriptions with CONCRETE comparisons
      - The change should be visually obvious and unexpected

      ## IMPORTANT: Object Type Matters
      Shape changes work BEST on MAN-MADE OBJECTS - use geometric shapes
      Shape changes work POORLY on ORGANIC THINGS - use EXTREME SIZE changes instead

      ## Effective Extreme Modifiers
      For MAN-MADE objects: triangular (for round things), spherical (for flat things), cubic (for tall things), flat disc-shaped (for tall things)
      For ORGANIC things: "as big as a car", "smaller than a coin", "giant towering", "microscopic tiny"

      ## Modification Strategies

      1. For MAN-MADE objects - apply OPPOSITE shape:
         (e.g., "a round table" → "a triangular table";
          "a tall vase" → "a flat disc-shaped vase";
          "a circular clock" → "a triangular clock";
          "a rectangular door" → "a circular door")

      2. For ORGANIC things - use EXTREME SIZE with concrete comparison:
         (e.g., "a cat" → "a cat as large as a horse";
          "a tree" → "a tree only knee-height tall";
          "an elephant" → "a tiny elephant smaller than a dog";
          "a bird" → "a giant bird as big as a car")

      ## Constraints
      - Only modify ONE key noun
      - For man-made objects: shape must be CLEARLY DIFFERENT from natural form
      - For organic things: use SIZE comparisons (NOT geometric shapes like "triangular elephant")

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying shape/size of MULTIPLE objects with EXTREME, IMPOSSIBLE changes (severe - multiple objects, surreal proportions).

      ## Core Principle
      - Modify MULTIPLE objects in the scene
      - Use IMPOSSIBLE/SURREAL proportions
      - Create clear visual contradiction with reality

      ## IMPORTANT: Object Type Matters
      For MAN-MADE objects: use impossible geometric shapes
      For ORGANIC things: use impossible SIZE relationships (NOT geometric shapes)

      ## Effective Severe Modifiers
      For MAN-MADE objects: perfectly cubic building, spherical car, pyramid-shaped chair, twisted spiral staircase
      For ORGANIC things: "cat bigger than the house", "person smaller than a cup", "elephant the size of a mouse"
      Surreal size relationships: inverted scale between objects

      ## Modification Strategies

      1. For scenes with MAN-MADE objects - modify shapes:
         (e.g., "table and chairs in room" → "triangular table and spherical chairs in room";
          "vase on shelf" → "cubic vase on spiral-shaped shelf")

      2. For scenes with ORGANIC things - modify SIZES:
         (e.g., "cat and dog in park" → "giant cat bigger than a car and tiny dog smaller than a mouse in park";
          "bird on tree" → "giant bird bigger than the tree perched on tiny tree")

      3. For mixed scenes - combine both:
         (e.g., "person sitting at desk" → "tiny person smaller than a cup sitting at triangular desk")

      ## Constraints
      - Modify AT LEAST 2 objects when possible
      - For man-made objects: use geometric shapes
      - For organic things: use SIZE changes (avoid "cubic elephant", "triangular cat")
      - DO NOT change image style (photo stays photo)
      - Changes must be visually dramatic and clearly wrong

  state:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding state/condition attributes to a KEY NOUN (mild - single key noun, basic state change).

      ## Scope: SINGLE KEY NOUN + BASIC STATE CHANGE

      ## Modification Strategies

      1. Identify the KEY NOUN in the prompt and check if it has any state/condition adjectives (e.g., new, old, clean, dirty, fresh, wilted, open, closed, broken, intact).

      2. If state adjective EXISTS: modify it to a different basic state (e.g., "a new car" → "an old car"; "fresh flowers" → "wilted flowers"; "an open door" → "a closed door").

      3. If NO state adjective exists: add a state adjective that is ATYPICAL for that object (e.g., "flowers in a vase" → "wilted flowers in a vase" because flowers are typically fresh; "a car in the garage" → "a rusty car in the garage" because cars are typically in good condition; "a house on the hill" → "an abandoned house on the hill").

      4. Preserve: keep the key noun unchanged, keep ALL other attributes (color, shape, material) unchanged.

      ## Constraints
      - Only modify/add state for ONE key noun
      - When adding, choose states OPPOSITE to the object's typical/default state
      - Use basic state words: new, old, clean, dirty, fresh, wilted, open, closed, broken, intact, empty, full
      - DO NOT change or remove any other words in the prompt

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding more extreme state/condition attributes to a KEY NOUN (moderate - single key noun, more dramatic change).

      ## Scope: SINGLE KEY NOUN + MORE EXTREME STATE CHANGE

      ## Modification Strategies

      1. Identify the KEY NOUN in the prompt and check if it has any state/condition adjectives.

      2. If state adjective EXISTS: modify it to a more extreme state (e.g., "a new car" → "a wrecked car"; "fresh flowers" → "rotten flowers"; "a clean room" → "a filthy room").

      3. If NO state adjective exists: add an extreme state adjective that is STRONGLY ATYPICAL for that object (e.g., "flowers in a vase" → "decayed flowers in a vase"; "a car in the garage" → "a destroyed car in the garage"; "a house on the hill" → "a ruined house on the hill"; "bread on the table" → "moldy bread on the table").

      4. Preserve: keep the key noun unchanged, keep ALL other attributes (color, shape, material) unchanged.

      ## Constraints
      - Only modify/add state for ONE key noun
      - When adding, choose states STRONGLY OPPOSITE to the object's typical/default state
      - Use more extreme state words: ancient, ruined, destroyed, wrecked, decayed, rotten, moldy, filthy, shattered, crumbling, abandoned, desolate
      - DO NOT change or remove any other words in the prompt

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding state/condition attributes to MULTIPLE key nouns in the scene (severe - multiple key nouns changed).

      ## Scope: MULTIPLE KEY NOUNS + STATE CHANGES

      ## Modification Strategies

      1. Identify ALL key nouns in the prompt and check their state/condition adjectives.

      2. For each key noun, if state adjective EXISTS: modify it to a different state. If NO state adjective exists: add one that is ATYPICAL for that object.

      3. Change at least 2 key nouns when possible (e.g., "a car parked near a house" → "a wrecked car parked near an abandoned house"; "flowers in a vase on the table" → "wilted flowers in a cracked vase on the table").

      4. Preserve: keep all nouns unchanged, keep ALL other attributes (color, shape, material) unchanged.

      ## Constraints
      - Modify/add state for multiple key nouns (at least 2 when possible)
      - When adding, choose states OPPOSITE to each object's typical/default state
      - If only one key noun exists, use extreme state change
      - DO NOT change or remove any other words in the prompt

  emotion_action:
    mild: |
      # Task
      Modify the emotion/action to a VISIBLY DIFFERENT but related state (mild shift).

      ## Applicability Check
      **If NO living subject exists**: Return the original prompt UNCHANGED.

      ## Mild = Visibly Different Emotion/Action
      Change to a clearly different emotion or action:
      - angry → calm, happy → neutral, sad → content, excited → relaxed
      - For ANIMALS: prefer changing ACTION over emotion (exploring → sitting, running → lying)

      ## CRITICAL RULES
      - Do NOT change mood/atmosphere words (melancholy, romantic, peaceful, frustrated)
      - Do NOT use synonyms (angry → annoyed is TOO SIMILAR)
      - For animals: change action words for better visual effect

      ## Examples
      - "angry man at phone" → "calm man at phone"
      - "curious puppy exploring garden" → "tired puppy sitting in garden"
      - "excited child running" → "calm child walking"

      ## SAFE Words: calm, neutral, content, relaxed, tired, sitting, standing, lying
      ## AVOID (too similar): angry→annoyed, happy→cheerful, sad→melancholic

    moderate: |
      # Task
      Modify the emotion to an OPPOSITE emotion (moderate shift, reversed direction).

      ## Applicability Check
      **If NO living subject exists**: Return the original prompt UNCHANGED.

      ## Moderate = Opposite Emotion
      Change to the opposite emotion:
      - Happy → Sad: smiling → crying, happy → sad, laughing → weeping
      - Sad → Happy: sad → happy, crying → smiling
      - Angry → Happy: angry → happy, furious → smiling
      - For ANIMALS: change action for better effect (running → sleeping, exploring → hiding)

      ## CRITICAL RULES
      - Do NOT change mood/atmosphere words (melancholy, romantic, peaceful, frustrated)
      - Emotion and action must be SEMANTICALLY CONSISTENT (no contradictions)
      - Keep the number of subjects the same

      ## Semantic Consistency Rule
      FORBIDDEN combinations (emotion contradicts action):
      - laughing + shouting, crying + smiling, happy + screaming, calm + shouting
      ALLOWED combinations:
      - happy + waving, crying + sitting, angry + shouting, laughing + dancing

      ## Examples
      - "smiling woman holding flowers" → "crying woman holding flowers"
      - "angry man shouting at phone" → "happy man talking at phone" (changed shouting→talking to match happy)
      - "sad girl on bench" → "happy girl on bench"
      - "curious puppy exploring" → "scared puppy hiding"

      ## SAFE Words: crying, sad, happy, smiling, angry, bored, scared, hiding, sleeping

    severe: |
      # Task
      Modify BOTH the emotion AND action to create maximum contrast (severe shift).

      ## Applicability Check
      **If NO living subject exists**: Return the original prompt UNCHANGED.

      ## Severe = Emotion + Action Both Change
      Change both the emotion AND the action/pose:
      - "dancing couple" → "crying couple standing"
      - "running dog" → "sleeping dog"
      - "smiling woman walking" → "crying woman sitting"
      - "angry man shouting" → "happy man whispering"

      ## CRITICAL RULES
      - Change emotion AND action, but nothing else
      - Do NOT change mood/atmosphere words (melancholy, romantic, peaceful)
      - Do NOT add new characters
      - Emotion and action must be SEMANTICALLY CONSISTENT

      ## Semantic Consistency Rule
      FORBIDDEN combinations (emotion contradicts action):
      - laughing + shouting, crying + smiling, happy + screaming, calm + shouting
      ALLOWED combinations:
      - crying + standing, happy + whispering, sad + sitting, angry + frowning

      ## Examples
      - "dancing couple at wedding, romantic celebration" → "crying couple standing at wedding, romantic celebration"
      - "angry man shouting at phone" → "happy man whispering at phone"
      - "excited dog running in park" → "tired dog lying in park"

      ## SAFE Emotion Words: crying, sad, happy, angry, worried, tired
      ## SAFE Action Words: standing, sitting, lying, sleeping, whispering, frowning

  style:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying style descriptors (mild - visibly different but related style).

      ## Definition
      Style refers to HOW the image is visually presented: medium, art movement, artist style, or visual tone.
      - Medium: photography, oil painting, watercolor, sketch, 3D render, pixel art, vector
      - Art Movement: impressionist, surrealist, minimalist, cyberpunk, baroque
      - Visual Tone: noir, vintage, cinematic, retro

      ## Scope: VISIBLY DIFFERENT but related style

      ## Modification Strategies

      1. Identify style descriptors in the prompt.

      2. If style descriptor EXISTS: REPLACE it with a VISIBLY DIFFERENT style (NOT just adding prefix like "post-"):
         - "watercolor" → "pastel drawing" or "colored pencil" (NOT "watercolor sketch")
         - "pop art" → "comic book style" or "graphic novel style" (NOT "post-pop art")
         - "pencil sketch" → "charcoal drawing" or "ink wash" (NOT "pen and ink")
         - "photorealistic" → "hyperrealistic painting" or "digital art"

      3. If NO style descriptor exists: append a style at the END.

      4. IMPORTANT: REPLACE the original style word, do NOT keep both old and new styles.

      ## Constraints
      - REPLACE style words, do NOT append (avoid: "watercolor style... digital style")
      - Style change must be VISIBLY DIFFERENT, not just a prefix/suffix change
      - DO NOT change subject content (building stays same building, person stays same person)
      - ONLY modify style-related words

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying style descriptors (moderate - cross-genre style shift).

      ## Definition
      Style refers to HOW the image is visually presented: medium, art movement, artist style, or visual tone.

      ## Scope: CROSS-GENRE STYLE SHIFT (clearly different visual)

      ## Modification Strategies

      1. Identify style descriptors in the prompt.

      2. If style descriptor EXISTS: REPLACE it with a DIFFERENT genre/category:
         - "oil painting" → "cartoon style" or "anime style"
         - "photorealistic" → "3D render" or "digital illustration"
         - "minimalist" → "ornate baroque" or "detailed realistic"
         - "sketch" → "oil painting" or "digital art"

      3. If NO style descriptor exists: append a clearly different style at the END.

      4. IMPORTANT: REPLACE the original style word completely, do NOT keep both.

      ## Constraints
      - REPLACE style words completely, do NOT append new style while keeping old
      - Change style ACROSS different genres/categories
      - DO NOT change subject content (same building, same person, same animal)
      - ONLY modify style-related words

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying style descriptors (severe - opposite medium).

      ## Definition
      Style refers to HOW the image is visually presented: medium, art movement, artist style, or visual tone.

      ## Scope: COMPLETELY OPPOSITE medium

      ## Modification Strategies

      1. Identify style descriptors in the prompt.

      2. If style descriptor EXISTS: REPLACE with OPPOSITE medium:
         - "pencil sketch" → "photograph" or "photorealistic"
         - "pixel art" → "vector art" or "high-resolution render"
         - "2D illustration" → "3D render" or "clay sculpture"
         - "watercolor" → "pixel art" or "3D render"
         - "cartoon" → "photorealistic" or "oil painting"

      3. If NO style descriptor exists: append opposite style at the END.

      4. IMPORTANT: REPLACE the original style word completely.

      ## Constraints
      - REPLACE style words completely, NEVER keep both old and new styles
      - Change to COMPLETELY OPPOSITE medium
      - DO NOT change subject content (same building, same person, same scene)
      - ONLY modify style-related words
      - Opposite pairs: sketch ↔ photograph, pixel art ↔ vector, 2D flat ↔ 3D render, hand-drawn ↔ photorealistic

composition_interaction:
  object_count:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding quantity/count for ONE object (mild - single object, slight quantity change).

      ## Scope: SINGLE OBJECT + SLIGHT QUANTITY CHANGE (±1-2)

      ## Modification Strategies

      1. Identify quantity words in the prompt (e.g., one, two, three, a, single, pair, few, several, many) and the objects they describe.

      2. If quantity word EXISTS for an object: modify it IN PLACE with a slight change ±1-2 (e.g., "two cats on the sofa" → "three cats on the sofa"; "a pair of birds" → "three birds").

      3. If NO quantity word exists: add a quantity word DIRECTLY BEFORE the noun, at its original position (e.g., "forest path in autumn" → "several forest paths in autumn"; "children playing in playground" → "three children playing in playground"; "dog in the park" → "two dogs in the park").

      4. Preserve: keep ALL other words exactly the same, DO NOT insert new phrases elsewhere.

      ## Constraints
      - Only modify/add quantity for ONE object
      - Quantity change should be small (±1-2)
      - Modify/add quantity IN PLACE (directly before the noun), NOT insert elsewhere
      - DO NOT add duplicate phrases like "numerous forest paths" separately

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding quantity/count for ONE object (moderate - single object, noticeable quantity change).

      ## Scope: SINGLE OBJECT + NOTICEABLE QUANTITY CHANGE

      ## Modification Strategies

      1. Identify quantity words in the prompt and the objects they describe.

      2. If quantity word EXISTS for an object: modify it IN PLACE with a noticeable change (e.g., "two cats" → "six cats"; "a single tree" → "a group of trees"; "many birds" → "a single bird").

      3. If NO quantity word exists: add a quantity word DIRECTLY BEFORE the noun, at its original position (e.g., "forest path in autumn" → "numerous forest paths in autumn"; "children playing" → "a crowd of children playing"; "car in the garage" → "several cars in the garage").

      4. Preserve: keep ALL other words exactly the same, DO NOT insert new phrases elsewhere.

      ## Constraints
      - Only modify/add quantity for ONE object
      - Quantity change should be noticeable (not ±1-2, but larger difference)
      - Modify/add quantity IN PLACE (directly before the noun), NOT insert elsewhere
      - DO NOT add duplicate phrases or insert content in the middle of the prompt

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying or adding quantity/count for MULTIPLE objects (severe - multiple objects changed).

      ## Scope: MULTIPLE OBJECTS + QUANTITY CHANGES

      ## Modification Strategies

      1. Identify ALL objects in the prompt that can have quantities.

      2. For each object, if quantity word EXISTS: modify it IN PLACE. If NO quantity word exists: add one DIRECTLY BEFORE the noun.

      3. Change quantities for at least 2 objects when possible (e.g., "cat and dog in the park" → "three cats and five dogs in the park"; "man with briefcase near car" → "crowd of men with several briefcases near three cars").

      4. If only one object exists, use extreme quantity change IN PLACE (e.g., "tree in the field" → "hundreds of trees in the field"; "crowd of people" → "a single person").

      5. Preserve: keep ALL other words exactly the same, DO NOT insert new phrases elsewhere.

      ## Constraints
      - Modify/add quantity for MULTIPLE objects (at least 2 when possible)
      - All modifications must be IN PLACE (directly before each noun)
      - DO NOT insert new content in the middle or end of the prompt
      - DO NOT duplicate nouns or add separate phrases

  spatial_position:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by slightly modifying SPATIAL RELATIONSHIPS (mild - single slight change).

      ## Spatial Relationship Words (find and modify these)
      on, under, above, below, left, right, inside, outside, beside, near,
      behind, in front of, hidden, visible, covered, exposed, blocking

      ## CRITICAL CONSTRAINTS
      - ONLY modify spatial relationship words, DO NOT modify ANY other words
      - DO NOT change: quality, style, lighting, focus, resolution, or any other attributes
      - The modified prompt MUST be PHYSICALLY POSSIBLE and LOGICALLY VALID
      - If modification would create impossible/absurd scene, choose a different spatial word or skip

      ## Applicability Check
      **If NO spatial relationship word exists in the prompt**: Return the original prompt UNCHANGED.
      **If spatial word exists but modification would be physically impossible**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      ### If spatial word EXISTS and modification is PHYSICALLY POSSIBLE:
      Modify it to a SIMILAR but different relationship:
      - "on" → "at the edge of", "near", "beside"
      - "behind" → "partially behind", "beside"
      - "inside" → "at the entrance of", "near"
      (e.g., "cat on the table" → "cat at the edge of the table";
       "dog behind the fence" → "dog partially behind the fence")

      ## Examples of INVALID modifications (DO NOT do these):
      - "sunset over ocean" → "sunset under ocean" ❌ (physically impossible)
      - "car on road" → "car under road" ❌ (physically impossible)
      - "bird in sky" → "bird under sky" ❌ (nonsensical)

      ## Examples of VALID modifications:
      - "cat on the chair" → "cat beside the chair" ✓
      - "book on the table" → "book at the edge of the table" ✓
      - "person behind the tree" → "person partially behind the tree" ✓

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying SPATIAL RELATIONSHIPS to OPPOSITE (moderate - reversed relationship).

      ## Spatial Relationship Words
      on, under, above, below, left, right, inside, outside, beside, near,
      behind, in front of, hidden, visible, covered, exposed, blocking

      ## Opposite Pairs (ONLY use when BOTH directions are physically possible)
      on ↔ under, above ↔ below, left ↔ right, inside ↔ outside,
      behind ↔ in front of, hidden ↔ visible, covered ↔ exposed

      ## CRITICAL CONSTRAINTS
      - ONLY modify spatial relationship words, DO NOT modify ANY other words
      - DO NOT change: quality, style, lighting, focus, resolution, or any other attributes
      - The modified prompt MUST be PHYSICALLY POSSIBLE and LOGICALLY VALID
      - ONLY apply opposite if BOTH original AND opposite are physically possible

      ## Applicability Check
      **If NO spatial relationship word exists**: Return the original prompt UNCHANGED.
      **If opposite would be physically impossible**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      ### Check if opposite is PHYSICALLY POSSIBLE before modifying:
      - "cat on chair" → "cat under chair" ✓ (both possible)
      - "bird above tree" → "bird below tree" ✓ (both possible)
      - "person behind door" → "person in front of door" ✓ (both possible)

      ## Examples of INVALID modifications (DO NOT do these):
      - "sunset over ocean" → "sunset under ocean" ❌ (sun cannot be under ocean)
      - "car on road" → "car under road" ❌ (car cannot be under road normally)
      - "plane above clouds" → "plane below clouds" ⚠️ (possible but check context)
      - "roof on house" → "roof under house" ❌ (physically impossible)

      ## Examples of VALID modifications:
      - "cat on the chair" → "cat under the chair" ✓
      - "dog behind the fence" → "dog in front of the fence" ✓
      - "ball inside the box" → "ball outside the box" ✓
      - "person left of the door" → "person right of the door" ✓

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by modifying MULTIPLE spatial relationships, or REVERSING subject-object roles when BOTH directions are logical (severe - multiple changes or role reversal).

      ## Spatial Relationship Words
      on, under, above, below, left, right, inside, outside, beside, near,
      behind, in front of, hidden, visible, covered, exposed, blocking

      ## CRITICAL CONSTRAINTS
      - ONLY modify spatial relationship words or swap subject-object positions
      - DO NOT change: quality, style, lighting, focus, resolution, or any other attributes
      - ALL modifications MUST be PHYSICALLY POSSIBLE and LOGICALLY VALID
      - For role reversal: ONLY swap if BOTH directions make physical sense

      ## Applicability Check
      **If NO spatial relationship word exists**: Return the original prompt UNCHANGED.
      **If modifications would be physically impossible**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      ### Strategy 1: If MULTIPLE spatial words exist, modify ALL to opposites (if valid):
      (e.g., "cat on table and dog under chair" → "cat under table and dog on chair" ✓;
       "bird above tree, hidden behind leaves" → "bird below tree, visible in front of leaves" ✓)

      ### Strategy 2: REVERSE subject-object roles ONLY when BOTH directions are logical:

      VALID reversals (similar-sized objects, both can be on/under each other):
      - "cat on dog" → "dog on cat" ✓ (both animals, both directions possible)
      - "book on notebook" → "notebook on book" ✓ (similar objects)
      - "red box inside blue box" → "blue box inside red box" ✓ (if sizes allow)

      INVALID reversals (DO NOT do these):
      - "cat on chair" → "chair on cat" ❌ (chair cannot sit on cat)
      - "car on road" → "road on car" ❌ (nonsensical)
      - "person under umbrella" → "umbrella under person" ❌ (defeats purpose)
      - "sunset over ocean" → "ocean over sunset" ❌ (physically impossible)

      ## Examples of VALID severe modifications:
      - "small dog sitting on big dog" → "big dog sitting on small dog" ✓
      - "left hand over right hand" → "right hand over left hand" ✓
      - "cat in front of dog, both on the sofa" → "dog in front of cat, both under the sofa" ✓

      ## If no valid modification is possible:
      Return the original prompt UNCHANGED. Do not force an illogical modification.

  interaction:
    # Interaction = Dynamic Action + Static Relation + Logic Context
    # 1. Dynamic Action: action verbs (chasing, holding, eating, swimming)
    # 2. Static Relation: physical contact via prepositions (on, in, with, holding)
    # 3. Logic Context: noun-implied relationships (couple, match, crowd, rain)
    #
    # Severity differentiation: based on interaction COMPLETENESS/CORRECTNESS
    # - mild: interaction exists but WEAKENED
    # - moderate: interaction CHANGED or PARTIALLY LOST
    # - severe: interaction COMPLETELY BROKEN or WRONG

    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by WEAKENING the interaction relationship (mild - interaction exists but weakened).

      ## Understanding Interaction (3 Types)

      1. **Dynamic Action**: Action verbs (chasing, holding, eating, swimming, playing)
      2. **Static Relation**: Physical contact via prepositions (on, in, with) - e.g., "vase on table" implies physical contact
      3. **Logic Context**: Noun-implied relationships - e.g., "couple" implies closeness, "rain" implies wetness

      ## Modification Strategies

      ### For Dynamic Action (verbs exist):
      Weaken the action intensity (action still happening, but less intense):
      - "fighting" → "pushing each other"; "hugging tightly" → "standing close with arms touching"
      - "playing guitar" → "strumming guitar slowly"; "eating apple" → "nibbling apple"
      - "running through forest" → "jogging through forest"; "dancing energetically" → "swaying gently"

      ### For Static Relation (prepositions like on, in, with):
      Loosen the contact (still touching, but less secure):
      - "vase on table" → "vase on edge of table, about to fall"
      - "hat on head" → "hat loosely perched on head, tilting"
      - "ring on finger" → "ring loosely fitting on finger"

      ### For Logic Context (noun-implied):
      Weaken the implied relationship:
      - "couple in park" → "two people standing near each other in park"
      - "car in rain" → "car with light drizzle"
      - "crowd at concert" → "small group at concert"

      ## Constraints
      - Interaction still EXISTS but is WEAKENED
      - Contact/relationship is looser but not broken
      - Must remain physically plausible

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by CHANGING or PARTIALLY REMOVING the interaction (moderate - interaction changed or partially lost).

      ## Understanding Interaction (3 Types)

      1. **Dynamic Action**: Action verbs
      2. **Static Relation**: Physical contact via prepositions
      3. **Logic Context**: Noun-implied relationships

      ## Modification Strategies

      ### For Dynamic Action (verbs exist):
      Change to a DIFFERENT action or SWAP roles (action type changes):
      - "playing guitar" → "holding guitar without playing"; "riding horse" → "standing beside horse"
      - Subject-object swap: "cat chasing dog" → "dog chasing cat"; "man walking dog" → "dog pulling man"
      - "swimming in pool" → "standing in pool"; "climbing tree" → "leaning against tree"

      ### For Static Relation (prepositions):
      Break the contact (objects separated but still related):
      - "vase on table" → "vase beside table on floor"
      - "hat on head" → "hat in hand"
      - "book in hand" → "book under arm"
      - "fish in water" → "fish jumping out of water"

      ### For Logic Context (noun-implied):
      Contradict the implied relationship:
      - "couple in park" → "two people facing away from each other in park"
      - "car in rain" → "dry car under shelter while rain falls nearby"
      - "tennis match" → "tennis players resting on bench"
      - "crowd at concert" → "few scattered people at concert"

      ## Constraints
      - Interaction CHANGED or contact BROKEN
      - Objects still in same scene but relationship altered
      - Result should still be physically plausible

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by COMPLETELY BREAKING or making the interaction WRONG (severe - interaction completely lost or logically wrong).

      ## Understanding Interaction (3 Types)

      1. **Dynamic Action**: Action verbs
      2. **Static Relation**: Physical contact via prepositions
      3. **Logic Context**: Noun-implied relationships

      ## Modification Strategies

      ### For Dynamic Action (verbs exist):
      Remove interaction entirely or make it WRONG:
      - "shaking hands" → "two people with backs turned to each other, hands at sides"
      - "eating apple" → "person looking away from apple on distant table"
      - "playing piano" → "person sitting far from piano, facing opposite direction"
      - "hugging" → "two people standing at opposite ends of room"

      ### For Static Relation (prepositions):
      Complete separation or WRONG relationship:
      - "vase on table" → "vase in different room from table"
      - "hat on head" → "hat on floor across the room"
      - "fish in water" → "fish on dry land far from water"
      - "ring on finger" → "ring on table while hand is elsewhere"

      ### For Logic Context (noun-implied):
      Create complete contradiction or WRONG context:
      - "couple in park" → "two strangers ignoring each other at opposite ends of park"
      - "car in rain" → "car in bright sunshine, no rain visible"
      - "snowman in winter" → "pile of water puddle in summer sun"
      - "boat on ocean" → "boat in middle of desert"
      - "campfire gathering" → "unlit logs with people scattered far apart"

      ## Constraints
      - Interaction COMPLETELY ABSENT or WRONG
      - Objects may be in same image but have NO meaningful relationship
      - Context contradicts what the noun/scene implies

external_knowledge:
  # External Knowledge & Complex Reasoning
  # Tests model's "world knowledge" and ability to "follow instructions over statistical priors"
  #
  # Three core attributes:
  # 1. entity_knowledge: Memory - recognizing specific entities (landmarks, brands, cultural items)
  # 2. artistic_style: Appreciation - understanding specific art styles and artists
  # 3. counter_intuitive: Control - generating counter-factual/impossible scenes as instructed

  entity_knowledge:
    # Tests model's ability to recognize and render SPECIFIC NAMED ENTITIES
    # Covers: Geographic landmarks, Brands/IPs, Cultural/Historical items
    # Degradation direction: Specific → Generic (lose unique identifying features)

    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by GENERALIZING specific entity references (mild - genericize while keeping category).

      ## Applicability Check
      First, check if the prompt contains SPECIFIC NAMED ENTITIES:
      - **Geographic**: Eiffel Tower, Mount Fuji, Statue of Liberty, Great Wall, Times Square
      - **Brand/IP**: Nike, Apple, Mercedes, Coca-Cola, Mario, Pikachu, Mickey Mouse
      - **Cultural/Historical**: Terracotta Warriors, Samurai armor, Victorian dress, Mona Lisa

      **If NO specific entity exists**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      Replace specific entity with GENERIC DESCRIPTION (same category):
      - Geographic: "Eiffel Tower" → "tall iron tower"; "Mount Fuji" → "snow-capped mountain"
      - Brand/IP: "Nike shoes" → "athletic shoes"; "iPhone" → "smartphone"; "Mario" → "plumber in red clothes"
      - Cultural: "Samurai armor" → "traditional Japanese armor"; "Mona Lisa" → "Renaissance portrait painting"

      ## Constraints
      - Replace SPECIFIC NAME with GENERIC DESCRIPTION
      - Keep the same category/type
      - Lose the UNIQUE IDENTIFYING FEATURES

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing specific entities with SIMILAR ALTERNATIVES (moderate - same type, different entity).

      ## Applicability Check
      Check if the prompt contains SPECIFIC NAMED ENTITIES (geographic, brand/IP, cultural/historical).
      **If NO specific entity exists**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      Replace with SIMILAR but DIFFERENT entity:
      - Geographic: "Eiffel Tower" → "Tokyo Tower"; "Mount Fuji" → "Mount Rainier"; "Great Wall" → "Hadrian's Wall"
      - Brand/IP: "Nike" → "Adidas"; "iPhone" → "Samsung Galaxy"; "Mario" → "Sonic"; "Coca-Cola" → "Pepsi"
      - Cultural: "Samurai armor" → "Knight armor"; "Mona Lisa" → "Girl with a Pearl Earring"

      ## Constraints
      - Replace with SIMILAR TYPE of entity
      - Different specific identity but same general category
      - Scene context should still make sense

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by replacing specific entities with COMPLETELY DIFFERENT alternatives (severe - different category entirely).

      ## Applicability Check
      Check if the prompt contains SPECIFIC NAMED ENTITIES.
      **If NO specific entity exists**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      Replace with COMPLETELY DIFFERENT entity or fully generic:
      - Geographic: "Eiffel Tower" → "generic office building"; "Mount Fuji" → "flat desert"; "Statue of Liberty" → "abstract sculpture"
      - Brand/IP: "Nike swoosh" → "random curved line"; "Apple logo" → "generic fruit shape"; "Mario" → "generic cartoon character"
      - Cultural: "Samurai armor" → "modern business suit"; "Terracotta Warriors" → "mannequins"

      ## Constraints
      - Replace with COMPLETELY DIFFERENT category
      - Lose ALL specific identity
      - Creates clear entity recognition failure

  artistic_style:
    # Tests model's understanding of SPECIFIC ART MOVEMENTS and ARTIST STYLES
    # Requires art history knowledge to render correct visual features
    # Degradation direction: Specific Style → Different Style → Realistic (lose stylistic features)
    #
    # KEY INSIGHT: Must REPLACE all style-related words, not just artist names
    # "Picasso cubist" → removing "Picasso" but keeping "cubist" still produces cubist style!

    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by shifting artistic style to a DIFFERENT ARTIST within the SAME movement (mild - same movement, different artist).

      ## Applicability Check
      Check if the prompt contains SPECIFIC ARTISTIC REFERENCES:
      - Art movements: Cubism, Impressionism, Ukiyo-e, Art Nouveau, Baroque, Surrealism, Pop Art
      - Artist names: Van Gogh, Monet, Picasso, Hokusai, Warhol, Dalí, Klimt
      - Period styles: Renaissance, Victorian, Art Deco, Vaporwave, Cyberpunk

      **If NO artistic style reference exists**: Return the original prompt UNCHANGED.

      ## Modification Strategies

      Replace ARTIST NAME with DIFFERENT ARTIST from SAME movement:
      - "Van Gogh style" → "Monet style" (both Post-Impressionist)
      - "Picasso cubist" → "Braque cubist" (both Cubism founders)
      - "Hokusai ukiyo-e" → "Hiroshige ukiyo-e" (both Ukiyo-e masters)
      - "Dalí surrealist" → "Magritte surrealist" (both Surrealists)
      - "Klimt art nouveau" → "Mucha art nouveau" (both Art Nouveau)
      - "Warhol pop art" → "Lichtenstein pop art" (both Pop Art)

      ## Constraints
      - ONLY replace the artist name, keep the movement/style keyword
      - Stay within the SAME artistic movement
      - Different artist = different visual characteristics within same style family
      - Subject matter unchanged

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by shifting to a COMPLETELY DIFFERENT artistic movement (moderate - cross-movement change).

      ## Applicability Check
      Check if the prompt contains SPECIFIC ARTISTIC REFERENCES.
      **If NO artistic style reference exists**: Return the original prompt UNCHANGED.

      ## CRITICAL: REPLACE ALL style words, do NOT append or keep original

      ## Modification Strategies

      REPLACE artist AND movement with DIFFERENT movement entirely:
      - "Van Gogh post-impressionist" → "Mondrian geometric abstract" (NOT "Van Gogh Mondrian style")
      - "Picasso cubist, geometric faces" → "Renoir impressionist, soft brushwork" (REPLACE "geometric faces")
      - "Hokusai ukiyo-e, Japanese woodblock" → "traditional Chinese ink wash painting" (REMOVE "Japanese woodblock")
      - "Klimt art nouveau, gold leaf" → "Expressionist style, bold colors" (REMOVE "gold leaf")
      - "Dalí surrealist, dreamlike" → "Realist style, lifelike" (REPLACE "dreamlike")
      - "Baroque ornate" → "Minimalist clean lines"

      ## Movement Pairs (use contrasting movements):
      - Impressionism ↔ Expressionism
      - Cubism ↔ Realism
      - Surrealism ↔ Classical
      - Art Nouveau ↔ Bauhaus/Minimalism
      - Ukiyo-e ↔ Chinese ink wash
      - Pop Art ↔ Renaissance

      ## Constraints
      - REMOVE/REPLACE ALL original style keywords (artist name + movement + style descriptors)
      - Do NOT keep conflicting style words (no "Chinese ink wash, Japanese woodblock")
      - The new style should be VISUALLY DISTINCT from the original
      - Subject matter unchanged

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by shifting artistic style to REALISTIC/PHOTOGRAPHIC (severe - complete style removal).

      ## Applicability Check
      Check if the prompt contains SPECIFIC ARTISTIC REFERENCES.
      **If NO artistic style reference exists**: Return the original prompt UNCHANGED.

      ## CRITICAL: REMOVE ALL artistic style words completely

      ## Modification Strategies

      REPLACE entire artistic description with REALISTIC/PHOTOGRAPHIC:
      - "portrait in Picasso cubist style, geometric faces, abstract" → "realistic portrait photograph with natural features"
      - "wave in Hokusai ukiyo-e style, Japanese woodblock print" → "realistic ocean wave photograph"
      - "starry night in Van Gogh style, swirling sky, post-impressionist" → "realistic night sky photograph with stars"
      - "woman in Klimt art nouveau style, gold leaf, decorative" → "realistic photograph of a woman, simple background"
      - "melting clocks in Dalí surrealist style, dreamlike" → "realistic photograph of clocks"
      - "flowers in Monet impressionist style, soft brushwork" → "sharp photograph of flowers"

      ## Constraints
      - REMOVE ALL: artist names, movement names, style descriptors, technique words
      - Replace with: "realistic", "photograph", "photographic", "lifelike", "natural"
      - Remove abstract/artistic modifiers: "geometric", "dreamlike", "swirling", "decorative", "soft brushwork"
      - Add realistic modifiers if needed: "clear", "sharp", "natural", "plain background"
      - Subject matter unchanged (portrait→portrait, landscape→landscape)

  counter_intuitive:
    # Tests model's ability to OVERRIDE TRAINING PRIORS and generate IMPOSSIBLE scenes
    # This is the highest-level "complex reasoning" test
    #
    # SPECIAL DEGRADATION LOGIC: Here "normal/common" = LOW alignment
    # The NEGATIVE sample is the "sensible" image that IGNORES the impossible instruction
    # Covers: Physics violations, Size inversions, Attribute contradictions

    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by making COUNTER-INTUITIVE elements MORE NORMAL (mild - reduce impossibility).

      ## Applicability Check
      First, check if the prompt contains COUNTER-INTUITIVE elements that violate common sense:

      **Physics violations** - look for:
      - floating, hovering, levitating, suspended in air, defying gravity
      - water flowing upward, reverse gravity, walking on water
      - fire underwater, burning in water, frozen fire
      - passing through solid, phasing through

      **Size inversions** - look for:
      - "giant" + normally small things (giant ant, giant mouse, giant insect)
      - "tiny" + normally large things (tiny elephant, tiny building, tiny whale)
      - unnatural size comparisons: "larger than", "bigger than", "smaller than" with reversed expectations

      **Attribute contradictions** - look for:
      - Unnatural colors: blue strawberry, green sun, purple grass, pink snow, black fire
      - Unnatural shapes: square sun, triangular moon, cubic watermelon
      - Contradictory states: transparent solid, burning ice, dry water, solid cloud

      **If NO counter-intuitive element exists**: Return the original prompt UNCHANGED.

      ## SPECIAL NOTE: Degradation Direction is REVERSED
      Here, making it MORE REALISTIC = LOWER alignment (negative sample)
      The model should OBEY the impossible instruction, not "correct" it

      ## Modification Strategies

      Make the impossible element LESS EXTREME:
      - "floating rock" → "rock on unstable surface"
      - "giant mouse scaring elephant" → "large mouse near nervous elephant"
      - "blue strawberry" → "slightly bluish strawberry"
      - "square sun" → "oddly shaped sun"
      - "transparent apple" → "translucent apple"

      ## Constraints
      - Reduce the DEGREE of impossibility
      - Still unusual but more plausible
      - Partial "correction" toward reality

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by making COUNTER-INTUITIVE elements PARTIALLY NORMAL (moderate - significant reality correction).

      ## Applicability Check
      Check if the prompt contains COUNTER-INTUITIVE elements:
      - **Physics violations**: floating, hovering, defying gravity, water upward, fire underwater
      - **Size inversions**: giant + small thing, tiny + large thing, unnatural size comparisons
      - **Attribute contradictions**: unnatural colors, shapes, or states

      **If NO counter-intuitive element exists**: Return the original prompt UNCHANGED.

      ## SPECIAL NOTE: Degradation = Making it MORE REALISTIC
      "符合常识" = "低对齐度" in this dimension

      ## Modification Strategies

      Make the impossible element MOSTLY NORMAL:
      - "floating rock" → "rock on the ground"
      - "giant mouse scaring elephant" → "mouse near elephant" (normal sizes)
      - "blue strawberry" → "red strawberry with blue lighting"
      - "square sun" → "round sun"
      - "water flowing upward" → "water splashing"
      - "fire underwater" → "fire near water"

      ## Constraints
      - Significantly reduce impossibility
      - Find "reasonable explanation" for the unusual element
      - Model "corrects" the physically impossible to plausible

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to create MISALIGNMENT by making COUNTER-INTUITIVE elements COMPLETELY NORMAL (severe - full reality reversion).

      ## Applicability Check
      Check if the prompt contains COUNTER-INTUITIVE elements:
      - **Physics violations**: floating, hovering, defying gravity, impossible physics
      - **Size inversions**: giant + small thing, tiny + large thing
      - **Attribute contradictions**: unnatural colors, shapes, or states

      **If NO counter-intuitive element exists**: Return the original prompt UNCHANGED.

      ## SPECIAL NOTE: Full "Common Sense" = LOWEST alignment
      The negative sample is a PERFECTLY NORMAL image that IGNORES the impossible instruction

      ## Modification Strategies

      Replace impossible element with COMPLETELY NORMAL version:
      - "floating rock in air" → "rock lying on ground"
      - "giant mouse scaring tiny elephant" → "tiny mouse and large elephant"
      - "blue strawberry" → "red strawberry"
      - "square sun" → "round yellow sun"
      - "transparent apple" → "normal red apple"
      - "moon larger than sun" → "normal moon and sun"
      - "green fire" → "orange fire"
      - "upside-down house" → "normal house"

      ## Constraints
      - COMPLETELY REVERT to common sense/reality
      - The result is what model's "prior knowledge" would predict
      - This is the "model ignored the instruction" failure mode
