# Technical Quality Degradation Prompt Templates
# 技术质量退化策略 [Technical View]
# 属性: blur, exposure_issues, low_contrast, color_distortion, color_banding

technical_quality:
  blur:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of BLUR (mild level - subtle softness).

      ## CRITICAL RULE
      You MUST preserve ALL original content (subjects, objects, scene, composition). Do NOT change the scene or viewpoint.

      ## Strategy
      Choose ONE approach:
      1. Replace sharpness words IN-PLACE: "sharp" → "soft focus", "crisp" → "slightly blurry", "detailed" → "softly rendered"
      2. If no sharpness words, APPEND at the end: ", soft focus, slightly blurry"

      ## Effective Modifiers
      "soft focus", "slightly blurry", "gently blurred edges", "subtle softness"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of BLUR (moderate level - clearly noticeable lack of focus).

      ## CRITICAL RULE
      You MUST preserve ALL original content (subjects, objects, scene, composition). Do NOT change the scene or viewpoint.

      ## Strategy
      Choose ONE approach:
      1. Replace sharpness words IN-PLACE: "sharp" → "blurry", "crisp" → "out of focus", "detailed" → "unfocused"
      2. If no sharpness words, APPEND at the end: ", blurry, out of focus, lacking sharpness"

      ## Effective Modifiers
      "blurry", "out of focus", "unfocused", "lacking sharpness", "unclear details"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of BLUR (severe level - heavily out of focus, details lost).

      ## CRITICAL RULE
      You MUST preserve ALL original content (subjects, objects, scene, composition). Do NOT change the scene or viewpoint.

      ## Strategy
      Choose ONE approach:
      1. Replace sharpness words IN-PLACE: "sharp" → "very blurry", "crisp" → "heavily defocused", "detailed" → "extremely blurred"
      2. If no sharpness words, APPEND at the end: ", very blurry, heavily out of focus, extremely unclear, nothing sharp"

      ## Effective Modifiers
      "very blurry", "heavily out of focus", "extremely unclear", "nothing sharp", "severely blurred", "completely defocused", "heavy gaussian blur"

  exposure_issues:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of EXPOSURE (mild level - slightly too bright or too dark).

      ## CRITICAL RULE
      You MUST preserve the core subject and scene, but REMOVE/REPLACE words that describe good exposure or visibility.

      ## Step 0: Choose ONE direction based on scene
      - TOO DARK for: night, indoor, dark environments, forests, shadows
      - TOO BRIGHT for: beach, snow, sunny outdoor, bright sky, daytime

      ## Strategy: REMOVE + REPLACE + APPEND
      1. REMOVE these exposure-positive words: "perfectly exposed", "visible details", "detailed", "rich colors"
      2. REPLACE lighting words to match your direction:
         - For TOO DARK: "bright" → "dim", "sunlit" → "shadowy", "warm glow" → "faint glow"
         - For TOO BRIGHT: "shaded" → "harsh sunlight", "soft light" → "blinding light"
      3. APPEND at end: ", slightly too bright" or ", slightly too dark"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of EXPOSURE (moderate level - clearly too bright or too dark).

      ## CRITICAL RULE
      You MUST preserve the core subject and scene, but REMOVE/REPLACE words that describe good exposure or visibility.

      ## Step 0: Choose ONE direction based on scene
      - TOO DARK for: night, indoor, dark environments, forests, shadows
      - TOO BRIGHT for: beach, snow, sunny outdoor, bright sky, daytime

      ## Strategy: REMOVE + REPLACE + APPEND
      1. REMOVE these words: "perfectly exposed", "visible details", "detailed", "rich", "vibrant"
      2. REPLACE lighting words:
         - For TOO DARK: "bright" → "dark", "sunlit" → "in shadow", "warm glow" → "dim"
         - For TOO BRIGHT: "shaded" → "in harsh sun", "balanced" → "washed out"
      3. APPEND at end: ", too bright, washed out" or ", too dark, hard to see"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of EXPOSURE (severe level - extremely too bright or too dark).

      ## CRITICAL RULE - PRESERVE CONTENT!
      You MUST keep most of the original prompt. Only remove DIRECT exposure words.
      Keep descriptive words like "dramatic", "rich colors", "detailed" - these describe CONTENT, not exposure!

      ## Step 0: Choose ONE direction based on scene
      - TOO DARK for: night, indoor, dark environments, forests, shadows, evening
      - TOO BRIGHT for: beach, snow, sunny outdoor, bright sky, daytime, windows

      ## Strategy: ADD PREFIX + MINIMAL REMOVE + APPEND

      1. ADD exposure prefix at BEGINNING (CRITICAL for strong effect!):
         - For TOO DARK: "Dark underexposed "
         - For TOO BRIGHT: "Extremely overexposed blindingly bright "

      2. REMOVE ONLY these EXACT words/phrases (nothing else!):
         - "perfectly exposed", "well-balanced", "balanced exposure", "well-lit"
         - Do NOT remove similar phrases! Keep "visible details", "darker areas", "warm glow", etc.
         - KEEP all "lighting" descriptions unchanged! ("even lighting", "soft lighting", etc.)
         - When in doubt, KEEP the original words!

      3. APPEND at end:
         - For TOO DARK: ", very dark, hard to see details"
         - For TOO BRIGHT: ", completely blown out to white, no visible detail"

      ## Examples
      - "A dramatic landscape at sunset with rich colors in the sky and detailed foreground"
        → "Extremely overexposed blindingly bright dramatic landscape at sunset with rich colors in the sky and detailed foreground, completely blown out to white, no visible detail"

      - "A beach scene at midday with visible sand texture and cloud details in bright sky"
        → "Extremely overexposed blindingly bright beach scene at midday with visible sand texture and cloud details in bright sky, completely blown out to white, no visible detail"

      - "A night cityscape with balanced exposure showing lit windows and dark building details"
        → "Dark underexposed night cityscape showing lit windows and dark building details, very dark, hard to see details"

      ## AVOID
      - Removing content words (dramatic, rich, detailed, vibrant, etc.)
      - "in [adjective] light" phrases - triggers light source generation!
      - Changing lighting descriptions
      - "silhouette", "high key", "low key" (trigger art styles)

  low_contrast:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of CONTRAST (mild level - soft, flat tonal range).

      ## CRITICAL RULE
      You MUST preserve ALL original content (subjects, objects, scene). REMOVE or REPLACE words that imply strong contrast.

      ## Strategy
      1. REMOVE/REPLACE contrast-boosting words:
         - "vibrant" → "muted", "dramatic" → "flat", "bold" → "soft"
         - "bright sunlight" → "overcast light", "golden hour" → "cloudy day"
         - "deep shadows" → "soft shadows", "rich colors" → "muted colors"
      2. APPEND at end: ", soft contrast, muted tones"

      ## Effective Modifiers
      "soft contrast", "muted tones", "flat lighting", "gentle tonal range"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of CONTRAST (moderate level - visibly flat, lacking depth).

      ## CRITICAL RULE
      You MUST preserve ALL original content (subjects, objects, scene). REMOVE or REPLACE words that imply strong contrast.

      ## Strategy
      1. REMOVE/REPLACE contrast-boosting words:
         - "vibrant" → "dull", "dramatic" → "flat", "bold" → "washed out"
         - "bright sunlight" → "flat overcast", "golden hour" → "gray day"
         - "deep shadows" → "milky shadows", "rich" → "faded"
      2. APPEND at end: ", low contrast, flat tones, lacking depth"

      ## Effective Modifiers
      "low contrast", "flat tones", "washed out", "milky shadows", "dull highlights"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of CONTRAST (severe level - gray, muddy, no tonal separation).

      ## CRITICAL RULE
      You MUST preserve ALL original content (subjects, objects, scene). REMOVE or REPLACE words that imply strong contrast.

      ## Strategy
      1. REMOVE/REPLACE contrast-boosting words FIRST:
         - "vibrant/colorful" → "gray", "dramatic" → "extremely flat"
         - "bright sunlight/golden hour" → "flat gray light"
         - "deep shadows" → "no shadows", "rich colors" → "muddy gray tones"
         - "warm/cool" → remove or replace with "gray"
      2. APPEND at end: ", zero contrast, everything muddy gray, no tonal separation"

      ## Effective Modifiers
      "zero contrast", "muddy gray", "no tonal separation", "extremely flat", "all midtone gray"

      ## Example
      - "A city street at golden hour with warm sunlight on red brick buildings and long shadows"
        → "A city street on a gray overcast day with flat light on brick buildings, zero contrast, everything muddy gray, no tonal separation"

  color_distortion:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of COLOR DISTORTION (mild level - slight color cast/tint).

      ## What is Color Distortion?
      The entire image has an unnatural color tint/cast. Colors are shifted toward one hue (greenish, yellowish, etc.)

      ## CRITICAL RULE - APPEND ONLY!
      You MUST keep the ENTIRE original prompt EXACTLY as-is. Only APPEND a short modifier at the very end.
      DO NOT rewrite, rephrase, or modify ANY part of the original prompt!

      ## Strategy: APPEND-ONLY (pick ONE phrase)
      - ", with a subtle greenish tint"
      - ", slight yellow color cast"
      - ", faint magenta tint overall"

      ## Format
      [ORIGINAL PROMPT UNCHANGED] + [ONE modifier from above]

      ## Example
      - Original: "A portrait with natural healthy skin tones"
        → Output: "A portrait with natural healthy skin tones, with a subtle greenish tint"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of COLOR DISTORTION (moderate level - noticeable color cast).

      ## What is Color Distortion?
      The entire image has an unnatural color tint/cast. Colors look wrong - skin looks greenish, whites look yellow, etc.

      ## CRITICAL RULE - APPEND ONLY!
      You MUST keep the ENTIRE original prompt EXACTLY as-is. Only APPEND a short modifier at the very end.
      DO NOT rewrite, rephrase, or modify ANY part of the original prompt!

      ## Strategy: APPEND-ONLY (pick ONE phrase)
      - ", with noticeable green color cast"
      - ", visible yellow-green tint throughout"
      - ", colors shifted toward cyan"

      ## Format
      [ORIGINAL PROMPT UNCHANGED] + [ONE modifier from above]

      ## Example
      - Original: "A vibrant garden with green grass and red roses"
        → Output: "A vibrant garden with green grass and red roses, with noticeable green color cast"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of COLOR DISTORTION (severe level - extreme unnatural colors).

      ## What is Color Distortion?
      Severe color distortion means colors are completely wrong - skin has green/purple tints, white objects look yellow/green, colors are psychedelic and unnatural.

      ## KEY INSIGHT
      Abstract terms like "color distortion", "broken RGB" don't work - SDXL doesn't understand them!
      You MUST use CONCRETE COLOR DESCRIPTIONS that SDXL can render.

      ## Effective Terms (use SPECIFIC colors, pick 1-2 only)
      - For skin: "greenish skin", "slightly purple tinted skin", "yellowish skin tone"
      - For objects: "with slight green tint", "with color cast"
      - General: "unnatural colors", "wrong white balance"

      ## Strategy: REPLACE color words OR APPEND (not both heavily)

      1. If prompt has color words, REPLACE with slightly wrong colors:
         - "natural skin tones" → "greenish skin tones"
         - "white [object]" → "yellowish [object]"
         - "blue sky" → "purple tinted sky"

      2. APPEND ONE color modifier at the end (keep it simple):
         - ", with green color cast"
         - ", unnatural color tones"
         - ", wrong white balance"

      ## Examples
      - "A portrait with natural healthy skin tones"
        → "A portrait with greenish unhealthy skin tones, wrong white balance"

      - "A white cat sitting on a wooden table"
        → "A white cat with yellowish fur sitting on a wooden table, with green color cast"

      - "A landscape with mountains and blue sky"
        → "A landscape with mountains and purple tinted sky, unnatural colors"

      ## Constraints
      - Use only 1-2 color modifiers (too many = too extreme)
      - Keep the scene recognizable

      ## AVOID
      - "chromatic aberration" (edge effect, not color distortion)
      - "8-bit", "posterized" (these are color_banding)
      - Changing the subject or scene content

  color_banding:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have COLOR BANDING (mild level - subtle visible color steps in gradients).

      ## What is Color Banding?
      Gradients show visible "stair-step" color bands instead of smooth transitions. Like a low bit-depth image.

      ## CRITICAL RULE
      REMOVE words that describe smooth gradients - they CONFLICT with color banding!

      ## Strategy: REMOVE + APPEND
      1. REMOVE/REPLACE smooth-gradient words:
         - "smooth gradient" → "gradient"
         - "seamlessly blending" → "blending"
         - "imperceptibly" → remove
      2. APPEND: ", with visible color steps, slightly posterized"

      ## Example
      - "A sunset sky with smooth gradient colors blending seamlessly"
        → "A sunset sky with gradient colors blending, with visible color steps, slightly posterized"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have COLOR BANDING (moderate level - clearly visible color banding).

      ## CRITICAL RULE
      REMOVE words that describe smooth gradients - they CONFLICT with color banding!

      ## Strategy: REMOVE + APPEND
      1. REMOVE/REPLACE smooth-gradient words:
         - "smooth gradient" → "banded gradient"
         - "seamlessly/imperceptibly" → remove
         - "smooth" → remove when describing gradients
      2. APPEND: ", posterized colors, visible color bands"

      ## Example
      - "A portrait with smooth gradient background, colors blending seamlessly"
        → "A portrait with banded gradient background, posterized colors, visible color bands"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have COLOR BANDING (severe level - heavy posterization with obvious color steps).

      ## What is Color Banding?
      Severe = posterization. Gradients become distinct flat color bands instead of smooth transitions.

      ## CRITICAL RULE - REMOVE CONFLICTS!
      MUST remove words describing smooth gradients - they directly conflict with color banding!

      ## Strategy: ADD PREFIX + REMOVE + APPEND

      1. ADD prefix: "Posterized "

      2. REMOVE/REPLACE conflicting words:
         - "smooth gradient" → "banded gradient"
         - "colors blending seamlessly/imperceptibly" → "colors with visible steps"
         - "smooth atmospheric" → "atmospheric"
         - Remove: "seamlessly", "imperceptibly", "smooth" (for color/gradient)

      3. APPEND: ", heavily posterized, distinct color bands, low bit depth look"

      ## Examples
      - "A minimalist scene with large smooth gradient wall, colors blending imperceptibly"
        → "Posterized minimalist scene with large banded gradient wall, colors with visible steps, heavily posterized, distinct color bands, low bit depth look"

      - "A foggy forest scene with smooth atmospheric haze, mist fading seamlessly"
        → "Posterized foggy forest scene with atmospheric haze, mist fading with color steps, heavily posterized, distinct color bands, low bit depth look"

      ## Effective Keywords
      - "posterized" - triggers color quantization
      - "banded gradient" - describes visual result
      - "distinct color bands" - explicit description
      - "low bit depth look" - technical trigger

      ## AVOID keeping these (they conflict!):
      - "smooth", "seamlessly", "imperceptibly"
