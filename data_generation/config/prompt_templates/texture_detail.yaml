# Texture & Detail Degradation Prompt Templates
# 纹理与细节退化策略 [Technical View] - AIGC模型的典型弱点
# 属性: over_smoothing, texture_artifacts, repetitive_patterns, edge_artifacts

texture_detail:
  over_smoothing:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of OVER-SMOOTHING (mild level - slightly airbrushed look).

      ## What is Over-Smoothing?
      Surfaces (especially skin) lose natural micro-texture and appear artificially smooth, like beauty filter effects. The image is still sharp, but texture details are flattened.

      ## Strategy
      Choose ONE of the following approaches:

      1. REPLACE texture adjectives IN-PLACE (only replace the adjective, keep everything else):
         - "natural skin" → "slightly airbrushed skin"
         - "detailed" → "softened"
         - "textured" → "smooth"
         - "visible pores" → "smooth"

      2. APPEND at the end (if no texture words exist):
         - ", with slightly airbrushed smooth skin"
         - ", digitally smoothed appearance"

      ## AVOID
      - Changing subject identity (child→adult, etc.)
      - Negative expressions ("no pores", "lacking texture")
      - "mannequin", "wax figure"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of OVER-SMOOTHING (moderate level - heavy beauty filter appearance).

      ## What is Over-Smoothing?
      At moderate level, skin looks like it has heavy beauty filter applied, surfaces appear unnaturally uniform and overly smooth.

      ## Strategy
      Choose ONE of the following approaches:

      1. REPLACE texture adjectives IN-PLACE (only replace the adjective, keep everything else):
         - "natural skin" → "smooth airbrushed skin"
         - "detailed" → "overly smooth"
         - "textured" → "smooth"
         - "visible pores" → "smooth airbrushed"

      2. APPEND at the end (if no texture words exist):
         - ", with smooth airbrushed skin, overly smooth appearance"
         - ", digitally smoothed, beauty-filtered skin"

      ## AVOID
      - Changing subject identity (child→adult, etc.)
      - Negative expressions ("devoid of", "lacking", "without texture")
      - "plastic", "waxy", "artificial" (may cause non-human appearance)
      - "mannequin", "wax figure"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of OVER-SMOOTHING (severe level - plastic/waxy smooth appearance with no skin texture).

      ## What is Over-Smoothing?
      At severe level, skin looks like plastic or wax, completely devoid of natural texture - no pores, no fine lines, no skin detail whatsoever. Like a mannequin or heavily CGI-rendered face.

      ## Effective Terms (examples, not limited to these)
      - "plastic smooth waxy skin", "mannequin-like skin"
      - "CGI rendered smooth face", "3D render skin"
      - "heavily retouched with no texture", "no visible pores or skin detail"
      - "extreme beauty filter effect", "doll-like smooth skin"

      ## Strategy
      COMBINE multiple approaches for maximum effect:

      1. REPLACE texture adjectives IN-PLACE (if they exist):
         Find texture-related words and replace them with smoothing terms.
         - "natural skin/pores/texture" → "plastic smooth waxy skin"
         - "visible pores" → "no visible pores"
         - "weathered/sun-damaged/rough skin" → "plastic smooth waxy skin"

      2. ALWAYS APPEND additional smoothing modifiers at the END:
         Even after replacing, add 1-2 more terms for stronger effect:
         - ", heavily airbrushed, no visible pores"
         - ", CGI rendered smooth face, mannequin-like"
         - ", extreme beauty filter, doll-like skin"
         - ", 3D render skin, no skin texture visible"

      ## CRITICAL: Content Preservation
      - KEEP content words like "sweat", "dirt", "freckles" - only replace texture descriptions
      - KEEP all original elements: clothing, accessories, background, pose, action
      - Only modify SKIN-related texture descriptions

      ## Examples
      - "A basketball player with sweat on skin, showing natural pores and texture"
        → "A basketball player with sweat on skin, showing plastic smooth waxy skin, heavily airbrushed"

      - "A fisherman with weathered, sun-damaged skin and deep wrinkles"
        → "A fisherman with plastic smooth waxy skin and faint wrinkle lines, heavily airbrushed"

      ## Constraints
      - Use 2-3 smoothing terms (not too many, or other elements get ignored)
      - DO NOT change subject identity
      - DO NOT remove content words from original prompt


  texture_artifacts:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of TEXTURE ARTIFACTS (mild level - subtle texture structural problems).

      ## What is Texture Artifacts? (Different from over_smoothing!)
      - over_smoothing = texture is MISSING (too smooth, no detail)
      - texture_artifacts = texture EXISTS but has STRUCTURAL PROBLEMS (seams, grid patterns, discontinuity)

      ## CRITICAL RULE
      Keep the ENTIRE original prompt unchanged. Only APPEND 1-2 short modifiers at the END.

      ## Effective Terms (pick 1-2 only)
      - "with subtle texture seams"
      - "slightly blocky texture"
      - "minor texture discontinuity"
      - "faint grid pattern in texture"

      ## Strategy: APPEND-ONLY (keep it SHORT!)
      - "[original prompt], with subtle texture seams visible"
      - "[original prompt], slightly blocky texture pattern"

      ## Examples
      - "A wooden table" → "A wooden table, with subtle texture seams visible"
      - "A brick wall" → "A brick wall, slightly blocky texture pattern"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of TEXTURE ARTIFACTS (moderate level - visible texture structural problems).

      ## What is Texture Artifacts? (Different from over_smoothing!)
      - over_smoothing = texture is MISSING (too smooth)
      - texture_artifacts = texture EXISTS but has STRUCTURAL PROBLEMS (seams, grid, breaks)

      ## CRITICAL RULE
      Keep the ENTIRE original prompt unchanged. Only APPEND 1-2 short modifiers at the END.

      ## Effective Terms (pick 1-2 only)
      - "with visible texture seams"
      - "blocky pixelated texture"
      - "texture with grid-like pattern"
      - "tiled texture appearance"
      - "discontinuous broken texture"

      ## Strategy: APPEND-ONLY (keep it SHORT!)
      - "[original prompt], with visible texture seams"
      - "[original prompt], blocky tiled texture appearance"

      ## Examples
      - "A carpet in a living room" → "A carpet in a living room, with visible texture seams"
      - "A stone wall" → "A stone wall, blocky tiled texture pattern"

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of TEXTURE ARTIFACTS (severe level - obvious texture structural problems like checkerboard, seams, breaks).

      ## What is Texture Artifacts? (Different from over_smoothing!)
      - over_smoothing = texture is MISSING (too smooth, plastic)
      - texture_artifacts = texture EXISTS but has SEVERE STRUCTURAL PROBLEMS

      ## CRITICAL RULE
      Keep the ENTIRE original prompt unchanged. Only APPEND 1-2 short modifiers at the END.
      DO NOT add long descriptions - this causes content/viewpoint changes!

      ## Effective Terms (pick 1-2 only)
      - "with obvious checkerboard texture pattern"
      - "heavily blocky pixelated texture"
      - "with broken discontinuous texture seams"
      - "grid-like texture artifacts"
      - "severely tiled repetitive texture"

      ## Strategy: APPEND-ONLY (keep it SHORT!)
      - "[original prompt], with checkerboard texture pattern"
      - "[original prompt], heavily blocky broken texture"

      ## Examples
      - "A fabric close-up" → "A fabric close-up, with checkerboard texture artifacts"
      - "A wooden floor" → "A wooden floor, heavily blocky tiled texture"

      ## AVOID
      - Long multi-phrase descriptions (causes content changes)
      - "smooth", "plastic", "waxy" (overlaps with over_smoothing)
      - More than 2 modifiers

  repetitive_patterns:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have REPETITIVE PATTERNS in the background/surface (mild level).

      ## CRITICAL RULE
      Keep the ENTIRE original prompt. Only APPEND a short modifier describing repetition of SPECIFIC texture.

      ## Strategy: APPEND specific texture repetition
      Identify the background/surface material, then append its repetition:
      - wooden table → ", with subtle repetition of grain patterns"
      - stone floor → ", with subtle repetition of stone patterns"
      - grass field → ", with subtle repetition of grass texture"

      ## Example
      - "A cup on a wooden table with natural grain"
        → "A cup on a wooden table with natural grain, with subtle repetition of grain patterns"

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have REPETITIVE PATTERNS in the background/surface (moderate level).

      ## CRITICAL RULE
      Keep the ENTIRE original prompt. Only APPEND modifier describing visible repetition of SPECIFIC texture.

      ## Strategy: APPEND specific texture repetition
      - wooden table → ", with visible repetition of grain patterns across the surface"
      - stone tiles → ", with visible repetition of stone patterns throughout"
      - forest background → ", with visible repetition of foliage patterns"

      ## Example
      - "A cup on a wooden table with natural grain"
        → "A cup on a wooden table with natural grain, with visible repetition of grain patterns across the surface"

    severe: |
      # Task
      Rewrite the prompt so the image has REPETITIVE PATTERNS in background texture.

      ## CRITICAL RULES
      1. Keep the ENTIRE original prompt EXACTLY as-is
      2. Only APPEND ONE short phrase (5-7 words max)
      3. DO NOT modify or replace ANY words from original prompt
      4. Choose modifier that MATCHES the background material in the prompt!

      ## Strategy: APPEND-ONLY

      ### APPEND phrases - MUST match background material!
      - Fabric/cloth/linen/tablecloth: ", synthetic fabric material"
      - Wood/table: ", fake wood laminate texture"
      - Stone/tiles/cobblestone: ", fake stone tile pattern"
      - Grass/field: ", artificial turf texture"
      - Forest/trees/foliage: ", CG rendered foliage"
      - General/other: ", CG rendered background"

      ## Examples
      - "A book on a natural linen tablecloth with subtle texture variation"
        → "A book on a natural linen tablecloth with subtle texture variation, synthetic fabric material"

      - "A coffee cup on a wooden table with natural grain patterns"
        → "A coffee cup on a wooden table with natural grain patterns, fake wood laminate texture"

      - "A cat sitting on natural stone tiles with varied patterns and colors"
        → "A cat sitting on natural stone tiles with varied patterns and colors, fake stone tile pattern"

      - "A portrait of a woman against a natural outdoor forest background"
        → "A portrait of a woman against a natural outdoor forest background, CG rendered foliage"

      ## AVOID
      - Using modifier that doesn't match background! (e.g., don't use "turf" for forest)
      - "surface" (may trigger top-down camera angle)
      - "repeated", "identical", "grid-like"
      - Modifying original prompt words 

  edge_artifacts:
    mild: |
      # Task
      Append quality degradation modifiers to trigger MILD edge artifacts.

      ## Rules
      1. Keep original prompt UNCHANGED
      2. Append quality modifiers that affect edge rendering

      ## Modifiers (pick ONE)
      - ", low resolution"
      - ", slightly compressed"
      - ", minor jpeg artifacts"

      ## Examples
      - "A cat portrait"
        → "A cat portrait, low resolution"

    moderate: |
      # Task
      Append quality degradation modifiers to trigger MODERATE edge artifacts.

      ## Rules
      1. Keep original prompt UNCHANGED
      2. Append quality modifiers

      ## Modifiers (pick ONE)
      - ", low resolution, compressed"
      - ", jpeg compression artifacts"
      - ", low quality edges"
      - ", poorly rendered edges"

      ## Examples
      - "A cat sitting on sofa"
        → "A cat sitting on sofa, low resolution, compressed"

    severe: |
      # Task
      Append quality degradation modifiers to trigger SEVERE edge artifacts.

      ## Rules
      1. Keep original prompt UNCHANGED
      2. Append strong quality degradation modifiers
      3. Focus on compression and resolution issues that affect edges

      ## Modifiers (pick ONE)
      - ", very low resolution, heavy jpeg compression, rough edges"
      - ", heavily compressed, visible compression artifacts on edges"
      - ", low quality, jpeg artifacts, poorly defined edges"
      - ", extremely compressed, blocky edges, low resolution"
      - ", poor image quality, compression artifacts, rough edge rendering"
      - ", low res, heavy compression, jagged rough edges"

      ## Examples
      - "A cat portrait"
        → "A cat portrait, very low resolution, heavy jpeg compression, rough edges"

      - "A person with curly hair"
        → "A person with curly hair, heavily compressed, visible compression artifacts on edges"

      - "A bird on branch"
        → "A bird on branch, low quality, jpeg artifacts, poorly defined edges"

      - "A tree in park"
        → "A tree in park, extremely compressed, blocky edges, low resolution"

      ## WHY THIS WORKS
      - "low resolution" and "compressed" affect edge quality without changing colors
      - "jpeg artifacts" creates edge degradation naturally
      - These terms don't change the scene content or color palette

      ## AVOID
      - "purple fringing", "chromatic aberration" (changes colors)
      - "halo" (adds glow effects)
      - Terms that change the overall image style
      - "pixelated", "blocky", "staircase" (影响整体或生成实际物体)
      - "glow", "halo", "bleeding" (产生发光或血液效果)
      - "CGI", "render", "3D" (改变风格)
      - "jagged", "angular", "faceted" (触发几何/卡通风格)
