# Visual Quality Degradation Prompt Templates
# 按子类别分组，每个属性有 mild/moderate/severe 三个版本

low_visual_quality:
  blur:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of BLUR/FOCUS (mild level - subtle softness).

      ## Core Principle
      - DO NOT add physical objects (frosted glass, steamy window, etc.)
      - DO NOT change the scene or composition
      - ONLY add/replace adjectives that describe IMAGE QUALITY

      ## Effective Blur Modifiers (USE THESE - combine for stronger effect)
      - "soft focus", "slightly blurry", "gently unfocused"
      - "with blurred edges", "lacking sharpness"
      - "low resolution", "poorly focused"

      ## Strategies

      1. Add blur modifier at the BEGINNING + END (RECOMMENDED for stronger effect):
         "soft focus [rest of prompt], with blurred edges, lacking sharpness"
         "slightly blurry [rest of prompt], poorly focused, low resolution"
         (e.g., "cat on table" → "soft focus cat on table, with blurred edges, lacking sharpness")

      2. REPLACE sharpness words with blur words:
         "sharp" → "soft and blurry"
         "crisp" → "slightly blurry"
         "in focus" → "soft focus"
         "detailed" → "lacking detail"
         "readable" → "slightly illegible"
         DELETE: "high resolution", "every [X] in focus"

      ## Constraints
      - DO NOT add physical objects or change the scene
      - Keep the same subject, setting, and composition
      - Use MULTIPLE blur modifiers for visible effect

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of BLUR/FOCUS (moderate level - clearly noticeable blur).

      ## Core Principle
      - DO NOT add physical objects (frosted glass, steamy window, etc.)
      - DO NOT change the scene or composition
      - ONLY add/replace adjectives that describe IMAGE QUALITY

      ## Effective Blur Modifiers (USE THESE - combine for stronger effect)
      - "blurry", "out of focus", "unfocused", "defocused"
      - "with gaussian blur", "lens blur effect"
      - "low quality blurry photo", "unfocused amateur photo"

      ## Strategies

      1. Add blur modifier at BEGINNING + END (RECOMMENDED for stronger effect):
         "blurry out of focus [rest of prompt], with gaussian blur, defocused"
         "unfocused blurry [rest of prompt], lens blur effect, low quality"
         (e.g., "cat on table" → "blurry out of focus cat on table, with gaussian blur, defocused")

      2. REPLACE sharpness words with blur words:
         "sharp" → "blurry and unfocused"
         "crisp" → "out of focus"
         "in focus" → "defocused"
         "detailed" → "blurred"
         "readable" → "illegible due to blur"
         DELETE: "high resolution", "sharp throughout", "every [X] in focus"

      ## Constraints
      - DO NOT add physical objects or change the scene
      - DO NOT use motion blur or camera shake
      - Use MULTIPLE blur modifiers for clearly visible effect

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of BLUR/FOCUS (severe level - heavily blurred).

      ## Core Principle
      - DO NOT add physical objects (frosted glass, steamy window, vaseline lens, etc.)
      - DO NOT change the scene or composition
      - ONLY add/replace adjectives that describe IMAGE QUALITY

      ## Effective Blur Modifiers (USE THESE - combine ALL for maximum effect)
      - "very blurry", "heavily blurred", "extremely out of focus"
      - "severely defocused", "with heavy gaussian blur"
      - "extremely low quality blurry photo", "completely unfocused"
      - "bokeh blur everywhere", "nothing in focus"

      ## Strategies

      1. Add MULTIPLE blur modifiers at BEGINNING + END (REQUIRED):
         "very blurry heavily defocused [rest of prompt], extremely out of focus, with heavy gaussian blur, nothing sharp"
         "extremely blurry unfocused [rest of prompt], severe blur, completely defocused, low quality"
         (e.g., "cat on table" → "very blurry heavily defocused cat on table, extremely out of focus, with heavy gaussian blur")

      2. REPLACE ALL sharpness words with strong blur words:
         "sharp" → "very blurry"
         "crisp" → "heavily blurred"
         "in focus" → "extremely out of focus"
         "detailed" → "blurred beyond recognition"
         "readable" → "completely illegible"
         DELETE ALL: "high resolution", "sharp", "crisp", "detailed", "in focus"

      ## Constraints
      - DO NOT add physical objects like frosted glass, steamy window, vaseline lens
      - DO NOT change the scene or composition
      - Use MULTIPLE blur modifiers (at least 3-4) for maximum effect
      - Scene should still be recognizable but heavily blurred

  noise:
    mild: |
      # Task
      Rewrite the prompt to introduce a MILD layer of grainy/speckled texture (noise) using only adjectives/modifiers, WITHOUT changing the scene description.

      ## Core Principle
      - DO NOT change the scene (e.g., don't say "seen on TV", "through monitor")
      - ONLY add texture adjectives that describe the IMAGE SURFACE
      - Interpret "noise" as a surface texture overlay

      ## Strategies

      1. Add texture adjectives to the image/photo type:
         (e.g., "A photo of a cat" → "A slightly grainy photo of a cat";
          "A portrait" → "A textured, slightly speckled portrait";
          "A landscape" → "A rough-textured landscape with faint grain")

      2. Use "High ISO" modifiers (natural mild noise):
         (e.g., "woman smiling" → "woman smiling, shot with high ISO, with slight sensor grain";
          "street scene" → "street scene with subtle high-ISO texture";
          "night photo" → "night photo with faint ISO grain")

      3. Add subtle "dot" texture modifiers:
         (e.g., "product shot" → "product shot with faint stippling texture";
          "indoor scene" → "indoor scene with subtle speckled surface";
          "food photo" → "food photo with fine grain overlay")

      ## Constraints
      - DO NOT change the scene or add new objects/context
      - ONLY add adjectives: grainy, speckled, high-ISO, textured, rough, stippled
      - Mild level = faint texture overlay, subject clearly visible

    moderate: |
      # Task
      Rewrite the prompt to introduce a MODERATE, clearly visible layer of noise/dots using only adjectives/modifiers, WITHOUT changing the scene description.

      ## Core Principle
      - DO NOT change the scene
      - Use "Dithering" and "Stippling" terms - these force the model to draw DOTS
      - These art/tech terms create dense dot patterns that look like noise

      ## Key Adjectives (MUST USE)
      - "dithered" (抖动) - creates pixel dot pattern
      - "stippled" (点画) - artistic dot texture
      - "coarse-grained" - rough grain texture
      - "gritty" - sand-like texture
      - "heavy film grain" - dense grain overlay

      ## Strategies

      1. Use "Dithering" adjectives for pixel noise effect:
         (e.g., "A landscape" → "A dithered landscape with visible dot pattern";
          "A portrait" → "A dithered, stippled portrait with coarse texture";
          "A cat" → "A dithered image of a cat with diffusion dither texture")

      2. Add aggressive grain modifiers:
         (e.g., "street photo" → "A heavy film grain, coarse-grained street photo";
          "night scene" → "A gritty, sand-textured night scene with dense grain";
          "indoor shot" → "A coarse-grained indoor shot with heavy speckled overlay")

      3. Combine multiple dot/grain adjectives:
         (e.g., "woman in dress" → "A dithered, coarse-grained, gritty photo of woman in dress";
          "city view" → "A stippled, heavy-grain city view with visible noise artifacts")

      ## Constraints
      - DO NOT change the scene
      - Use technical terms: dithered, coarse-grained, stippled, gritty
      - Moderate level = clearly visible dot/grain pattern, subject still recognizable

    severe: |
      # Task
      Rewrite the prompt to introduce SEVERE, image-covering noise (Salt-and-Pepper style) using only adjectives/modifiers, WITHOUT changing the scene description.

      ## Core Principle
      - DO NOT change the scene
      - Use "Salt-and-Pepper" directly as adjective - this triggers black/white random dots
      - Combine with "stochastic noise", "visual snow", "harsh dithering"

      ## Nuclear Adjectives (MUST USE)
      - "salt-and-pepper noisy" - directly triggers black/white speckle pattern
      - "heavily speckled" / "snowy" - dense dot coverage
      - "harshly dithered" - extreme dot pattern
      - "stochastic noise" - random pixel pattern
      - "static-covered" / "white-noise-covered"

      ## Strategies

      1. Use "Salt-and-Pepper" as primary adjective:
         (e.g., "A photo of woman" → "A severely salt-and-pepper noisy photo of woman";
          "A portrait" → "A heavily salt-and-pepper speckled portrait";
          "A landscape" → "A salt-and-pepper noisy, snowy landscape")

      2. Add "Visual Snow" and extreme dithering modifiers:
         (e.g., "cat on chair" → "A visual-snow-covered, harshly dithered image of cat on chair";
          "street scene" → "A stochastic-noise-covered, severely speckled street scene";
          "group photo" → "A white-noise-covered, heavily dithered group photo")

      3. Stack multiple severe noise adjectives:
         (e.g., "forest" → "A harshly dithered, severe salt-and-pepper noisy, stochastic forest";
          "night city" → "An extremely gritty, salt-and-pepper speckled, static-covered night city";
          "beach" → "A heavily stippled, visual-snow-covered, random-pixel-noisy beach")

      ## Constraints
      - DO NOT change the scene or context
      - MUST USE: salt-and-pepper, dithered, stochastic, visual snow, heavily speckled
      - Severe level = noise is dominant texture, but subject still recognizable
      - Keep it photographic but "broken" with dots

  exposure_issues:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of EXPOSURE (mild level - subtle, barely noticeable).

      ## Step 0: Determine Direction First
      Before applying any strategies, analyze the overall prompt and choose ONE direction:
      - Choose UNDEREXPOSURE for: night scenes, indoor, dark environments, shadows, forests, caves, evening
      - Choose OVEREXPOSURE for: beach, snow, sunny outdoor, backlit scenes, bright sky, windows, daytime

      Once decided, apply ONLY that direction consistently in all following steps.

      ## Strategies (apply using your chosen direction)

      1. Add global atmosphere descriptors AT THE BEGINNING of the prompt to affect the entire image.
         If UNDEREXPOSURE, e.g.: "dim scene of...", "dark atmosphere,...", "low-light...", "shadowy...".
         If OVEREXPOSURE, e.g.: "high key scene of...", "hazy bright...", "soft glow atmosphere,...", "slightly foggy bright...".
         IMPORTANT: These must describe the SCENE/ATMOSPHERE, not individual objects.

      2. Identify and modify the scene/environment descriptions (not object colors).
         If UNDEREXPOSURE, e.g.: "in dim lighting", "under low light conditions", "in shadowy environment".
         If OVEREXPOSURE, e.g.: "in hazy light", "under soft bright glow", "in slightly washed out lighting", "with atmospheric haze".


      3. Replace lighting/atmosphere conditions to introduce global exposure issues.
         If UNDEREXPOSURE, e.g.: replace "sunny day" with "overcast dim day"; add "in low ambient light".
         If OVEREXPOSURE, e.g.: replace "clear day" with "hazy bright day"; add "with soft atmospheric glow".

      ## Constraints
      - Use ONLY ONE direction throughout the entire rewrite

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of EXPOSURE (moderate level - clearly noticeable).

      ## Step 0: Determine Direction First
      Before applying any strategies, analyze the overall prompt and choose ONE direction:
      - Choose UNDEREXPOSURE for: night scenes, indoor, dark environments, shadows, forests, caves, evening
      - Choose OVEREXPOSURE for: beach, snow, sunny outdoor, backlit scenes, bright sky, windows, daytime

      Once decided, apply ONLY that direction consistently in all following steps.

      ## Strategies (apply using your chosen direction)

      1. Add global atmosphere descriptors AT THE BEGINNING of the prompt to affect the entire image.
         If UNDEREXPOSURE, e.g.: "underexposed scene of...", "dark murky...", "poorly lit...", "very dim...".
         If OVEREXPOSURE, e.g.: "high key overexposed...", "washed out hazy scene of...", "foggy bright...", "bleached atmosphere,...".
         IMPORTANT: These must describe the SCENE/ATMOSPHERE, not individual objects.

      2. Identify and modify the scene/environment descriptions.
         If UNDEREXPOSURE, e.g.: "obscured by darkness", "in murky low light", "barely visible in shadow".
         If OVEREXPOSURE, e.g.: "in washed out haze", "under bleaching bright light", "in overexposed foggy atmosphere", "with colors faded by bright haze".


      3. Replace lighting/atmosphere conditions to introduce noticeable global exposure issues.
         If UNDEREXPOSURE, e.g.: replace "outdoor" with "poorly lit outdoor in deep shadow".
         If OVEREXPOSURE, e.g.: replace "outdoor" with "outdoor in washed out hazy bright conditions".

      ## Constraints
      - Use ONLY ONE direction throughout the entire rewrite


    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of EXPOSURE (severe level - dramatic, immediately apparent).

      ## Step 0: Determine Direction First
      Before applying any strategies, analyze the overall prompt and choose ONE direction:
      - Choose UNDEREXPOSURE for: night scenes, indoor, dark environments, shadows, forests, caves, evening
      - Choose OVEREXPOSURE for: beach, snow, sunny outdoor, backlit scenes, bright sky, windows, daytime

      Once decided, apply ONLY that direction consistently in all following steps.

      ## Strategies (apply using your chosen direction)

      1. Add extreme global atmosphere descriptors AT THE BEGINNING of the prompt.
         If UNDEREXPOSURE, e.g.: "extremely dark scene of...", "nearly black...", "pitch black atmosphere,...", "in illegible darkness...".
         If OVEREXPOSURE, e.g.: "extremely high key...", "severely washed out white scene of...", "blindingly bright foggy...", "completely bleached hazy...".
         IMPORTANT: These must describe the SCENE/ATMOSPHERE to affect the entire image.

      2. Identify and modify the scene/environment with extreme exposure descriptions.
         If UNDEREXPOSURE, e.g.: "lost in pitch black", "in nearly invisible darkness", "completely obscured by shadow".
         If OVEREXPOSURE, e.g.: "in completely washed out white haze", "under blindingly bright fog", "in severely bleached atmosphere where colors are lost", "with everything fading into bright white".

      3. Replace scene conditions to introduce extreme global exposure issues.
         If UNDEREXPOSURE, e.g.: replace scene with "scene in pitch black with no visible light source".
         If OVEREXPOSURE, e.g.: replace scene with "scene in extremely bright white haze, everything washed out".

      ## Constraints
      - Use ONLY ONE direction throughout the entire rewrite
      - Scene should still be somewhat recognizable

  low_contrast:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of CONTRAST (mild level - subtle, barely noticeable). The result should look "soft" and "gentle", similar to Japanese soft aesthetic or overcast day effect.

      ## Strategies

      1. Add global atmosphere descriptors AT THE BEGINNING of the prompt to create soft, low-contrast feel.
         e.g.: "soft contrast scene of...", "slightly flat...", "muted tones,...", "gentle subdued...", "pastel-like...", "slightly hazy...".
         IMPORTANT: These describe the overall TONAL FEEL of the entire image.

      2. Modify lighting and shadow descriptions to reduce tonal punch.
         e.g.: "with diffused lighting", "with softened shadows", "with lifted shadows", "under soft even light", "with low contrast filter effect".
         Focus on making shadows lighter and highlights softer.

      3. Replace high-contrast conditions with soft alternatives.
         e.g.: replace "sunny day" with "soft overcast day"; replace "dramatic lighting" with "gentle diffused lighting"; replace "deep shadows" with "soft lifted shadows".

      ## Constraints
      - Contrast is about TONAL RANGE (difference between darks and lights)
      - Mild low contrast = soft, gentle, pastel-like, still aesthetically acceptable
      - Shadows should be lifted (not deep black), highlights should be soft (not bright white)

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of CONTRAST (moderate level - clearly noticeable). The result should look visibly gray/flat, with blacks appearing milky and whites appearing dull - lacking visual impact.

      ## Strategies

      1. Add global atmosphere descriptors AT THE BEGINNING of the prompt to create flat, dull appearance.
         e.g.: "flat low contrast scene of...", "washed-out...", "dull faded...", "lackluster...", "milky...", "filmy...", "matte finish...".
         IMPORTANT: The entire image should look "flat" and "lacking depth".

      2. Modify lighting and shadow descriptions to create milky, grayish tones.
         e.g.: "with milky blacks", "with grayish shadows", "in hazy atmosphere", "with flat lighting", "lacking depth", "with muddy midtones".
         Focus on: blacks should look gray/milky, whites should look dull.

      3. Replace any contrast-enhancing elements with flat alternatives.
         e.g.: replace "dramatic" with "flat dull"; replace "vivid" with "faded"; replace "punchy" with "lackluster"; replace "deep shadows" with "milky grayish shadows".

      ## Constraints
      - Image should look "flat" - blacks are not black (milky), whites are not white (dull)
      - Should feel like the image lacks visual punch and depth
      - Different from exposure: contrast affects tonal RANGE, not overall brightness

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of CONTRAST (severe level - dramatic, immediately apparent). The result should look like "gray soup" - completely flat with no tonal separation, like ungraded LOG footage or severe fog.

      ## Strategies

      1. Add extreme global atmosphere descriptors AT THE BEGINNING of the prompt.
         e.g.: "extremely flat gray scene of...", "zero contrast...", "gray soup appearance,...", "completely washed out...", "lifeless monotone gray...", "opaque flat...".
         IMPORTANT: The entire image should be drowned in flat gray with no tonal variation.

      2. Describe severe tonal compression effects throughout.
         e.g.: "with no tonal separation", "like ungraded LOG footage", "with veiling glare throughout", "in severe atmospheric haze", "with everything appearing as monotone gray", "raw flat profile look".
         Focus on: no distinction between darks and lights, everything merges into gray.

      3. Replace scene conditions to introduce extreme flatness.
         e.g.: replace any scene with "scene in dense gray fog with zero contrast"; add "with all details lost in flat gray haze"; add "like viewing through thick smog".

      ## Constraints
      - Image should look like "gray soup" - almost no tonal variation
      - Should feel like ungraded LOG footage or severe atmospheric haze
      - Everything should merge into monotone gray midtones
      - Keep output CONCISE: apply ONE strategy, do not stack all three strategies together

  low_sharpness:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have reduced sharpness (mild level - subtle softness, like a light diffusion filter).

      ## Effective Softness Terms (USE THESE)
      - "soft focus", "with pro-mist filter effect", "light diffusion"
      - "slightly smoothed", "with gentle glow", "soft-focus lens"

      ## Strategies

      1. Add soft focus effect at the BEGINNING:
         "soft focus [rest of prompt]"
         "with light diffusion filter, [rest of prompt]"

      2. Add photography softening technique at the END:
         ", shot with soft focus lens"
         ", with light pro-mist filter effect"
         ", slight diffusion glow"

      3. REPLACE sharpness words:
         "sharp" → "soft focus"
         "crisp" → "gently soft"
         "detailed" → "smoothly rendered"

      ## Constraints
      - DO NOT change scene content, objects, or composition
      - Use photography/filter terminology for better SDXL response
      - Keep the original prompt structure intact

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have noticeably reduced sharpness (moderate level - like airbrushed or diffusion filter effect).

      ## Effective Softness Terms (USE THESE)
      - "airbrushed", "diffusion filter", "soft focus lens", "pro-mist effect"
      - "smoothed edges", "soft glow", "dreamy soft", "gauzy soft"
      - "lacking fine texture", "smooth plastic-like rendering"

      ## Strategies

      1. Add strong soft focus effect at the BEGINNING:
         "airbrushed [rest of prompt]"
         "soft focus [rest of prompt]"
         "with diffusion filter, [rest of prompt]"
         "dreamy soft [rest of prompt]"

      2. Add softening technique at the END:
         ", with heavy diffusion filter effect"
         ", airbrushed smooth appearance"
         ", shot through soft focus lens"
         ", with dreamy soft glow, edges not sharp"

      3. REPLACE/REMOVE sharpness words:
         "sharp details" → "airbrushed smooth"
         "crisp" → "soft and smooth"
         "fine details" → "smoothed over details"
         DELETE: "high resolution", "detailed texture"

      ## Constraints
      - DO NOT change scene content, objects, or composition
      - Use "airbrushed", "diffusion filter", "soft focus" - these work better than just "soft"
      - The image should look like it was shot with a diffusion filter or heavily smoothed in post

    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely reduced sharpness (severe level - like heavy airbrushing, vaseline lens, or extremely smoothed).

      ## Effective Softness Terms (USE THESE)
      - "heavily airbrushed", "vaseline on lens effect", "extreme diffusion"
      - "plastic smooth", "wax-like smooth skin", "over-smoothed"
      - "no visible texture", "completely smooth rendering"
      - "like oil painting with soft edges", "gauzy dreamlike"

      ## Strategies

      1. Add extreme soft focus at the BEGINNING:
         "heavily airbrushed [rest of prompt]"
         "with vaseline lens effect, [rest of prompt]"
         "extremely soft focus [rest of prompt]"
         "over-smoothed [rest of prompt]"

      2. Add strong softening description at the END:
         ", with extreme diffusion filter, no sharp edges anywhere"
         ", heavily airbrushed with all texture smoothed away"
         ", like shot through vaseline-coated lens"
         ", plastic smooth with no fine details visible"

      3. REPLACE sharpness words with soft equivalents (do NOT use negation like "no visible"):
         "sharp" → "soft" or "smoothed"
         "crisp" → "soft"
         "detailed" → "smooth"
         "visible" → DELETE the phrase entirely, or keep as is
         "fine details" → "smooth surface"

      ## Constraints
      - DO NOT change scene content, objects, or composition
      - DO NOT use contradictory phrases like "visible" + "no visible" in same prompt
      - DO NOT use negation words like "no", "not", "without" to describe sharpness loss
      - Use REPLACEMENT strategy: replace sharp words with soft words, not negate them
      - Keep output CONCISE: apply ONE strategy (beginning OR end), do not use both together

  color_distortion:
    mild: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a subtle color cast/tint throughout (mild level - subtle but visible).

      ## Step 0: Choose ONE color cast direction
      Pick ONE from: blue tint, orange tint, green tint, magenta tint, yellow tint
      Apply this consistently to the ENTIRE image.

      ## Strategies

      1. Add color tint descriptor at the BEGINNING:
         "slightly blue-tinted [rest of prompt]"
         "with subtle orange cast, [rest of prompt]"
         "faintly green-tinted [rest of prompt]"

      2. Add white balance description at the END:
         ", with cool blue color temperature"
         ", with warm orange tint throughout"
         ", shot under fluorescent light giving slight green tint"

      ## Constraints
      - Apply ONE consistent color tint to entire image
      - DO NOT use abstract words like "distorted", "corrupted", "wrong colors"
      - DO NOT change the scene content, only add color tint
      - Use specific color words: blue, orange, green, magenta, yellow

    moderate: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have an obvious color cast throughout (moderate level - clearly noticeable).

      ## Step 0: Choose ONE color cast direction
      Pick ONE from: blue, orange, green, magenta, yellow, cyan
