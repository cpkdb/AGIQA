    severe: |
      # Task
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a very strong, dominant color cast (severe level - dramatically tinted).

      ## Step 0: Choose ONE dominant color cast
      Pick ONE from: heavy blue, strong orange, intense green, deep magenta, saturated yellow, strong cyan
      This color will dominate the entire image.

      ## Strategies

      1. Add very strong color cast at the BEGINNING:
         "heavily blue-tinted [rest of prompt]"
         "with intense orange color cast, [rest of prompt]"
         "strongly green-tinted [rest of prompt]"
         "with deep magenta cast throughout, [rest of prompt]"

      2. Use extreme white balance description:
         ", with severe blue color cast like underwater"
         ", with extreme orange tint like shot through amber glass"
         ", with heavy green cast like night vision"
         ", bathed in strong magenta light"

      3. Replace color words with tinted versions:
         "white" → "white with strong blue tint"
         "natural colors" → "all colors shifted toward [chosen color]"

      ## Constraints
      - ONE dominant color cast affecting everything
      - DO NOT use: "corrupted", "radioactive", "toxic", "alien" - these create artistic effects, not color casts
      - DO NOT add paint, makeup, or colored objects - only change the overall color temperature/tint
      - Should look like severe white balance error or colored lighting, not artistic filter


aesthetic_quality:
  poor_composition:
    mild: |
      # Task
      Rewrite the prompt to create MILD but VISIBLE composition problems. Focus on subject positioning and framing issues only.

      ## IMPORTANT: Do NOT Add New Elements
      Only change POSITIONING, FRAMING, and CROPPING. Do NOT add backgrounds, objects, or change the scene.

      ## Effective Strategies for Mild Level

      1. Off-Center Positioning (MOST EFFECTIVE):
         - "with subject positioned at the far left edge of frame"
         - "with subject pushed to the bottom right corner"
         - "with subject awkwardly placed at the top of frame"
         (e.g., "portrait of woman" → "portrait of woman positioned at the far left edge of frame, off-center")

      2. Too Much Empty Space:
         - "with excessive empty space above the subject"
         - "with too much empty space on one side"
         - "distant shot with subject small in the frame"
         (e.g., "cat on sofa" → "distant shot of cat on sofa, subject small with too much empty space around")

      3. Subject Partially Cut Off:
