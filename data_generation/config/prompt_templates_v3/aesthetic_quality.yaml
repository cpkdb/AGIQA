# Aesthetic Quality Degradation Prompt Templates V3
# 美学质量退化策略 - 基于 quality_dimensions_v3.json
# 维度: awkward_positioning, awkward_framing, unbalanced_layout, cluttered_scene,
#       lighting_imbalance, color_clash, dull_palette
# 已删除: lack_of_depth, flat_lighting

aesthetic_quality:

  awkward_positioning:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite it to create amateurish composition through wrong distance.
      
      Strategy: "Shot From Too Far Away"
      1. Identify the MAIN SUBJECT.
      2. PREPEND: "A distant shot of " or "Photographed from far away, "
      3. APPEND: ", the subject appears small and insignificant in the frame"
      
      Example: "A cat on a sofa" → "A distant shot of a cat on a sofa, the subject appears small and insignificant in the frame"

      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite it to create awkward composition through unflattering angle.
      
      Strategy: "The Unflattering Extreme Close-up"
      1. Identify the MAIN SUBJECT.
      2. PREPEND: "Extreme unflattering close-up of " or "Uncomfortably close macro shot of "
      3. APPEND: ", losing all context and background, distorted perspective"
      
      Example: "A woman in a garden" → "Extreme unflattering close-up of a woman, losing all context and background, distorted perspective"

      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite it to create terrible composition by making the subject too small and poorly positioned.
      
      Strategy: "Subject Lost in the Frame"
      1. Identify the MAIN SUBJECT.
      2. REWRITE to make the subject tiny and pushed to the edge:
         - "An extremely wide shot with the [subject] tiny in the far lower-right corner, barely occupying 5% of the frame. The image is dominated by vast empty [background space]. The subject is almost an afterthought, poorly framed amateur photo."
      
      Example: "A dog playing in the park" → "An extremely wide shot with a dog tiny in the far lower-right corner, barely occupying 5% of the frame. The image is dominated by vast empty grass and sky. The dog is almost an afterthought, poorly framed amateur photo."
      Example: "A chef cooking in a kitchen" → "An extremely wide shot with a chef tiny in the far lower-left corner, barely occupying 5% of the frame. The image is dominated by vast empty countertops and ceiling. The chef is almost an afterthought, poorly framed amateur photo."

      Output only the rewritten prompt.

  awkward_framing:
    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to introduce unpleasant perspective without extreme distortion.
      Strategy: "The Unflattering Angle".
      1. Prepend "An awkwardly angled photo of" to the prompt.
      2. Force a specific bad angle: "shot from directly below focusing on the chin/bottom" OR "shot from a dizzying high angle looking straight down".
      3. Describe the perspective as "uncomfortable" and "disorienting".
      4. Do NOT use "fisheye" yet, just a bad choice of camera position.
      
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to ruin the aesthetic quality using extreme perspective deformity.
      Strategy: "The Fisheye Nightmare".
      1. Prepend "An unflattering extreme fisheye lens photo of" to the prompt.
      2. Explicitly state: "severe spherical distortion", "bulging center", "warped geometry".
      3. Describe the edges of the frame as "stretched and distorted".
      4. The subject should look comically warped due to the lens distortion.

      Output only the rewritten prompt.

  unbalanced_layout:
    mild: |
      You are given a text-to-image prompt. Your task is to create a slightly unbalanced composition where visual weight is unevenly distributed.
      
      Strategy: "Slightly Off-Center Weight"
      1. PREPEND: "An off-center composition of "
      2. APPEND: ", positioned slightly to the left side of the frame with empty space on the right, mildly unbalanced visual weight"
      3. Keep the original subject unchanged.
      
      Example: "A cat on a chair" → "An off-center composition of a cat on a chair, positioned slightly to the left side of the frame with empty space on the right, mildly unbalanced visual weight"
      Example: "A beach at sunset" → "An off-center composition of a beach at sunset, positioned slightly to the left side of the frame with empty space on the right, mildly unbalanced visual weight"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of layout balance.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to create a noticeably unbalanced composition with lopsided visual weight.
      
      Strategy: "Lopsided Composition"
      1. PREPEND: "A lopsided composition of "
      2. APPEND: ", pushed to the far left edge of the frame, large empty negative space dominating the right two-thirds, awkward visual weight distribution, feels like the image is about to tip over"
      3. Keep the original subject unchanged.
      
      Example: "A dog in a park" → "A lopsided composition of a dog in a park, pushed to the far left edge of the frame, large empty negative space dominating the right two-thirds, awkward visual weight distribution, feels like the image is about to tip over"
      Example: "A chef in a kitchen" → "A lopsided composition of a chef in a kitchen, pushed to the far left edge of the frame, large empty negative space dominating the right two-thirds, awkward visual weight distribution, feels like the image is about to tip over"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of layout balance.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to create a severely unbalanced composition with extreme lopsided weight.
      
      Strategy: "Extreme Visual Imbalance"
      1. PREPEND: "A severely unbalanced composition of "
      2. APPEND: ", crammed into the bottom-left corner occupying only 20% of the frame, the remaining 80% is empty featureless space, extremely lopsided visual weight, terrible amateur framing that wastes most of the canvas"
      3. Keep the original subject unchanged.
      
      Example: "A woman reading" → "A severely unbalanced composition of a woman reading, crammed into the bottom-left corner occupying only 20% of the frame, the remaining 80% is empty featureless space, extremely lopsided visual weight, terrible amateur framing that wastes most of the canvas"
      Example: "A city street" → "A severely unbalanced composition of a city street, crammed into the bottom-left corner occupying only 20% of the frame, the remaining 80% is empty featureless space, extremely lopsided visual weight, terrible amateur framing that wastes most of the canvas"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of layout balance.
      Output only the rewritten prompt.

  cluttered_scene:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have mildly degraded aesthetic quality due to a slightly cluttered background. You may apply the following strategies:

      1. Keep the original main subject EXACTLY as described.
      2. APPEND a mildly cluttered background description: ', with a slightly messy background containing various small objects and decorations'.
      3. Example: 'a cat sleeping' → 'a cat sleeping, with a slightly messy background containing various small objects and decorations'.

      CRITICAL: The main subject must remain unchanged and clearly visible. Only the background becomes slightly cluttered.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have noticeably degraded aesthetic quality due to a cluttered distracting background. You may apply the following strategies:

      1. Keep the original main subject EXACTLY as described.
      2. APPEND a cluttered background with specific items: ', surrounded by a cluttered background of random items: cardboard boxes, plastic bags, scattered papers, tangled wires, and miscellaneous household objects competing for attention'.
      3. Example: 'a portrait of a woman' → 'a portrait of a woman, surrounded by a cluttered background of random items: cardboard boxes, plastic bags, scattered papers, tangled wires, and miscellaneous household objects competing for attention'.

      CRITICAL: The main subject must remain the focus. The clutter is ONLY in the background/surroundings.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded aesthetic quality due to an extremely cluttered chaotic background. You may apply the following strategies:

      1. Keep the original main subject EXACTLY as described.
      2. APPEND an extremely cluttered background: ', nearly lost in an extremely cluttered chaotic background overflowing with random junk: piles of boxes, tangled cables, scattered trash, random furniture, plastic containers, crumpled papers, and endless miscellaneous items filling every corner of the frame'.
      3. Example: 'a dog sitting' → 'a dog sitting, nearly lost in an extremely cluttered chaotic background overflowing with random junk: piles of boxes, tangled cables, scattered trash, random furniture, plastic containers, crumpled papers, and endless miscellaneous items filling every corner of the frame'.

      CRITICAL: The main subject stays unchanged. The severe clutter overwhelms the composition but doesn't replace the subject.
      Output only the rewritten prompt.

  # lack_of_depth: REMOVED - severe不可控，定义与其他维度混淆
  # flat_lighting: REMOVED - 生成模型无法通过prompt控制光照均匀度

  lighting_imbalance:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of slightly uneven lighting. You may apply the following strategies:

      1. Prepend 'A slightly unevenly lit image of ' to the prompt.
      2. Use mild terms like 'patchy light', 'inconsistent brightness', or 'distracting highlights'.
      3. Focus on creating subtle, unintentional-looking variations across the scene where some areas are needlessly brighter than others.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of lighting balance.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of clearly unbalanced, amateurish lighting. You may apply the following strategies:

      1. Prepend 'An amateurish photo with harsh, unflattering lighting of ' to the prompt.
      2. Use specific terms like 'deep messy shadows', 'harsh overhead light', or 'distracting side highlights'.
      3. Mention unflattering shadows (e.g., 'deep ugly shadows under eyes and chin') that ruin the aesthetic balance.
      4. Describe simultaneous overexposed spots and underexposed areas.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of lighting balance.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of extreme, ruinous lighting imbalance. You may apply the following strategies:

      1. Prepend 'A badly lit image with extreme lighting imbalance of ' to the prompt.
      2. Describe the lighting as 'chaotic and messy', with blinding white highlights (overexposure) next to pitch-black shadows (crushed shadows).
      3. Mention 'harsh direct flash' that washes out the foreground while leaving the background dark, or 'uncontrolled glare' that obscures details.
      4. Explicitly avoid turning the image into a silhouette or monochrome; keep the colors but ruin the exposure balance.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of lighting balance.
      Output only the rewritten prompt.

  color_clash:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have mildly degraded aesthetic quality specifically in terms of color harmony. You may apply the following strategies:

      1. Find ONE object mentioned in the prompt and ADD a fluorescent/neon color adjective directly before it.
      2. Use colors like: 'neon-green', 'hot pink', 'fluorescent yellow', 'electric blue'.
      3. Example: 'a dress' → 'a neon-green dress'; 'the sky' → 'a hot pink sky'.
      4. CRITICAL: Do NOT append abstract descriptions. You MUST modify a specific object's color.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but with mild color disharmony.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have noticeably degraded aesthetic quality specifically in terms of color harmony. You may apply the following strategies:

      1. Find 2 objects mentioned in the prompt and give BOTH of them clashing fluorescent colors.
      2. Use the classic 'cheap plastic' color pair: neon-green + hot pink. Or: fluorescent yellow + electric blue.
      3. Describe the conflict explicitly: 'neon-green X clashing against hot pink Y'.
      4. Example: 'a bird in the sky' → 'a neon-green bird clashing against a hot pink sky'.

      CRITICAL: Every color must be attached to a specific object. Both objects must have fluorescent colors that clash.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but with noticeable color clashes.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded aesthetic quality specifically in terms of color harmony. You may apply the following strategies:

      1. Find 3 objects mentioned in the prompt and give ALL of them clashing fluorescent colors.
      2. Use 'cheap plastic toy-like' colors: neon-green, hot pink, fluorescent yellow, electric blue, acid orange.
      3. Describe the triple clash: 'cheap plastic neon-green X, tacky hot pink Y, and garish fluorescent yellow Z creating a toy-like color clash'.
      4. Example: 'trees, river, and sky' → 'cheap plastic neon-green trees, tacky hot pink river, and garish fluorescent yellow sky creating a toy-like color clash'.

      CRITICAL: Use words like 'cheap', 'tacky', 'plastic', 'toy-like' to emphasize the low aesthetic quality.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but with severe color disharmony.
      Output only the rewritten prompt.

  dull_palette:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have reduced visual appeal specifically in terms of color choices. You may apply the following strategies:

      1. Add ONE environmental descriptor to create dull atmosphere: 'overcast day', 'cloudy grey sky', 'dim lighting', 'foggy weather'
      2. Keep all objects and their colors unchanged - only modify the lighting/weather conditions
      3. DO NOT change object colors to weird names like "hospital green" or "institutional beige"
      4. DO NOT add new objects or change scene composition
      5. Goal: Create a dull, uninspiring atmosphere through environment, not weird colors

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have clearly reduced visual appeal specifically in terms of color choices. You may apply the following strategies:

      1. Add "on an overcast grey day with flat, dull lighting" to the prompt
      2. Remove ALL vibrancy words: vibrant, bright, rich, vivid, colorful, brilliant, luminous, radiant, glowing, shining
      3. Add "low contrast" or "muted tones" to the description
      4. Keep the same objects but reduce their visual appeal through lighting
      5. Example: "a vibrant red car under bright sunlight" → "a red car on an overcast grey day with flat, dull lighting and muted tones"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely reduced visual appeal specifically in terms of color choices. You may apply the following strategies:

      1. Add "on a heavily overcast grey day with flat grey lighting and no shadows" to the prompt
      2. Replace ALL color words with "grey" or "dull grey" (e.g., 'blue' → 'grey', 'yellow' → 'dull grey', 'red' → 'grey', 'green' → 'grey')
      3. DO NOT use compound colors like "grey-blue" or "pale blue" - use pure "grey" only
      4. Remove ALL vibrancy/beauty words: vibrant, bright, rich, vivid, colorful, shining, glowing, beautiful, brilliant, radiant, luminous
      5. Add "desaturated, monochromatic grey tones" to emphasize the dullness
      6. Example: "a yellow car under blue sky with green trees" → "a dull grey car under grey sky with grey trees on a heavily overcast day, desaturated monochromatic grey tones"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.



