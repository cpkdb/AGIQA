# Aesthetic Quality Degradation Prompt Templates V3
# 美学质量退化策略 - 基于 quality_dimensions_v3.json
# 维度: awkward_positioning, awkward_framing, unbalanced_layout, cluttered_scene,
#       lighting_imbalance, color_clash, dull_palette
# 已删除: lack_of_depth, flat_lighting

aesthetic_quality:

  awkward_positioning:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite it to create amateurish composition through wrong distance.

      Strategy: "Shot From Too Far Away"
      1. Identify the MAIN SUBJECT.
      2. PREPEND: "A distant shot of " or "Photographed from far away, "
      3. APPEND: ", the subject appears small and insignificant in the frame"
      e.g. prepend "A distant shot of" and append ", the subject appears small and insignificant in the frame"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite it to create awkward composition through being too close to the subject.

      Strategy: "Too Close, No Breathing Room"
      1. Identify the MAIN SUBJECT.
      2. PREPEND: "Uncomfortably close shot of " or "Shot from too close, "
      3. APPEND: ", subject fills the entire frame with edges awkwardly cropped, no breathing room, important parts cut off at the frame border"
      e.g. prepend "Uncomfortably close shot of" and append ", subject fills the entire frame with edges awkwardly cropped, no breathing room, important parts cut off at the frame border"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite it to create terrible composition where the subject is only partially in frame.

      Strategy: "Subject Exiting the Frame"
      1. Identify the MAIN SUBJECT.
      2. REWRITE so only part of the subject is visible — as if the photographer completely missed the framing:
         "A poorly framed shot where [subject] is only half visible, the [left/right/top] side cut off by the frame edge, amateur snapshot that missed the subject entirely"
      e.g. describe the subject as half-cut-off at one frame edge, with the remaining content still matching the original scene

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

  awkward_framing:
    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to introduce unpleasant perspective without extreme distortion.
      Strategy: "The Unflattering Angle".
      1. Prepend "An awkwardly angled photo of" to the prompt.
      2. Force a specific bad angle: "shot from directly below focusing on the chin/bottom" OR "shot from a dizzying high angle looking straight down".
      3. Describe the perspective as "uncomfortable" and "disorienting".
      4. Do NOT use "fisheye" yet, just a bad choice of camera position.
      
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to ruin the aesthetic quality using extreme perspective deformity.
      Strategy: "The Fisheye Nightmare".
      1. Prepend "An unflattering extreme fisheye lens photo of" to the prompt.
      2. Explicitly state: "severe spherical distortion", "bulging center", "warped geometry".
      3. Describe the edges of the frame as "stretched and distorted".
      4. The subject should look comically warped due to the lens distortion.

      Output only the rewritten prompt.

  unbalanced_layout:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have mildly degraded aesthetic quality due to a slightly unbalanced layout. You may apply the following strategies:

      Strategy: "Small Subject, Slight Offset"
      1. Make the main subject appear SMALL relative to the frame.
      2. Position the subject slightly off to one side (e.g., left third).
      3. Describe a large area of simple/empty background filling the rest.
      4. Keep the subject and scene content identical to the original.

      Example: "A cat on a chair" → "A small cat sitting on a chair in the left third of the frame, with a wide expanse of empty wooden floor and plain wall filling the right side"
      Example: "A beach at sunset" → "A narrow strip of beach and sunset on the left side, with a large stretch of calm empty ocean water taking up most of the right side of the image"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of layout balance.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have noticeably degraded aesthetic quality due to an unbalanced layout. You may apply the following strategies:

      Strategy: "Tiny Subject in Corner"
      1. Shrink the main subject to a SMALL size and push it to one EDGE or CORNER of the frame.
      2. Fill the majority of the frame (roughly two-thirds) with plain, empty background (e.g., empty grass, blank wall, open sky).
      3. The subject must still be recognizable but clearly too small for the frame.
      4. Keep the subject and scene content identical to the original.

      Example: "A dog in a park" → "A tiny dog sitting in the far left corner of a large park, vast empty grass field and open sky filling most of the frame"
      Example: "A chef in a kitchen" → "A small chef standing at the far right edge of a spacious kitchen, large empty countertops and blank tiled walls dominating the rest of the image"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of layout balance.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded aesthetic quality due to an extremely unbalanced layout. You may apply the following strategies:

      Strategy: "Barely Visible Subject, Vast Emptiness"
      1. Make the subject TINY and place it in the BOTTOM CORNER of the frame.
      2. Fill the remaining 80%+ of the frame with plain, featureless background (empty white room, blank sky, bare floor).
      3. The subject should be barely visible, dwarfed by the enormous empty space.
      4. Keep the subject and scene content identical to the original.

      Example: "A woman reading" → "A barely visible tiny woman reading a book in the bottom-left corner, an enormous empty white room with bare walls and floor stretching across the entire frame"
      Example: "A city street" → "A tiny sliver of a city street crammed into the bottom-right corner, a massive blank overcast sky filling the rest of the image with no other details"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of layout balance.
      Output only the rewritten prompt.

  cluttered_scene:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have mildly degraded aesthetic quality due to a slightly cluttered background.

      1. Keep the original main subject EXACTLY as described — do NOT change its count, type, or appearance.
      2. Identify what secondary elements or debris would naturally exist in this scene's environment.
      3. APPEND: ', with a slightly messy background containing scattered [scene-appropriate secondary elements and fragments]'
      e.g. beach scene → scattered shell fragments, pebbles, dried seaweed; gallery → extra frames and ornaments crowding the walls; classroom → scattered notebooks and bags on the floor

      CRITICAL: Only background/surroundings become cluttered. The main subject count and appearance stay unchanged.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have noticeably degraded aesthetic quality due to a cluttered distracting background.

      1. Keep the original main subject EXACTLY as described — do NOT change its count, type, or appearance.
      2. Identify what secondary elements or debris would naturally exist in this scene's environment.
      3. APPEND: ', surrounded by a densely cluttered background filled with [scene-appropriate secondary elements and debris] competing for visual attention, multiple distracting focal points'
      e.g. beach scene → densely packed shell fragments, pebbles, sea debris covering the sand around them; gallery → walls and floor overcrowded with frames, sculptures, and decorative objects; classroom → desks buried under scattered books, papers, bags and stationery

      CRITICAL: The main subject count and appearance stay unchanged. Clutter is ONLY in the surrounding background.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded aesthetic quality due to an extremely cluttered chaotic scene.

      1. Keep the original main subject EXACTLY as described — do NOT change its count, type, or appearance.
      2. Identify what secondary elements or debris would naturally exist in this scene's environment.
      3. APPEND: ', nearly lost in an overwhelming chaos of [scene-appropriate secondary elements and debris] filling every corner of the frame, zero negative space, visually exhausting and impossible to focus'
      e.g. beach scene → an overwhelming carpet of shell fragments, pebbles, seaweed and sea debris covering every inch of sand around them; gallery → every surface overflowing with frames, objects and decorations leaving no breathing space; classroom → the entire floor and desks buried under an avalanche of books, papers, bags and scattered stationery

      CRITICAL: The main subject stays unchanged. Severe clutter overwhelms the composition from the surroundings.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

  # lack_of_depth: REMOVED - severe不可控，定义与其他维度混淆
  # flat_lighting: REMOVED - 生成模型无法通过prompt控制光照均匀度

  lighting_imbalance:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of slightly uneven lighting. You may apply the following strategies:

      1. Prepend 'A slightly unevenly lit image of ' to the prompt.
      2. Use mild terms like 'patchy light', 'inconsistent brightness', or 'distracting highlights'.
      3. Focus on creating subtle, unintentional-looking variations across the scene where some areas are needlessly brighter than others.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of lighting balance.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of clearly unbalanced lighting. You may apply the following strategies:

      1. Keep the original prompt content intact.
      2. APPEND a concrete description of a strong single-sided light source, specifying which area is brightly lit and which area is in deep shadow.
      3. Use "only...while..." sentence structure to emphasize the contrast between the bright and dark areas (e.g., ", with a strong harsh light from the left illuminating only the left half of the scene in bright white, while the right half falls into deep dark shadow with barely visible details", ", with intense overhead light directly above the center creating a bright hot spot on the main subject, while the edges of the frame fade into heavy darkness").
      4. Specify concrete scene elements that are affected — name which objects are in the bright zone and which are lost in shadow.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of lighting balance.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of extreme lighting imbalance. You may apply the following strategies:

      1. Keep the original prompt content intact.
      2. APPEND a description of an extreme physical light source that splits the scene into drastically uneven bright and dark zones (e.g., ", with an extremely bright spotlight blasting from the far left, turning the left third of the image into a blinding white glow, while the right two-thirds sinks into near-total darkness", ", lit by two clashing lights from opposite sides, warm orange from the left and cold blue from the right, splitting the scene into two harshly lit halves with deep confusing shadows in the center").
      3. Use "only...while..." to specify exactly which parts of the scene are in the bright zone and which are in the dark zone.
      4. Do NOT use post-processing or exposure terms ("overexposed", "washed out", "blown out"). Only describe physical light sources and their visible effects on the scene.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of lighting balance.
      Output only the rewritten prompt.

  color_clash:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have mildly degraded aesthetic quality specifically in terms of color harmony. You may apply the following strategies:

      1. Find ONE object mentioned in the prompt and ADD a fluorescent/neon color adjective directly before it.
      2. Use colors like: 'neon-green', 'hot pink', 'fluorescent yellow', 'electric blue'.
      3. Example: 'a dress' → 'a neon-green dress'; 'the sky' → 'a hot pink sky'.
      4. CRITICAL: Do NOT append abstract descriptions. You MUST modify a specific object's color.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but with mild color disharmony.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have noticeably degraded aesthetic quality specifically in terms of color harmony. You may apply the following strategies:

      1. Find 2 objects mentioned in the prompt and give BOTH of them clashing fluorescent colors.
      2. Use the classic 'cheap plastic' color pair: neon-green + hot pink. Or: fluorescent yellow + electric blue.
      3. Describe the conflict explicitly: 'neon-green X clashing against hot pink Y'.
      4. Example: 'a bird in the sky' → 'a neon-green bird clashing against a hot pink sky'.

      CRITICAL: Every color must be attached to a specific object. Both objects must have fluorescent colors that clash.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but with noticeable color clashes.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded aesthetic quality specifically in terms of color harmony. You may apply the following strategies:

      1. Find 3 objects mentioned in the prompt and give ALL of them clashing fluorescent colors.
      2. Use 'cheap plastic toy-like' colors: neon-green, hot pink, fluorescent yellow, electric blue, acid orange.
      3. Describe the triple clash: 'cheap plastic neon-green X, tacky hot pink Y, and garish fluorescent yellow Z creating a toy-like color clash'.
      4. Example: 'trees, river, and sky' → 'cheap plastic neon-green trees, tacky hot pink river, and garish fluorescent yellow sky creating a toy-like color clash'.

      CRITICAL: Use words like 'cheap', 'tacky', 'plastic', 'toy-like' to emphasize the low aesthetic quality.
      Avoid making the prompt nonsensical—keep the scene semantically plausible but with severe color disharmony.
      Output only the rewritten prompt.

  dull_palette:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have reduced visual appeal specifically in terms of color choices. You may apply the following strategies:

      1. Add ONE environmental descriptor to create dull atmosphere: 'overcast day', 'cloudy grey sky', 'dim lighting', 'foggy weather'
      2. Keep all objects and their colors unchanged - only modify the lighting/weather conditions
      3. DO NOT change object colors to weird names like "hospital green" or "institutional beige"
      4. DO NOT add new objects or change scene composition
      5. Goal: Create a dull, uninspiring atmosphere through environment, not weird colors

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have clearly reduced visual appeal specifically in terms of color choices. You may apply the following strategies:

      1. Add "on an overcast grey day with flat, dull lighting" to the prompt
      2. Remove ALL vibrancy words: vibrant, bright, rich, vivid, colorful, brilliant, luminous, radiant, glowing, shining
      3. Add "low contrast" or "muted tones" to the description
      4. Keep the same objects but reduce their visual appeal through lighting
      5. Example: "a vibrant red car under bright sunlight" → "a red car on an overcast grey day with flat, dull lighting and muted tones"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely reduced visual appeal specifically in terms of color choices. You may apply the following strategies:

      1. Add "on a heavily overcast grey day with flat grey lighting and no shadows" to the prompt
      2. Replace ALL color words with "grey" or "dull grey" (e.g., 'blue' → 'grey', 'yellow' → 'dull grey', 'red' → 'grey', 'green' → 'grey')
      3. DO NOT use compound colors like "grey-blue" or "pale blue" - use pure "grey" only
      4. Remove ALL vibrancy/beauty words: vibrant, bright, rich, vivid, colorful, shining, glowing, beautiful, brilliant, radiant, luminous
      5. Add "desaturated, monochromatic grey tones" to emphasize the dullness
      6. Example: "a yellow car under blue sky with green trees" → "a dull grey car under grey sky with grey trees on a heavily overcast day, desaturated monochromatic grey tones"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of visual appeal.
      Output only the rewritten prompt.



