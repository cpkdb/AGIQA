# Semantic Rationality - Anatomy Degradation Prompt Templates V3
# 语义合理性 - 解剖学退化策略 - 基于 quality_dimensions_active.json
# 维度: hand_malformation, expression_mismatch, body_proportion_error, extra_limbs, animal_anatomy_error

semantic_anatomy:

  hand_malformation:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of hand anatomy. You may apply the following strategies:

      1. Identify where hands are mentioned or implied (e.g., holding, touching, pointing).
      2. Insert mild posing anomaly descriptors **immediately after** the hand/subject mention (e.g., "holding a cup with fingers held stiffly", "a woman whose hands look slightly robotic and unnatural").
      3. Focus on **awkward posing** rather than structural changes.
      4. Avoid simply appending to the end of a long prompt; attach the description to the subject.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of hand anatomy.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of hand anatomy. You may apply the following strategies:

      1. Identify where hands are mentioned or implied.
      2. Insert a clear hand-structure anomaly descriptor directly modifying the hand. The error should stay within common AI hand failures, such as one extra finger, partially fused fingers, uneven finger lengths or thickness, an awkwardly placed thumb, or one or two unnaturally bent joints.
         e.g. with one extra finger on the visible hand; with two fingers partially fused near the base; gripping the sword with fingers of uneven length and thickness; with a thumb attached at a slightly wrong angle; with one finger bent unnaturally at the joint.
      3. Focus on visible hand structure failures that still read as a human hand, and vary the error type rather than repeating the same finger-count mistake.
      4. Ensure the degradation describes the subject's hand, not a floating hand.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of hand anatomy.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of hand anatomy. You may apply the following strategies:

      1. Identify the subject's hand interaction.
      2. Insert a severe hand-structure anomaly descriptor that combines 2-3 strong but still human-hand-like failures, such as six or seven fingers with awkward spacing, partially fused fingers, visibly uneven finger lengths or thickness, an implausibly attached thumb, or multiple fingers bent in conflicting directions.
         e.g. with six fingers spaced awkwardly across one hand; with two fingers fused near the base and a thumb attached at an implausible angle; with visibly uneven finger lengths and thickness plus multiple awkwardly bent joints; with six or seven fingers and a slightly broken palm-to-wrist structure that still reads as a failed human hand.
      3. Focus on strong hand structure failures while keeping the result within the range of common AI-generated hand errors, rather than turning the hand into something creature-like or non-human.
      4. Strictly preserve the original subject identity and artistic style.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of hand anatomy.
      Output only the rewritten prompt.

  expression_mismatch:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a facial expression that slightly clashes with the scene's emotional context.

      1. The prompt MUST show a single person or creature with a visible face. If no face is present or implied → output "SKIP_THIS_PROMPT".
      2. Identify the scene's emotional tone (joyful, peaceful, tense, sad, etc.).
      3. If an expression word exists, replace it with one that mildly contradicts the mood (e.g., a happy scene → "with a slight frown and furrowed brows", a sad scene → "with a faint awkward smile").
      4. If no expression word exists, INSERT immediately after the subject: a brief expression clause that subtly clashes (e.g., in a calm scene, "with a mildly confused, unsettled look on their face").
      5. Use concrete facial muscle descriptors (furrowed brows, tight lips, downturned mouth) rather than abstract emotion labels alone.
      6. Only modify expression — do NOT change anatomy, style, or scene.

      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a facial expression that clearly and obviously clashes with the scene's emotional context.

      1. The prompt MUST show a single person or creature with a visible face. If no face is present or implied → output "SKIP_THIS_PROMPT".
      2. Identify the scene's emotional tone.
      3. If an expression word exists, replace it with one that feels obviously emotionally or situationally wrong at first glance.
        The mismatch should be clear and socially inappropriate, not subtle, hesitant, or merely slightly off. Use ONE expression
        archetype chosen from this pool of visibly wrong reactions:
        - Inappropriately cheerful: a too-wide smile, a fixed grin, bright delighted eyes, or a pleased smile held at the wrong moment
        - Frozen detached: a vacant smile, a blank stare with tight lips, or emotionally absent raised-brow detachment
        - Irritated or contemptuous: tightened brows, an irritated scowl, a dismissive sneer, or annoyed contempt in a scene that should feel calm or warm
        - Wrong-place alarm: widened eyes, a tense alarmed look, or obvious panic in a scene that should feel ordinary or gentle
        Prefer concrete mouth, eyes, and brows over abstract labels.
        e.g. a tense scene paired with a too-wide pleased smile and bright delighted eyes; a warm intimate moment paired with a vacant smile and detached raised brows; a peaceful setting paired with visible irritation and a contemptuous sneer; a calm everyday moment paired with widened alarmed eyes and a tense mouth.
      4. If no expression word exists, INSERT immediately after the subject a vivid expression clause that clearly clashes with the
        scene mood. Pick ONE archetype from the pool above and describe it in concrete visual terms through the mouth, eyes, and brows.
        Examples include a smile stretched too broadly across the face, a fixed grin with bright delighted eyes, a vacant smile with
        lifted brows, a cold blank stare with tight lips, an irritated scowl with a dismissive sneer, or widened alarmed eyes with a
        tense mouth at an obviously wrong moment. Do NOT use weak words like slight, mild, faint, subtle, uneasy, or merely confused.
      5. Only modify expression — do NOT change anatomy, style, or scene.

      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a facial expression in extreme, jarring opposition to the scene's emotional context.

      1. The prompt MUST show a single person or creature with a visible face. If no face is present or implied → output "SKIP_THIS_PROMPT".
      2. Identify the scene's emotional tone.
      3. Remove ALL original expression words and replace them with an extreme expression that feels emotionally, socially, or
        situationally incompatible with the scene. The mismatch may come from the wrong emotion, the wrong intensity, or a blatantly
        inappropriate reaction to the scene. Use ONE extreme archetype chosen from this pool:
        - Hysterically cheerful: manic laughter, ecstatic delight, or a wild open-mouthed grin with gleaming eyes
        - Severely detached: a deadpan vacant smile, cold blank detachment, or unnervingly peaceful emotional absence
        - Aggressive contempt or irritation: a harsh sneer, furious irritation, or overt contempt in a scene that should feel gentle, intimate, or solemn
        - Panic or terror: a frozen horrified scream, wide-eyed terror, or obvious alarm in a scene that should feel calm, safe, or ordinary
        Make the face visually obvious at a glance through mouth shape, eye openness, brow tension, and overall affect.
        e.g. visible manic delight in a scene of grief or danger; an expression of terror in a calm or gentle moment; harsh contempt
        in a warm or respectful interaction; an unnaturally vacant detached smile in a situation that should feel urgent or emotional.
      4. If no expression word exists, INSERT after the subject an intense expression clause using vivid physical facial cues that
        creates maximum dissonance with the scene. Pick ONE archetype from the pool above and make the contradiction visually obvious
        through the mouth, eyes, and brows at a glance.
      5. Only modify expression — do NOT change anatomy, style, or scene.

      Output only the rewritten prompt.

  body_proportion_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of body proportions. You may apply the following strategies:

      1. Locate the main character/creature noun phrase in the prompt.
      2. Immediately after the subject noun, insert ONE proportion descriptor using a concrete ratio or size comparison that makes the mismatch clearly visible:
         e.g. "with a torso noticeably longer than the legs", "with hands slightly too large for the arms", "with a neck visibly thicker than normal"
      3. Keep everything else in the original prompt unchanged.
      4. Do NOT add any new characters or change the number of people in the scene.

      Focus on **visible proportion mismatch** on the existing figure. Do NOT use "withered", "skinny", "fat".

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of body proportions.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of body proportions. You may apply the following strategies:

      1. Locate the main character/creature noun phrase in the prompt.
      2. Immediately after the subject noun, insert ONE dominant proportion error that is easy to notice at a glance. Prefer
         strong visible archetypes centered on head scale or leg length: a head that looks clearly too large or too small for the
         body, or legs that look clearly too short or too long relative to the torso. Do not dilute the effect with weaker hand,
         foot, shoulder, or upper-body proportion details unless they are absolutely necessary.
         e.g. with a head that looks strikingly too large for the body; with a head that looks noticeably too small for the body;
         with extremely short legs beneath a long torso; with unusually long legs beneath a compact torso.
      3. Keep everything else in the original prompt unchanged.
      4. Keep the error easy to read at a glance rather than scattering many small proportion changes across the whole body.



      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of body proportions.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of body proportions. You may apply the following strategies:

      1. Locate the main character/creature noun phrase in the prompt.
      2. Immediately after the subject noun, insert TWO dominant proportion errors that are easy to read at a glance. Build the
         distortion around head scale plus leg length whenever possible: oversized head + very short legs, oversized head + very
         long legs, tiny head + very short legs, or tiny head + very long legs. Keep the figure clearly disproportionate without
         turning into a creature or introducing many smaller secondary errors.
         e.g. with a head far too large for the body and legs that look far too short beneath a long torso; with a head far too
         large for the body and unusually long legs beneath a compact torso; with a noticeably tiny head above a normal body and
         legs that look much too short; with a tiny head and extremely long legs that dominate the figure.
      3. Keep everything else in the original prompt unchanged.
      4. Keep the distortion visually obvious and structured rather than spreading many subtle changes across unrelated body parts.


      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of body proportions.
      Output only the rewritten prompt.

  extra_limbs:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of limb count. You may apply the following strategies:

      1. Induce counting errors through "complex interaction" rather than direct instruction.
      2. Use descriptors like: "hands with fingers tightly intertwined and confused", "complex hand gesture where digits merge", "hands folded together with indistinguishable number of fingers", "too many fingers visible in the grip".
      3. Force the model to render complex hand geometry which usually results in polydactyly.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of limb count.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of limb count. You may apply the following strategies:

      1. Identify the subject and determine which limb group is most likely to be clearly visible in the original composition.
      2. Strongly prefer extra visible arms or hands as the default limb-count error, because these are usually easier to render clearly and more visually obvious than extra legs.
      3. Only choose extra visible legs or feet when the prompt very clearly suggests a full-body or lower-body view with separated legs, visible lower limbs, and little risk of those limbs being hidden, overlapped, or cropped.
      4. For arm-based errors, do NOT default to only three visible arms if a stronger but still plausible count will render more clearly. Prefer four visible arms as the default moderate arm-count failure, with two normal arms and two extra arms extending from the torso or shoulders. If the subject is holding an object, keep the normal pair doing the holding and let the extra arms appear as additional limbs rather than rewriting the whole pose.
      5. Directly state an incorrect total number of visible arms, hands, legs, or feet in the final image, rather than describing a new limb vaguely growing from somewhere. Prefer wording such as "with four visible arms, two normal and two extra extending from the torso", "with one extra visible arm emerging from the shoulder line", or "with four arms instead of two". Use leg-based errors only in the clearly suitable full-body cases described above.
      6. Keep the anatomical counting failure obvious at a glance and focused on limb number rather than on pose complexity, clothing interaction, or prop interaction.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of limb count.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of limb count. You may apply the following strategies:

      1. Identify the subject and choose the visible limb group that best matches the likely composition of the original prompt.
      2. Prefer severe extra-arm or extra-hand errors by default, because they are more likely to remain visible and read clearly at a glance. Only use extra legs or feet when the prompt clearly shows a front-facing or otherwise unobstructed full-body view with clearly separated lower limbs.
      3. Directly state an incorrect total number of visible arms, hands, legs, or feet in the final image. Prefer six visible arms for severe arm-based failures, or another equally unmistakable multi-arm count, when the composition can support a clear limb-count error.
      4. Use clear counting-based anatomical errors that are immediately noticeable, affecting one or two visible limb groups on the same subject. Prefer wording such as "with six visible arms, two normal and four extra extending from the shoulders and torso", "with multiple extra arms branching from the upper body", or "with six arms instead of two". Use leg-based counting errors only in the clearly suitable full-body cases described above.
      5. Keep the result grounded as a severe generation failure in limb count rather than a fantasy creature, and make the limb-count error impossible to miss at first glance.
      6. Keep the error centered on too many limbs rather than on tangled pose complexity or overly elaborate motion.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of limb count.
      Output only the rewritten prompt.

  animal_anatomy_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of animal anatomy. You may apply the following strategies:

      1. Inject mild malformation descriptors immediately after the animal is mentioned.
      2. Use terms like 'a slightly malformed [animal]', 'a [animal] with awkward proportions', or 'a [animal] with slightly asymmetrical features'.
      3. Do not change the animal species and preserve the original artistic style.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of animal anatomy.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of animal anatomy logic. You may apply the following strategies:

      1. Inject clear anatomy error descriptors right after the animal is mentioned.
      2. Describe 1-2 immediately visible anatomy failures on the same animal. Prefer obvious count or part-placement errors such as too many legs, one missing leg, two heads on one neck, an extra tail, a wing growing from the wrong place, missing ears, or horns attached in the wrong location.
         e.g. a [animal] with six legs instead of four; a [animal] missing one foreleg; a [animal] with two heads sharing one neck; a [animal] with a tail growing from the chest; a [animal] with one ear missing and the other attached too low.
      3. Avoid subtle direction-only mistakes such as slightly awkward joints, mild limb angles, or small pose irregularities.
      4. Maintain the integrity of the original style and environmental context.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of animal anatomy.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of extreme animal anatomy distortion. You may apply the following strategies:

      1. Inject descriptors for severe structural errors immediately after the animal.
      2. Combine 2-3 strong, obvious anatomy failures across the same animal. Prefer major count or placement errors such as extra or missing legs, duplicated heads, an extra tail, wings or horns attached in clearly wrong places, or a major body part missing entirely.
         e.g. a [animal] with two heads on one neck and six legs; a [animal] with one foreleg missing, an extra hind leg, and a tail growing from the shoulder; a [animal] with wings attached near the hips and one horn growing from the cheek.
      3. Avoid subtle orientation-only mistakes such as mildly wrong joints, small angle mismatches, or slightly awkward poses. The anatomy failure should be obvious at first glance.
      4. Do not use words that change the style to medical diagrams and preserve the original artistic medium.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of animal anatomy.
      Output only the rewritten prompt.
