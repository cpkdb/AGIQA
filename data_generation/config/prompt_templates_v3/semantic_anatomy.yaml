# Semantic Rationality - Anatomy Degradation Prompt Templates V3
# 语义合理性 - 解剖学退化策略 - 基于 quality_dimensions_active.json
# 维度: hand_malformation, face_asymmetry, expression_mismatch, body_proportion_error, extra_limbs, impossible_pose, animal_anatomy_error

semantic_anatomy:

  hand_malformation:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of hand anatomy. You may apply the following strategies:

      1. Identify where hands are mentioned or implied (e.g., holding, touching, pointing).
      2. **Insert** mild posing anomaly descriptors **immediately after** the hand/subject mention (e.g., "holding a cup with fingers held stiffly", "a woman whose hands look slightly robotic and unnatural").
      3. Focus on **awkward posing** rather than structural changes.
      4. Avoid simply appending to the end of a long prompt; attach the description to the subject.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of hand anatomy.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of hand anatomy. You may apply the following strategies:

      1. Identify where hands are mentioned or implied.
      2. Insert a specific finger count or length anomaly descriptor directly modifying the hand (e.g., "with a hand clearly showing six fingers spread wide apart", "with two fingers fused into one thick digit on the right hand", "gripping the sword with a hand that has only three short stubby fingers").
      3. Focus on wrong number of fingers (too many or too few) or obviously wrong finger proportions.
      4. Ensure the degradation describes the subject's hand, not a floating hand.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of hand anatomy.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of hand anatomy. You may apply the following strategies:

      1. Identify the subject's hand interaction.
      2. Insert an extreme finger count or structure anomaly descriptor (e.g., "with seven or eight tangled fingers crowded on one hand", "with fingers of wildly different sizes, some twice as long and thick as others", "with both hands showing six or seven fingers each, some splitting into two at the tip").
      3. Focus on severe digit count errors and gross proportion mismatches between fingers on the same hand.
      4. Strictly preserve the original subject identity and artistic style.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of hand anatomy.
      Output only the rewritten prompt.

  face_asymmetry:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of facial quality. You may apply the following strategies:

      1. Locate the main character/creature with a visible face in the prompt.
      2. The prompt MUST describe a single person (or creature) whose face is the focus or clearly visible. If the prompt describes:
         - A group/crowd scene where no single face dominates → output "SKIP_THIS_PROMPT"
         - A sculpture, mask, drawing-of-a-face, or non-living face → output "SKIP_THIS_PROMPT"
         - A scene where the face is too small or distant to matter → output "SKIP_THIS_PROMPT"
      3. Immediately after the subject noun, insert ONE facial asymmetry descriptor. Target structural features where any mismatch is immediately noticeable:
         - Eyes: "with one eye positioned noticeably higher on the face than the other, the two eyes clearly misaligned"
         - Eyebrows: "with one eyebrow sitting much higher than the other, the face visibly lopsided"
         - Mouth: "with the mouth clearly tilted, one corner significantly higher than the other"
         e.g. describe a specific paired feature where one side is clearly in the wrong position
      4. Keep everything else in the original prompt unchanged.
      5. Do NOT describe this as a normal person type (e.g. do NOT use "lazy eye", "Bell's palsy").

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of facial quality.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of facial quality. You may apply the following strategies:

      1. Locate the main character with a visible face in the prompt.
      2. The prompt MUST describe a single person (or creature) whose face is the focus or clearly visible. If the prompt describes:
         - A group/crowd scene where no single face dominates → output "SKIP_THIS_PROMPT"
         - A sculpture, mask, drawing-of-a-face, or non-living face → output "SKIP_THIS_PROMPT"
         - A scene where the face is too small or distant → output "SKIP_THIS_PROMPT"
      3. Immediately after the subject noun, insert 1-2 facial asymmetry descriptors that are obviously wrong:
         - Eyes: "with one eye positioned significantly higher than the other, creating an obviously asymmetric face that looks clearly wrong"
         - Eye + mouth: "with one eye noticeably higher than the other and the mouth visibly tilted, the whole face clearly off-balance"
         - Structural: "with the left side of the face visibly larger than the right, the two halves of the face clearly mismatched"
      4. Keep everything else in the original prompt unchanged.
      5. CRITICAL: Do NOT describe a new or different person — the SAME person must have these wrong facial proportions.
      6. Do NOT use medical condition labels ("Bell's palsy", "lazy eye").

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of facial quality.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded quality specifically in terms of facial quality. You may apply the following strategies:

      1. Locate the main character with a visible face in the prompt.
      2. The prompt MUST describe a single person (or creature) whose face is the focus or clearly visible. If the prompt describes:
         - A group/crowd scene where no single face dominates → output "SKIP_THIS_PROMPT"
         - A sculpture, mask, drawing-of-a-face, or non-living face → output "SKIP_THIS_PROMPT"
         - A scene where the face is too small or distant → output "SKIP_THIS_PROMPT"
      3. Immediately after the subject noun, insert 2-3 facial asymmetry descriptors combined together, making the face look grotesquely and obviously wrong. Each error must be extreme enough to be immediately apparent:
         - Eyes: "one eye significantly higher and larger than the other"
         - Overall structure: "the left side of the face visibly bigger and lower than the right, the whole face clearly lopsided"
         - Mouth: "the mouth severely tilted with one corner much higher, completely off-center"
         - Combined: mix 2-3 of the above — "with one eye much higher and larger than the other, the left side of the face visibly bigger than the right, making the entire face look grotesquely asymmetric and structurally wrong"
         e.g. the result should look like an obvious AI generation failure, not a normal or medical face
      3. Keep everything else in the original prompt unchanged.
      4. CRITICAL: Do NOT describe a new or different person — deform the SAME person's face.
      5. Do NOT use medical condition labels.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of facial quality.
      Output only the rewritten prompt.

  expression_mismatch:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a facial expression that slightly clashes with the scene's emotional context.

      1. The prompt MUST show a single person or creature with a visible face. If no face is present or implied → output "SKIP_THIS_PROMPT".
      2. Identify the scene's emotional tone (joyful, peaceful, tense, sad, etc.).
      3. If an expression word exists, replace it with one that mildly contradicts the mood (e.g., a happy scene → "with a slight frown and furrowed brows", a sad scene → "with a faint awkward smile").
      4. If no expression word exists, INSERT immediately after the subject: a brief expression clause that subtly clashes (e.g., in a calm scene, "with a mildly confused, unsettled look on their face").
      5. Use concrete facial muscle descriptors (furrowed brows, tight lips, downturned mouth) rather than abstract emotion labels alone.
      6. Only modify expression — do NOT change anatomy, style, or scene.

      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a facial expression that clearly and obviously clashes with the scene's emotional context.

      1. The prompt MUST show a single person or creature with a visible face. If no face is present or implied → output "SKIP_THIS_PROMPT".
      2. Identify the scene's emotional tone.
      3. If an expression word exists, replace it with a strongly contradictory one using vivid physical descriptors:
         - Happy scene → "with a deep frown, downturned mouth, and tearful eyes"
         - Sad/painful scene → "grinning widely with raised cheeks and bright laughing eyes"
         - Calm/peaceful scene → "with a look of visible distress, brows tightly knitted and jaw clenched"
         - Angry/tense scene → "with a blissful relaxed smile and half-closed dreamy eyes"
      4. If no expression word exists, INSERT immediately after the subject a vivid expression clause that strongly contradicts the scene mood. Use physical face descriptors (tears, wide grin, clenched jaw, raised eyebrows) not just emotion labels.
      5. Only modify expression — do NOT change anatomy, style, or scene.

      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have a facial expression in extreme, jarring opposition to the scene's emotional context.

      1. The prompt MUST show a single person or creature with a visible face. If no face is present or implied → output "SKIP_THIS_PROMPT".
      2. Identify the scene's emotional tone.
      3. Remove ALL original expression words and replace with an extreme opposite using vivid, physical, high-intensity descriptors:
         - Happy/celebratory scene → "with a face contorted in anguish, mouth open in a silent scream, tears streaming down the cheeks"
         - Grief/funeral scene → "laughing hysterically, mouth wide open, eyes crinkled with uncontrollable joy"
         - Peaceful/serene scene → "with an expression of sheer terror, eyes wide open and mouth agape in a scream"
         - Threatening/danger scene → "with a dreamy blissful smile, eyes half-closed in total contentment"
      4. If no expression word exists, INSERT after the subject an extreme expression clause using physical face details (open mouth, streaming tears, wide eyes, bared teeth) that creates maximum emotional dissonance with the scene.
      5. Only modify expression — do NOT change anatomy, style, or scene.

      Output only the rewritten prompt.

  body_proportion_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of body proportions. You may apply the following strategies:

      1. Locate the main character/creature noun phrase in the prompt.
      2. Immediately after the subject noun, insert ONE proportion descriptor using a concrete ratio or size comparison that makes the mismatch clearly visible:
         e.g. "with a torso noticeably longer than the legs", "with hands slightly too large for the arms", "with a neck visibly thicker than normal"
      3. Keep everything else in the original prompt unchanged.
      4. Do NOT add any new characters or change the number of people in the scene.

      Focus on **visible proportion mismatch** on the existing figure. Do NOT use "withered", "skinny", "fat".

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of body proportions.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of body proportions. You may apply the following strategies:

      1. Locate the main character/creature noun phrase in the prompt.
      2. Immediately after the subject noun, insert 1-2 proportion descriptors that produce a grotesquely wrong-looking figure. Use extreme concrete ratios so the mismatch is undeniable:
         - Torso/leg ratio: "with a torso twice as long as the legs, the upper body dominating two-thirds of the total height"
         - Head ratio: "with a head nearly twice the normal size sitting on the body, making the figure look strangely wrong"
         - Limb thickness: "with oversized hands almost as wide as the shoulders, clearly disproportionate"
      3. Keep everything else in the original prompt unchanged.
      4. CRITICAL: Do NOT add any new characters. The SAME single figure must have these wrong proportions — describe the deformation of the existing subject, not a new person.

      Do NOT use "withered", "skinny", "fat", "inflated".

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of body proportions.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of body proportions. You may apply the following strategies:

      1. Locate the main character/creature noun phrase in the prompt.
      2. Immediately after the subject noun, insert 2-3 extreme proportion descriptors combined together, making the figure look grotesquely and obviously disproportionate:
         - "with a massive barrel-like torso three times the length of the tiny stick-like legs, the upper body grotesquely dominating the frame"
         - "with an enormous torso dwarfing shrunken legs, combined with a tiny head that looks absurdly small on the huge upper body"
         - "with wide heavy shoulders on top of extremely thin stick legs, and a neck so thick it blends into the shoulders"
      3. Keep everything else in the original prompt unchanged.
      4. CRITICAL: Do NOT add any new characters. The SAME single figure must have these extreme wrong proportions — deform the existing subject, not replace them.

      Do NOT use "skeleton", "withered", "balloon", "inflated", "fat", "obesity". Keep the body build average weight, just badly proportioned.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of body proportions.
      Output only the rewritten prompt.

  extra_limbs:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of limb count. You may apply the following strategies:

      1. Induce counting errors through "complex interaction" rather than direct instruction.
      2. Use descriptors like: "hands with fingers tightly intertwined and confused", "complex hand gesture where digits merge", "hands folded together with indistinguishable number of fingers", "too many fingers visible in the grip".
      3. Force the model to render complex hand geometry which usually results in polydactyly.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of limb count.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of limb count. You may apply the following strategies:

      1. Identify the subject and determine how many arms/hands/legs they should normally have.
      2. Directly state the total number of limbs visible in the final image, rather than describing "an extra limb growing from" (e.g., "with three arms clearly visible, two on the left side and one on the right", "with three hands visible, one holding the cup and two resting on the table", "with three legs visible underneath the body").
      3. The extra limb should be described as solid and real, positioned naturally alongside the existing limbs.
      4. Keep the total to ONE additional limb (3 arms or 3 hands total).

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of limb count.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of limb count. You may apply the following strategies:

      1. Identify the subject and directly state an incorrect total number of limbs or heads in the final image.
      2. Use concrete counts and positions (e.g., "with four arms total, two on each side of the body", "with two heads side by side on the shoulders, each facing a slightly different direction", "with six arms extending from the torso, three on each side", "with four legs visible, two in front and two behind").
      3. Keep the original artistic style and medium — do NOT use words like "surreal", "dream-like", "fractal", or "abstract". Describe it as a straightforward anatomical error with specific limb counts.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of limb count.
      Output only the rewritten prompt.

  impossible_pose:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of pose logic. You may apply the following strategies:

      1. Identify the subject (person or creature).
      2. Insert a visibly stiff or over-extended pose descriptor immediately after the subject, describing a specific body part at an awkward extreme angle (e.g., "with head tilted sharply to one side, almost touching the shoulder", "with both arms raised stiffly above the head at rigid unnatural angles", "standing with the torso leaning far forward while the legs remain perfectly straight").
      3. Focus on poses that are physically possible but clearly uncomfortable and unnatural-looking.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of pose logic.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of pose logic. You may apply the following strategies:

      1. Identify the subject (person or creature).
      2. Insert a pose descriptor where body parts face contradictory directions, using concrete spatial relationships (e.g., "with the head twisted looking directly behind while the body faces forward", "sitting with both legs bent backwards under the chair", "with one arm reaching behind the back and bending upward to touch the opposite shoulder from behind").
      3. Describe the exact direction each body part faces to create a clear directional conflict.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of pose logic.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of pose logic. You may apply the following strategies:

      1. Identify the subject (person or creature).
      2. Insert an extreme full-body twist or contortion descriptor that makes the overall posture clearly broken (e.g., "with the upper body rotated 180 degrees so the chest faces backward while the legs face forward", "in a contortionist pose with the head between the knees and arms wrapped around from behind", "with the torso bent completely sideways at the waist so the head is at hip level while standing").
      3. Describe the spatial relationship between at least two major body sections (upper/lower body, head/torso) to ensure the conflict is visually obvious.
      4. Do NOT use words like "spiral", "mangled", or "broken". The body parts are intact, just in an impossible arrangement.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of pose logic.
      Output only the rewritten prompt.

  animal_anatomy_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of animal anatomy. You may apply the following strategies:

      1. Inject mild malformation descriptors immediately after the animal is mentioned.
      2. Use terms like 'a slightly malformed [animal]', 'a [animal] with awkward proportions', or 'a [animal] with slightly asymmetrical features'.
      3. Do not change the animal species and preserve the original artistic style.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of animal anatomy.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of animal anatomy logic. You may apply the following strategies:

      1. Inject clear anatomy error descriptors right after the animal is mentioned.
      2. Use phrases like 'a deformed [animal] with bad anatomy', 'a [animal] with extra legs and wrong joints', or 'a [animal] with a twisted body pose'.
      3. Maintain the integrity of the original style and environmental context.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of animal anatomy.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of extreme animal anatomy distortion. You may apply the following strategies:

      1. Inject descriptors for severe structural errors immediately after the animal.
      2. Use specific terms like 'a [animal] with two heads growing from the same neck', 'a [animal] with a cluster of extra legs growing from its back', or 'a [animal] with 8 legs and a twisted torso'.
      3. Do not use words that change the style to medical diagrams and preserve the original artistic medium.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of animal anatomy.
      Output only the rewritten prompt.
