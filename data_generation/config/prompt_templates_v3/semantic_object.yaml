# Semantic Rationality - Object & Scene Degradation Prompt Templates V3
# 语义合理性 - 物体与场景退化策略 - 基于 quality_dimensions_v3.json
# 维度: object_shape_error, extra_objects, count_error, illogical_colors
# 已删除: object_fusion, missing_parts

semantic_object:

  object_shape_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that a key object or entity has a subtly WRONG shape — it should look like a minor generation artifact.

      1. Identify the most visually prominent object or entity in the prompt. This can be anything: a man-made object, a plant, an animal, a body part, a natural formation, etc.
      2. Describe ONE subtle shape distortion that looks like a generation defect — a part that is slightly warped, asymmetric, or unnaturally proportioned (e.g., a dog with a slightly too-long snout that droops to one side, a flower with petals that sag unevenly, a chair with one leg bending at a wrong angle, a person with one ear noticeably larger than the other).
      3. INSERT the distortion description immediately after the object noun.
      4. Do NOT use damage words (broken, cracked, torn). Do NOT use perfect geometric shapes (square, cubic, triangular) as replacements — they look intentional, not like errors.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object shape.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that a key object or entity has obviously WRONG shapes — it should look like a noticeable generation artifact.

      1. Identify the most visually prominent object or entity in the prompt. This can be anything: a man-made object, a plant, an animal, a body part, a natural formation, etc.
      2. Describe 1-2 clear shape distortions that look like generation defects — parts that are warped, asymmetrically stretched, unnaturally elongated, or sagging in ways that violate the object's expected proportions (e.g., a dog with an unnaturally elongated snout that droops sideways, a flower with petals that sag and melt into each other, a tree with a trunk that twists and bends at unnatural angles, a person with one arm noticeably longer and thinner than the other, a car with a hood that bulges unevenly to one side).
      3. INSERT the distortion descriptions immediately after the object noun.
      4. Do NOT use damage words (broken, cracked, torn). Do NOT use perfect geometric shapes (square, cubic, triangular) as replacements — they look intentional, not like errors. Use organic deformation words: warped, sagging, twisted, elongated, drooping, melting, pinched, bulging, asymmetric.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object shape.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that a key object or entity has severely WRONG shapes across multiple parts — it should look like a badly generated image with obvious artifacts.

      1. Identify the most visually prominent object or entity in the prompt. This can be anything: a man-made object, a plant, an animal, a body part, a natural formation, etc.
      2. Describe 2-3 severe shape distortions across different parts of the object that look like generation defects — parts warped, twisted, melting, or grotesquely disproportionate (e.g., a person with one arm twisted like a corkscrew and a torso that sags to one side and an unnaturally elongated neck, a cat with legs of wildly different lengths and a head that droops sideways and a tail that spirals into itself, a tree with a trunk that undulates in wavy curves and branches that melt downward and leaves that clump into formless blobs).
      3. INSERT all distortion descriptions immediately after the object noun.
      4. Do NOT use damage words (broken, cracked, torn). Do NOT use perfect geometric shapes (square, cubic, triangular) as replacements. Use organic deformation words: warped, sagging, twisted, elongated, drooping, melting, pinched, bulging, asymmetric, spiraling, undulating.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object shape.
      Output only the rewritten prompt.

  # object_fusion: REMOVED - SDXL severe失败，效果不稳定
  # missing_parts: REMOVED - 生成模型先验会补全物体，prompt层面不可控

  extra_objects:
    mild: |
      You are given a text-to-image prompt. Your task is to add ONE semantically irrelevant object that has no connection to the scene's purpose or activity.

      RULES:
      1. Identify the scene's purpose/activity (e.g., nature landscape, cooking, sports).
      2. Choose ONE object with ZERO semantic connection to that activity — it should feel like a random hallucination, NOT a wrong-room object (do NOT use room-specific fixtures like bathtubs, toilets, ovens).
         e.g. nature landscape → a typewriter, a suitcase; kitchen scene → a tennis racket, a surfboard; beach → an office chair, a filing cabinet
      3. INSERT the object into the scene description with a concrete spatial position:
         e.g. "..., with a bright red fire extinguisher standing on the ground next to [existing object]"
         e.g. "..., a yellow traffic cone placed prominently in the foreground"
      4. Use a visually distinct color or material for the extra object to increase its visibility.
      5. Do NOT modify the original prompt content.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object relevance.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to add ONE clearly irrelevant object that has no logical connection to the scene.

      RULES:
      1. Identify the scene's purpose/activity.
      2. Choose ONE object with NO semantic connection to the scene — must feel randomly out of place, NOT a misplaced room fixture (do NOT use bathroom/bedroom/kitchen-specific furniture).
         e.g. forest scene → a photocopier, a shopping trolley; sports field → a grand piano, a floor lamp; mountain → a vending machine, a desk fan
      3. INSERT the object into the scene with a PROMINENT spatial position and vivid visual description:
         e.g. "..., with a large bright orange shopping cart sitting prominently in the center of the scene"
         e.g. "..., a shiny red grand piano placed directly in front of [main subject]"
      4. Make the extra object large, colorful, and impossible to miss — use adjectives like "large", "bright", "shiny".
      5. Do NOT modify the original prompt content.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object relevance.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to add TWO semantically irrelevant objects with no connection to the scene.

      RULES:
      1. Identify the scene's purpose/activity.
      2. Choose TWO objects each from completely different domains, both with NO semantic connection to the scene — they should feel like random model hallucinations, NOT misplaced room fixtures (do NOT use bathroom/bedroom/kitchen-specific furniture).
         e.g. outdoor nature → a photocopier and a trombone; restaurant scene → a surfboard and a floor lamp; studio → a shopping trolley and a telescope
      3. INSERT both objects into the scene with PROMINENT positions and vivid visual descriptions:
         e.g. "..., with a large bright yellow excavator parked in the middle of the scene and a shiny red fire hydrant standing next to [existing object]"
      4. Make each extra object large, colorful, and impossible to miss.
      5. Do NOT modify the original prompt content.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object relevance.
      Output only the rewritten prompt.

  count_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to introduce a minor counting error.

      RULES:
      1. Find ONE concrete countable noun — PRIORITIZE the main subject (person, animal, small foreground object)
      2. Change 'a/an' to 'two', or 'one' to 'two'
      3. Only modify ONE object's count, never multiple objects
      4. Only change the quantity word and noun plurality, nothing else
      5. Do NOT change the count of accessories or small attached parts (hats, buttons, wheels) — change the main subject itself

      FORBIDDEN:
      - Collective nouns: group, bunch, pile, set, pair, crowd
      - Metaphors: anything after 'resemble', 'like', 'shaped like'
      - Abstract/uncountable: sky, water, air, light, sun, moon
      - Background/scene elements: building, house, mountain, tree, cloud, star, wall, window, floor
      - Large objects: car, television, bed, sofa, table
      - Changing more than one object's count

      Example:
      - Input: "a cat sleeping on the sofa"
      - Output: "two cats sleeping on the sofa"
      - Input: "a bird on the branch"
      - Output: "two birds on the branch"

      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to introduce a noticeable counting error.

      RULES:
      1. Find ONE concrete countable noun — PRIORITIZE the main subject (person, animal, small foreground object)
      2. Change 'a/an' to 'three', or 'two' to 'four'
      3. Only modify ONE object's count, never multiple objects
      4. Keep numbers realistic and renderable (max 4-5 for small objects)
      5. Do NOT change the count of accessories or small attached parts — change the main subject itself

      FORBIDDEN:
      - Collective nouns: group, bunch, pile, set, pair, crowd
      - Metaphors: anything after 'resemble', 'like', 'shaped like'
      - Background/scene elements: building, house, mountain, tree, cloud, star, sun, moon, wall
      - Large furniture/appliances: television, sofa, bed, refrigerator, car
      - Changing more than one object's count

      Example:
      - Input: "a mischievous monkey stealing a banana"
      - Output: "three mischievous monkeys stealing a banana"

      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt to introduce a significant counting error.

      RULES:
      1. Find ONE concrete countable noun — PRIORITIZE the main subject (person, animal, small foreground object)
      2. Change to a larger but still realistic number: 'four', 'five', or 'six'
      3. Only modify ONE object's count, never multiple objects
      4. The number must be physically possible in the scene
      5. Do NOT change the count of accessories or small attached parts — change the main subject itself

      FORBIDDEN:
      - Numbers larger than 6 (SDXL cannot reliably render more)
      - Vague words: many, countless, numerous, dozen, several
      - Background/scene elements: building, house, mountain, tree, cloud, star, sun, moon
      - Large furniture/appliances that can't be multiplied
      - Changing more than one object's count
      - Turning metaphors into real objects

      Example:
      - Input: "a woman holding an umbrella"
      - Output: "five women holding umbrellas"

      Output only the rewritten prompt.



  illogical_colors:
    mild: |
      You are given a text-to-image prompt. Your task is to give ONE object an illogical color.

      STEP 1: Search for ANY of these valid targets in the prompt:
      - Natural vegetation: grass, leaves, tree/trees, bush, lawn, meadow, field (if green implied)
      - Real animals: dog, cat, horse, cow, elephant, lion, tiger, bear, rabbit, deer, sheep, pig, bird
      - Human features: skin, person, people, man, woman, face, hands (can target their skin)
      - Real fruits: banana, apple, orange, lemon, watermelon, strawberry
      - Natural elements: snow, sand

      STEP 2: If you found ANY valid target, modify its color:
      - grass/lawn/meadow → "purple grass", "blue lawn"
      - leaves/trees → "pink leaves", "blue trees"
      - animals → "green [animal]", "blue [animal]"
      - person/people/skin → "green-skinned [person]", "[person] with blue skin"
      - fruits → "blue banana", "green strawberry"

      STEP 3: Only output "SKIP_THIS_PROMPT" if:
      - The prompt is about fantasy/magical/surreal scenes AND has no real-world elements
      - There are absolutely NO natural objects or living beings in the prompt

      DO NOT skip just because the prompt has man-made objects - look harder for natural elements!

      Example:
      - Input: "A couch facing windows showing green grass and trees"
      - Output: "A couch facing windows showing purple grass and trees"
      - Input: "A woman in a hoodie with a group of people"
      - Output: "A green-skinned woman in a hoodie with a group of people"
      - Input: "A purple flower pot" (only man-made object, no nature)
      - Output: SKIP_THIS_PROMPT

      Output only the rewritten prompt, or "SKIP_THIS_PROMPT" if truly no valid target.

    moderate: |
      You are given a text-to-image prompt. Your task is to give ONE or TWO objects illogical colors.

      STEP 1: Search for ANY of these valid targets in the prompt:
      - Natural vegetation: grass, leaves, tree/trees, bush, lawn, meadow, field (if green implied)
      - Real animals: dog, cat, horse, cow, elephant, lion, tiger, bear, rabbit, deer, sheep, pig, bird
      - Human features: skin, person, people, man, woman, face, hands (can target their skin)
      - Real fruits: banana, apple, orange, lemon, watermelon, strawberry
      - Natural elements: snow, sand

      STEP 2: If you found ANY valid target, modify its color with stronger adjectives:
      - grass/lawn/meadow → "bright purple grass", "neon blue lawn"
      - leaves/trees → "hot pink leaves", "electric blue trees"
      - animals → "neon green [animal]", "bright pink [animal]"
      - person/people/skin → "bright green-skinned [person]", "[person] with neon blue skin"
      - fruits → "bright blue banana", "neon green strawberry"

      STEP 3: Only output "SKIP_THIS_PROMPT" if:
      - The prompt is about fantasy/magical/surreal scenes AND has no real-world elements
      - There are absolutely NO natural objects or living beings in the prompt

      DO NOT skip just because the prompt has man-made objects - look harder for natural elements!

      Example:
      - Input: "Indoor view with wooden floor, showing grass and trees outside"
      - Output: "Indoor view with wooden floor, showing neon purple grass and bright blue trees outside"

      Output only the rewritten prompt, or "SKIP_THIS_PROMPT" if truly no valid target.

    severe: |
      You are given a text-to-image prompt. Your task is to give TWO or THREE objects extremely illogical colors.

      STEP 1: Search for ANY of these valid targets in the prompt:
      - Natural vegetation: grass, leaves, tree/trees, bush, lawn, meadow, field (if green implied)
      - Real animals: dog, cat, horse, cow, elephant, lion, tiger, bear, rabbit, deer, sheep, pig, bird
      - Human features: skin, person, people, man, woman, face, hands (can target their skin)
      - Real fruits: banana, apple, orange, lemon, watermelon, strawberry
      - Natural elements: snow, sand

      STEP 2: If you found ANY valid target, modify with extreme color words:
      - grass/lawn/meadow → "fluorescent purple grass", "electric blue lawn"
      - leaves/trees → "neon pink leaves", "fluorescent blue trees"
      - animals → "fluorescent green [animal]", "electric pink [animal]"
      - person/people/skin → "fluorescent green-skinned [person]"
      - fruits → "electric blue banana", "fluorescent green strawberry"

      STEP 3: Only output "SKIP_THIS_PROMPT" if:
      - The prompt is about fantasy/magical/surreal scenes AND has no real-world elements
      - There are absolutely NO natural objects or living beings in the prompt

      DO NOT skip just because the prompt has man-made objects - look harder for natural elements!

      Output only the rewritten prompt, or "SKIP_THIS_PROMPT" if truly no valid target.
