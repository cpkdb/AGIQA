# Semantic Rationality - Spatial & Scene Degradation Prompt Templates V3
# 语义合理性 - 空间/场景一致性退化策略 - 基于 quality_dimensions_active.json
# 维度: scale_inconsistency, floating_objects, penetration_overlap,
#       context_mismatch, time_inconsistency, scene_layout_error
# 已删除: perspective_error, background_discrepancy

semantic_spatial:

  # perspective_error: REMOVED - SDXL完全不可控，策略依赖抽象空间描述

  scale_inconsistency:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image has a subtle scale error — one object appears unnaturally large or small relative to the overall scene.

      Strategies:
      1. Pick ONE object in the prompt. Describe it as slightly too large or too small for the scene, with a concrete physical size description (e.g., "a coffee cup nearly as tall as the table leg", "a bird almost the size of a person's torso").
      2. Keep the original prompt structure intact. INSERT the size description immediately after the target object noun.
      3. Do NOT rewrite other parts of the prompt.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of scale.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that one object has a clearly wrong, non-conventional size that creates a visible scale inconsistency in the image.

      Strategies:
      1. Identify one clearly recognizable object, creature, or accessory in the scene and make its size noticeably inconsistent relative to nearby reference objects, while keeping the rest of the scene normal.
      2. The mismatch should be easy to compare at a glance and should read as a local scale error rather than a fantasy giant-world transformation.
         e.g. a houseplant leaf larger than the nearby lamp shade; a coffee mug nearly as tall as the laptop beside it; a butterfly noticeably larger than the flower it rests on; a wristwatch face almost as wide as the wearer's forearm.
      3. INSERT the size mismatch immediately after the target noun and keep the original subject, scene, and style unchanged.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of scale.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that one object has an extremely wrong size that creates an obvious and severe scale inconsistency in the image.

      Strategies:
      1. Identify one object, creature, or accessory and make it dramatically larger or smaller than nearby reference objects in a way that is obviously wrong but still localized within the scene.
      2. The size error should be immediately understandable through direct comparison with surrounding items, without turning the whole image into a surreal giant-world scene.
         e.g. an insect larger than the fruit beside it; a desk lamp almost as large as the chair next to it; one vase towering over the shelf while the surrounding objects remain normal-sized; a pair of glasses covering nearly half of the wearer's face.
      3. INSERT the size mismatch immediately after the target noun and keep the original subject, scene, and style unchanged.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of scale.
      Output only the rewritten prompt.

  floating_objects:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of spatial grounding. You may apply the following strategies:

      1. Append descriptors for slight levitation to a small object or the subject's feet.
      2. Use terms like 'slightly hovering', 'not quite touching the ground', or 'hovering just above the surface'.
      3. Keep the scene grounded overall but introduce minor gravity errors.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of spatial grounding.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of spatial grounding. You may apply the following strategies:

      1. Describe the main subject or object as clearly hovering without support, with a visible gap separating it from the surface that should normally support it.
      2. Make the grounding failure obvious and local: describe the subject or object as hovering above a table, floor, or ground, or a person as standing slightly above the ground without support beneath them.
         e.g. hovering above a table, floor, or ground; a chair floating a short distance above the floor; a person standing with both feet visibly separated from the ground.
      3. Ensure the description clearly states that the subject or object is not touching its supporting surface.

      CRITICAL: Use at least TWO floating-related phrases to ensure SDXL renders the effect.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of spatial grounding. You may apply the following strategies:

      1. Describe multiple objects or the main subject as clearly suspended in mid-air with no support beneath them, making the grounding failure impossible to miss.
      2. Create a strong scene-level hovering failure by describing several objects, or the subject plus nearby objects, as floating at different heights above the surface that should hold them.
         e.g. several objects suspended above the floor with visible gaps beneath them; the main subject and nearby props hovering in mid-air instead of resting on the ground; furniture and objects floating above the room surfaces without support beneath.
      3. Keep the effect clearly visible and physically wrong without changing the scene into a fantasy zero-gravity world.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of spatial grounding.
      Output only the rewritten prompt.

  penetration_overlap:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of impossible overlap or merge. You may apply the following strategies:

      1. Locate two objects in the scene that are near each other or touching.
      2. Describe their boundaries as slightly blending, biting into each other, or merging at the contact point.
         e.g. an arm slightly blending into the chair armrest; fingers lightly merging into the cup surface; two object edges appearing to eat into each other.
      3. APPEND or INSERT the overlap description using terms like "overlapping", "merging into", "biting into", or "boundaries blending together".
      4. Keep both objects intact — the error is a subtle merge or overlap, not damage.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object overlap.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of impossible overlap, merge, or attachment. You may apply the following strategies:

      1. Locate two objects in the scene that are near each other or interacting (e.g., person and furniture, object and surface).
      2. Describe one object as clearly overlapping, merged into, or attached in an impossible way to the other, specifying which part intersects or fuses with which surface.
         e.g. forearms visibly merging into the desk surface; the lamp base embedded into the tabletop; two solid objects overlapping with their edges still visible; a handle attached into the wrong solid surface.
      3. APPEND or INSERT the description using concrete spatial terms such as "merging into", "embedded into", "overlapping the solid edge of", or "attached in an impossible position on".
      4. Keep both objects solid and intact — the error is that their boundaries or attachment logic are wrong, not that they are broken.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object overlap.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of extreme impossible overlap, merge, or attachment failure. You may apply the following strategies:

      1. Locate two prominent objects or a person and a large object in the scene.
      2. Describe them as severely overlapping, fused, or wrongly attached so that a large portion of both occupies the same space or a key part is connected in a blatantly impossible place.
         e.g. a stone pillar visibly merged into the torso while both boundaries remain visible; a bicycle wheel overlapping deep into the wall while both stay fully solid; two bodies sharing the same torso area; a large handle attached directly into the wrong side panel.
      3. Use concrete descriptions of which parts overlap or fuse and how much, emphasizing obvious boundary failure and simultaneous visibility.
      4. Keep both objects visually intact and solid — they simply ignore normal object boundaries or attachment logic.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of object overlap.
      Output only the rewritten prompt.

  context_mismatch:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of contextual consistency. You may apply the following strategies:

      1. Introduce a subtle anachronism or slightly out-of-place element (e.g., 'a slightly modern element in a historical setting', 'something subtly wrong for the environment').
      2. Keep the overall scene coherent but with one minor element that doesn't quite belong.
      3. Transition one minor property to be inconsistent with the setting.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of context.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of contextual consistency. You may apply the following strategies:

      1. Add ONE clear contextual incompatibility involving era, habitat, or scene purpose.
      2. The mismatch should come from what clearly does not belong in this setting or use case, not from physics, placement, or time-of-day.
         e.g. a historical figure using a clearly modern device; an animal placed in an obviously wrong habitat; a scene whose main activity conflicts with the intended purpose of the environment.
      3. Ensure at least one primary element is in direct conflict with the established environment or context.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of context.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of strong contextual mismatch. You may apply the following strategies:

      1. Keep the main subject and action EXACTLY the same, but place them in a strongly incompatible setting or context, optionally reinforced by ONE additional context-defining element.
      2. The failure should read as a wrong setting or context decision involving era, habitat, or scene purpose, not as layout error, temporal conflict, or extra-object clutter.
         e.g. a beach activity placed in a harsh frozen environment; a formal historical subject interacting with a clearly modern context cue; an animal or object shown in an environment where it obviously does not belong.
      3. Keep the mismatch focused and visually obvious without piling on unrelated conflicts.


      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of context.
      Output only the rewritten prompt.

  time_inconsistency:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of temporal consistency. You may apply the following strategies:

      1. Add subtle lighting or seasonal conflicts (e.g., 'stars visible in a twilight sky', 'morning fog with afternoon-length shadows', 'flowers blooming in autumn').
      2. Ensure time-related clues feel slightly off or inconsistent but not completely impossible.
      3. Maintain the core subject while blurring the time-of-day or season indicators.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of temporal logic.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of temporal consistency. You may apply the following strategies:

      1. Introduce a clear weather or season conflict that contradicts the scene (e.g., 'heavy snow falling on a sunny tropical beach', 'winter coats in a blazing desert').
      2. Describe conflicting time indicators like 'bright sunlight streaming through a window at midnight'.
      3. Create a binary conflict between two strong environmental cues.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of temporal logic.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of strong temporal logic failures. You may apply the following strategies:

      1. Force a visual paradox with conflicting time indicators (e.g., 'sky split in half between sunny day and starry night').
      2. Describe impossible but realistic celestial events like 'sun and full moon appearing together in the sky'.
      3. Combine conflicting seasons: 'snow falling on blooming cherry blossoms', 'autumn leaves with spring flowers'.

      FORBIDDEN (will change art style to surrealism):
      - Do NOT mention "melting clocks", "timeless void", "time distortion"
      - Do NOT describe physics-breaking effects like "rain falling upward"
      - Do NOT add abstract time concepts

      Keep the main subject EXACTLY the same. Only add realistic time/season/lighting conflicts.
      Output only the rewritten prompt.



  # NOTE: unexpected_element 已合并到 semantic_object.yaml 的 extra_objects 维度

  scene_layout_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of spatial layout logic. You may apply the following strategies:

      1. Locate the main scene and identify objects that have a natural expected position.
      2. Choose ONE small object and describe it as placed in a slightly wrong but nearby location (e.g., on the wrong surface, in the wrong corner of the same room).
      3. Immediately APPEND a clause describing the misplacement to the original prompt.
      4. The object must still rest normally — no floating, no upside-down, no size changes.

      Example: "A cozy bedroom with a bed and nightstand" → "A cozy bedroom with a bed and nightstand, with a pair of shoes sitting on top of the nightstand next to the lamp"
      Example: "A park with trees and a walking path" → "A park with trees and a walking path, with a mailbox standing in the middle of the grass between two trees"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of spatial layout.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of spatial layout logic. You may apply the following strategies:

      1. Locate the main scene and identify its room type or zone (kitchen, bedroom, park, street, etc.).
      2. Choose ONE large object that clearly belongs to a DIFFERENT room or zone.
      3. APPEND a clause placing that object inside the current scene in a specific spot, using concrete spatial descriptions (e.g., "placed between X and Y", "standing in the corner next to Z").
      4. The object must rest on the ground normally — no floating, no upside-down, no size changes.

      Example: "A cozy living room with a sofa, TV, and coffee table" → "A cozy living room with a sofa, TV, coffee table, and a full-size bathtub placed between the sofa and the TV"
      Example: "A quiet suburban street with houses and parked cars" → "A quiet suburban street with houses and parked cars, with a traffic light standing in the middle of someone's front lawn"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of spatial layout.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely degraded quality specifically in terms of spatial layout logic. You may apply the following strategies:

      1. Locate the main scene and identify its room type or zone.
      2. Choose 1-2 large objects from completely different contexts (e.g., bathroom fixtures in a kitchen, bedroom furniture on a street, office equipment on a beach).
      3. APPEND clauses placing them in specific spots within the scene, describing exact positions (e.g., "occupying the center of the floor", "standing in the corner where X should be").
      4. Keep descriptions concrete and visual — specify what the object is and exactly where it sits. Do NOT describe "impossible physics" or "defying gravity".

      Example: "A modern kitchen with stainless steel appliances" → "A modern kitchen with stainless steel appliances, but a full-size bed with pillows occupies the center of the kitchen floor"
      Example: "A sunny beach with palm trees and waves" → "A sunny beach with palm trees and waves, with a toilet and a bathroom sink installed on the sand near the water"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of spatial layout.
      Output only the rewritten prompt.

