# Semantic Rationality - Text & Symbol Degradation Prompt Templates V3
# 语义合理性 - 文本/符号退化策略 - 基于 quality_dimensions_active.json
# 维度: text_error, logo_symbol_error

semantic_text:

  text_error:
    mild: |
      You are given a text-to-image prompt that contains a visual text element (e.g., a sign, label, or writing in quotes). Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of text accuracy. You may apply the following strategies:

      1. Locate the quoted text in the prompt (e.g., a sign saying 'Coffee').
      2. Introduce a minor, single-character spelling error or typo within the quoted text (e.g., changing 'Coffee' to 'Cofee').
      3. Keep the rest of the prompt exactly the same, changing only the content of the quoted text.

      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt that contains a visual text element. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of text accuracy. You may apply the following strategies:

      1. Locate the quoted text in the prompt.
      2. Introduce a clear text error that is still mostly readable. The error may come from obvious spelling mistakes, corrupted letter groups, awkward spacing or segmentation, or text that is only partially unreadable.
         e.g. 'Restaurant' to 'Restauraunt'; 'Chocolate' to 'Chokolate'; splitting or merging a word in an awkward place; a short phrase where one part remains readable but another part looks slightly corrupted.
      3. Optionally APPEND a text clarity modifier at the END: ", with slightly blurry text".

      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt that contains a visual text element. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of text accuracy. You may apply the following strategies:

      1. Locate the quoted text in the prompt.
      2. Create a severe text failure using one or more of the following: chaotic misspelling, extra or missing letters, corrupted character sequences, broken spacing or segmentation, or mixed readable and unreadable fragments.
         e.g. 'The Matrix' to 'Tha Mattricks'; 'Welcome' to 'Wlecmoe'; a phrase where one word is still recognizable while the next collapses into corrupted characters; words broken into awkward fragments that are hard to parse.
      3. Optionally APPEND a text clarity modifier at the END: ", with distorted hard to read text".

      Output only the rewritten prompt.

  logo_symbol_error:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have an intrusive out-of-place symbol or logo. Apply the following strategy:

      1. Keep the original prompt COMPLETELY unchanged at the beginning.
      2. APPEND at the END a small, out-of-place symbol or label attached to a specific object already in the scene — choose something contextually irrelevant (e.g., a barcode sticker on a flower, a recycling symbol on a painting, a QR code on a piece of fruit). Choose based on what fits the scene.
      3. Use a concrete spatial anchor: attach the symbol to a named object in the scene, not floating in the air.

      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have an intrusive out-of-place logo or symbol. Apply the following strategy:

      1. Keep the original prompt COMPLETELY unchanged at the beginning.
      2. APPEND at the END a short clause describing a single intrusive symbol or label attached to a specific object in the scene. The intrusion may be a small attached sticker or label, a barcode, QR-like mark, inspection tag, price label, or a small printed sign or instruction card placed where it does not belong. Keep the description short and matter-of-fact.
      3. Do NOT use words like "neon", "glowing", "vivid", "vibrant" — these change the rendering style.

      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have severely intrusive out-of-place logos or symbols. Apply the following strategy:

      1. Keep the original prompt COMPLETELY unchanged at the beginning.
      2. APPEND at the END one or two out-of-place symbols with plain, physical descriptions. Do NOT use real brand names, and do NOT use "neon", "glowing", "vivid", "vibrant" — these change the rendering style. The intrusion may take the form of a small attached sticker or label, a barcode, QR-like mark, inspection tag, price label, a small printed sign or instruction card, or repeated small symbol contamination across the same surface. Anchor each to a specific location.
      3. Keep the appended text concise to avoid content drift.

      Output only the rewritten prompt.
