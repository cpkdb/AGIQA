# Technical Quality Degradation Prompt Templates V3
# 技术质量退化策略 - 基于 quality_dimensions_active.json
# 维度: blur, overexposure, underexposure, low_contrast, color_cast, desaturation, plastic_waxy_texture

technical_quality:

  blur:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of blur. You may apply the following strategies:

      1. Keep the original subject, scene, and style intact, but you MAY rewrite the capture or focus wording so the image reads as slightly out of focus rather than merely appending a weak blur tag at the end.
      2. Identify and remove any words in the original prompt that imply high sharpness or detail (e.g., 'sharp focus', 'crisp', 'highly detailed', '4k', 'HD', 'clear').
      3. Rewrite part of the prompt so the scene is captured with slightly missed focus or soft focus across the main subject, while keeping the same content and composition.
      4. Append only a short blur phrase at the END of the prompt, such as: ", slightly blurry, soft focus, slight focus miss"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of blur.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of blur. You may apply the following strategies:

      1. Preserve the original subject, scene identity, and style, but you MAY rewrite the visual-condition wording so the whole prompt reads like a genuinely defocused or poorly focused capture. Do NOT rely only on appending a few blur words at the end.
      2. Remove ALL words implying sharpness or fine detail (e.g., 'sharp', 'crisp', 'detailed', '4k', 'HD', 'clear', 'intricate', 'fine', 'visible').
      3. Rewrite the prompt so the main subject or the whole scene is clearly captured out of focus, with failed focus, missed focus, or soft focus across important details. Make the blur read like an actual capture issue rather than a stylistic glow, and make the blur affect the overall readability of the image rather than a tiny local patch.
      4. For portraits or characters, describe the entire face and nearby visible details as softly unresolved because of failed focus: the eyes, eyelashes, eyebrows, hair strands, skin detail, and clothing edges should all read as softly blurred rather than leaving the face mostly sharp. For objects or food, explicitly make the object contours and surface details read as out of focus.
      5. Append a short blur phrase at the END of the prompt, such as: ", blurry, out of focus, unfocused, soft focus"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of blur.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of blur. You may apply the following strategies:

      1. Preserve the original subject and scene identity, but you MAY rewrite the visual-condition wording throughout the prompt so the result reads like a heavily defocused or badly failed-focus capture. Do NOT rely only on a blur suffix.
      2. AGGRESSIVELY remove adjectives related to sharpness or fine detail while keeping enough subject information to preserve the original content.
      3. Rewrite the prompt so the whole image or the main subject is clearly severely out of focus, heavily blurred, and hard to read because focus has failed. Emphasize lost edge clarity, smeared contours, missing fine detail, and overall soft unreadability rather than dreamy atmosphere.
      4. For portraits, explicitly make the entire face and upper-body details difficult to resolve because of failed focus: eyes, lashes, brows, lips, hair strands, and clothing edges should all blur together without crisp local detail. For objects or food, explicitly make outlines, edges, and surface details difficult to read because of strong blur.
      5. Append a short severe blur phrase at the END of the prompt, such as: ", extremely blurry, heavily out of focus, strong failed focus, soft focus"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of blur.
      Output only the rewritten prompt.

  overexposure:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of overexposure. You may apply the following strategies:

      1. Keep the original prompt structure intact. Do NOT prepend "photo of" or change the medium or style.
      2. Remove any words implying darkness or shadows (e.g., 'dark', 'shadowed', 'dim', 'night', 'low light', 'moody').
      3. Rewrite the prompt so the scene is captured under slightly too much direct light, making the image feel mildly over-bright and lightly washed by exposure rather than just pleasantly well lit.
      4. Add one short concrete clause describing which visible part of the existing scene is brightest and how that area starts to lose texture or color because of the excessive brightness.
      5. Do NOT use fog, haze, smoke, magical glow, white blocks, or surreal flooding language.
      6. Do NOT rewrite or rephrase the original content beyond steps 1-5.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of overexposure.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of overexposure. You may apply the following strategies:

      1. Preserve the original subject, scene identity, and artistic medium, but you MAY rewrite the lighting and visual-condition wording throughout the prompt so the whole scene reads as genuinely overexposed. Do NOT merely append a short brightness tag to an otherwise unchanged prompt.
      2. Remove ALL words implying darkness, shadows, or dim lighting (e.g., 'dark', 'shadowed', 'dim', 'moody', 'night', 'soft light').
      3. Rewrite the prompt so the scene itself is clearly captured under failed exposure control, preferably with a very bright background opening, window, sky, entrance, screen, or backlit area that pushes the exposure too high. The image should feel visibly overexposed overall, too bright, slightly bleached, and degraded in quality by excessive exposure rather than merely brighter, sunnier, or softly glowing.
      4. If the prompt contains lighting or time-of-day words, replace them with brighter equivalents only as supporting context (e.g. 'moonlight' → 'harsh daylight', 'dusk' → 'bright noon', 'sunset' → 'harsh midday sun'). Only replace these specific words.
      5. Explicitly rewrite which existing visible areas take the strongest light and how that damages image quality there. Prefer a composition where a large bright region in the background or behind the subject becomes clipped toward featureless white, while the foreground subject, face, clothing, furniture, or people lose readable detail because the camera is exposed for the wrong brightness range.
      6. Make the result read like an actual overexposed capture failure: the scene should be too bright overall, the brightest background region should wash toward featureless white, and the foreground subject should lose facial, clothing, or object detail in the harsh backlight. Prefer scene-result wording such as "the image looks visibly overexposed", "the background is blown to bright white", "the foreground falls into silhouette-like darkness against the clipped brightness", "facial detail is lost against the glare", or "the brightest opening wipes out tonal detail".
      7. Do NOT let the result read as simple beauty lighting, sunlight enhancement, or white stylistic atmosphere. The goal is a concrete scene description that visibly lowers image quality because the exposure is too strong.
      8. Do NOT use fog, haze, smoke, magical glow, white blocks, or surreal flooding language.
      9. Do NOT rewrite or rephrase the original content beyond steps 1-8.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of overexposure.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of overexposure. You may apply the following strategies:

      1. Preserve the original subject, scene identity, and artistic medium, but you MAY rewrite the lighting and visual-condition wording throughout the prompt so the whole scene reads as severely overexposed. Do NOT merely append a short brightness tag to an otherwise unchanged prompt.
      2. AGGRESSIVELY remove ALL words implying darkness, shadows, contrast, tonal richness, or dim lighting. Also remove vivid color adjectives (e.g., 'vibrant', 'rich', 'deep', 'saturated').
      3. Rewrite the prompt so the scene is clearly captured under severe exposure failure, preferably with an overwhelming backlit source such as a huge bright opening, sunlit entrance, bright sky, blown window, or glaring screen that drives the exposure far beyond normal range. The whole image should feel overwhelmingly too bright, visibly bleached, and aesthetically damaged by exposure that has gone far beyond normal range, not just strongly lit.
      4. If the prompt contains lighting or time-of-day words, replace them with extreme bright equivalents only as supporting context (e.g. 'moonlight' → 'blazing daylight', 'dusk' → 'blinding noon', 'warm glow' → 'harsh direct sunlight'). Only replace these specific words.
      5. Explicitly rewrite which existing visible parts of the scene are overwhelmed by the strongest light and how the severe overexposure destroys image quality there. Prefer a large blown-out bright region that turns nearly featureless white, while existing foreground people, faces, clothing, furniture, or objects lose shape separation and readable detail because they are overwhelmed by the backlight.
      6. Make the result read like a severe overexposed capture failure: the whole scene should be aggressively over-bright and bleached, a large visible area should clip toward featureless white, and the foreground subject should read partially as a silhouette or near-silhouette with badly lost detail. Prefer scene-result wording such as "the scene is severely overexposed", "the background is blasted into featureless white", "the subject is reduced to a dark silhouette against the glare", "facial and clothing detail vanish against the blown light", or "tonal separation collapses around the brightest opening".
      7. Do NOT let the result read as simple dramatic sunlight, stylish white lighting, or beautiful bright atmosphere. The goal is a concrete scene description where excessive exposure clearly damages image quality.
      8. Do NOT use fog, haze, smoke, magical glow, white blocks, or surreal flooding language.
      9. Do NOT rewrite or rephrase the original content beyond steps 1-8.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of overexposure.
      Output only the rewritten prompt.

  underexposure:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of underexposure. You may apply the following strategies:

      1. Remove any words implying brightness or strong light (e.g., 'bright', 'sunlit', 'glowing', 'illuminated', 'flash', 'vibrant').
      2. Insert underexposure-related keywords naturally into the prompt. You can add them at the beginning, middle, or end of the prompt. Choose from keywords like: underexposed, dimly lit, low light, slightly dark, faint lighting, etc.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of underexposure.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of underexposure. You may apply the following strategies:

      1. Remove ALL words implying brightness, light sources, or visibility (e.g., 'bright', 'sunlit', 'glowing', 'illuminated', 'clear', 'vivid').
      2. Insert underexposure-related keywords naturally into the prompt. You can add them at the beginning, middle, or end - choose positions that maximize their impact. Choose from keywords like: underexposed, low key lighting, dark, too dark, crushed blacks, dim, murky lighting, insufficient light, etc.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of underexposure.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of underexposure. You may apply the following strategies:

      1. Remove ALL words implying light, brightness, or visibility.
      2. Insert strong underexposure-related keywords naturally into the prompt at multiple positions (beginning, middle, and/or end) to maximize their effect. Choose from keywords like: extremely underexposed, very dark, no lighting, pitch black shadows, crushed blacks, low key, night, barely visible, lost in darkness, severe underexposure, etc.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of underexposure.
      Output only the rewritten prompt.

  low_contrast:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of low contrast. You may apply the following strategies:

      1. Identify and remove any high-contrast lighting terms (e.g., 'harsh sunlight', 'vivid colors', 'deep shadows').
      2. Add global-level adjectives describing the image as soft and flat (e.g., 'slightly flat lighting', 'soft shadows', 'low dynamic range', 'gently hazy').
      3. Modify key nouns by adding descriptors that reduce shadow depth (e.g., 'soft', 'diffused', 'misty', 'shadowless').
      4. Focus on raising the black levels and lowering the white levels without changing color saturation directly.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of low contrast.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of low contrast. You may apply the following strategies:

      1. Add global-level adjectives describing significant contrast loss (e.g., 'hazy atmosphere', 'foggy', 'flat lighting', 'milky blacks').
      2. Modify key nouns to look undefined (e.g., replace 'sharp silhouette' with 'faint silhouette in mist'; replace 'clear view' with 'hazy view').
      3. Mandatory: introduce atmospheric effects like 'fog', 'mist', or 'haze' that wash out the darks using terms like 'low contrast' or 'muted luminosity'.
      4. Ensure the image looks as if it was taken on a very foggy day or through dirty glass.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of low contrast.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of low contrast. You may apply the following strategies:

      1. Add global-level adjectives describing extreme contrast loss (e.g., 'dense fog', 'heavy mist', 'completely flat gray lighting', 'zero contrast').
      2. Modify key objects to be barely distinguishable from the background (e.g., 'faintly visible in thick fog', 'lost in gray mist').
      3. Mandatory: use strong terms like 'thick fog', 'whiteout condition' (if bright) or 'grayout' to describe the absolute lack of tonal range.
      4. Ensure the resulting image should look like a flat gray canvas where shapes are barely visible.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of low contrast.
      Output only the rewritten prompt.

  color_cast:
    mild: |
      You are given a text-to-image prompt. Your task is to introduce a slight color cast (white balance error).

      1. If there are explicit color words in the prompt, shift them slightly:
         - white → yellowish-white, off-white
         - blue → greenish-blue, grey-blue
         - red → brownish-red
         - green → yellowish-green
      2. If there are NO color words, do NOT add color modifiers to objects. Instead, only add lighting description.
      3. Add at the end: ", under slightly greenish lighting, faint color cast".

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of color cast.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to introduce a noticeable color cast (white balance error).

      1. Keep the original prompt INTACT at the beginning.
      2. If there are explicit color words in the prompt, shift them using hue-only terms (NO physical-state words like dirty/rusty/aged):
         - white/bright → greenish-white, yellowish-white
         - blue/sky → muddy greenish-blue, grey-blue
         - red → brownish-red
         - green → sickly yellowish-green
      3. If there are NO color words, skip step 2.
      4. APPEND at the end: ", photographed under sickly green-yellow fluorescent tube lighting, noticeable color cast"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of color cast.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to introduce a severe color cast (white balance error).

      1. Keep the original prompt INTACT at the beginning.
      2. If there are explicit color words in the prompt, shift them using hue-only terms (STRICTLY NO physical-state words like dirty/rusty/aged/stained):
         - white/bright → sickly yellowish-green, greenish-white
         - blue/sky → muddy grey-green, dead teal
         - red → muddy brownish
         - green → sickly yellow-green
      3. If there are NO color words, skip step 2.
      4. APPEND at the end: ", shot under harsh sickly yellow-green fluorescent lighting, severe white balance error, entire scene tinted with strong green-yellow color cast"

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of color cast.
      Output only the rewritten prompt.

  desaturation:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of desaturation. You may apply the following strategies:

      1. Keep the contrast (lights and darks) but remove color intensity.
      2. Add global-level adjectives describing the lack of vibrancy (e.g., 'slightly desaturated', 'muted tone', 'pale colors').
      3. Identify and modify color nouns (e.g., replace 'bright' with 'dull'; replace 'vibrant green' with 'pale grayish-green').
      4. Replace vivid color adjectives with muted ones (e.g., remove 'neon', 'intense', 'rich'; replace 'colorful' with 'toned down').

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of desaturation.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of desaturation. You may apply the following strategies:

      1. Describe the image as nearly grayscale or having drained color.
      2. Global modifiers describing color loss (e.g., 'heavy desaturation', 'nearly grayscale', 'color drained', 'sepia tone').
      3. Modify key objects to look greyed out (e.g., replace 'golden sun' with 'white sun'; replace 'emerald' with 'gray').
      4. Mandatory: replace specific color terms with gray-scale equivalents (e.g., replace 'blue' with 'dark gray'; replace 'multi-colored' with 'monochromatic').

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of desaturation.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of desaturation. You may apply the following strategies:

      1. Force the image to be strictly black and white or grayscale.
      2. Add global descriptors for total color loss (e.g., 'black and white image', 'grayscale photography', 'monochrome', 'no color').
      3. Identify and modify objects to be strictly gray (e.g., replace 'red dress' with 'black dress'; replace 'green grass' with 'gray grass').
      4. Mandatory: delete all specific color terms and replace them with 'black', 'white', 'gray', 'charcoal', or 'silver'.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of desaturation.
      Output only the rewritten prompt.

  plastic_waxy_texture:
    mild: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of plastic or waxy texture. You may apply the following strategies:

      1. DO NOT change objects into plastic toys or sculptures. Keep the objects as what they originally are.
      2. Add rendering quality descriptors at the END of the prompt: ", over-smoothed skin, airbrushed look, lacking texture detail".
      3. Remove any words implying texture or grain (e.g., 'detailed', 'textured', 'pores', 'rough').

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of plastic or waxy texture.
      Output only the rewritten prompt.

    moderate: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of plastic or waxy texture. You may apply the following strategies:

      1. DO NOT say "[object] made of plastic/vinyl/silicone".
      2. Keep the original object description info intact.
      3. Insert rendering quality issues **IMMEDIATELY AFTER** the main subject description (or the first sentence): ", CGI appearance, waxy skin, overly smooth surfaces, cheap 3D render look".
      4. Remove texture/style words like 'detailed', 'realistic', 'lifelike', 'painting', 'drawing', 'sketch'.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of plastic or waxy texture.
      Output only the rewritten prompt.

    severe: |
      You are given a text-to-image prompt. Your task is to rewrite this prompt so that the resulting image will have visually degraded quality specifically in terms of plastic or waxy texture. You may apply the following strategies:

      1. DO NOT change objects into different materials. Keep objects as they are.
      2. DO NOT add any prefix. Keep the subject description at the very beginning to preserve composition.
      3. Insert strong degradation keywords **IMMEDIATELY AFTER** the main subject description (or the first sentence): ", badly rendered CGI, fake plastic texture, waxy skin, uncanny valley, artificial 3D model, extremely over-smoothed, no texture detail, worst quality".
      4. Remove valid style descriptors like 'oil painting', 'sketch', 'hyperrealistic' so the "bad CGI" style dominates.

      Avoid making the prompt nonsensical—keep the scene semantically plausible but intentionally degraded in terms of plastic or waxy texture.
      Output only the rewritten prompt.
